<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>Upload Programs</title>

<style>
body{
    font-family: Arial;
    padding:40px;
}

button{
    padding:12px 20px;
    font-size:16px;
    cursor:pointer;
}

#log{
    margin-top:20px;
    white-space:pre-wrap;
    background:#f5f5f5;
    padding:15px;
    border:1px solid #ccc;
}
</style>
</head>

<body>

<h2>Upload programs_new</h2>

<button id="uploadBtn">Upload Programs</button>

<div id="log"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
    getFirestore,
    doc,
    setDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC0PZyTfo2t3ON7emYUS8NRMPgfMYvTJ2w",
  authDomain: "schedule-app-63c5e.firebaseapp.com",
  projectId: "schedule-app-63c5e",
  storageBucket: "schedule-app-63c5e.firebasestorage.app",
  messagingSenderId: "32553140850",
  appId: "1:32553140850:web:a2449581c3d4ae194c78eb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const programs = [
    "MR-FARM-2025",
    "MR-FARM-NOVA2021",
    "MR-FARM-NOVA2015",
    "LAB-BIO-2024",
    "LAB-BIO-2019",
    "ФФДД-23",
    "ФФДД"
];

const log = document.getElementById("log");

function makeId(name){
    return name
        .toLowerCase()
        .replaceAll(" ", "-")
        .replaceAll("/", "-");
}

async function uploadPrograms(){

    log.innerHTML = "Uploading...\n";

    for(const name of programs){

        const id = makeId(name);

        await setDoc(
            doc(db, "programs_new", id),
            {
                name: name
            }
        );

        log.innerHTML += `✓ Uploaded: ${name}\n`;
    }

    log.innerHTML += "\nDONE";
}

document.getElementById("uploadBtn")
    .addEventListener("click", uploadPrograms);

</script>

</body>
</html>
