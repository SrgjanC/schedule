<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>Upload subjects_new</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body{
    font-family: Arial;
    padding:40px;
}

h2{
    margin-bottom:20px;
}

input[type=file]{
    margin-bottom:20px;
}

button{
    padding:12px 20px;
    font-size:16px;
    cursor:pointer;
}

#log{
    margin-top:20px;
    white-space:pre-wrap;
    background:#f5f5f5;
    border:1px solid #ccc;
    padding:15px;
    font-size:14px;
}
</style>
</head>

<body>

<h2>Upload subjects_new</h2>

<input type="file" id="csvFile" accept=".csv">

<br>

<button id="uploadBtn">Upload Subjects</button>

<div id="log"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
    getFirestore,
    doc,
    setDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC0PZyTfo2t3ON7emYUS8NRMPgfMYvTJ2w",
  authDomain: "schedule-app-63c5e.firebaseapp.com",
  projectId: "schedule-app-63c5e",
  storageBucket: "schedule-app-63c5e.firebasestorage.app",
  messagingSenderId: "32553140850",
  appId: "1:32553140850:web:a2449581c3d4ae194c78eb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const log = document.getElementById("log");

// PROGRAM NAME → PROGRAM ID MAP
const programMap = {

    "Магистер по фармација 2025": "mr-farm-2025",
    "Магистер по Фармација 2021": "mr-farm-nova2021",
    "Магистер по Фармација 2015": "mr-farm-nova2015",

    "Лабораториско биоинженерство 2024": "lab-bio-2024",
    "Лабораториско биоинженерство 2019": "lab-bio-2019",

    "Диететика и диетотерапија 2024": "ффдд-23",
    "Диететика и диетотерапија 2018": "ффдд"
};

function makeId(text){

    return text
        .toString()
        .trim()
        .toLowerCase()
        .replaceAll(" ", "-")
        .replaceAll("/", "-")
        .replaceAll(",", "")
        .replaceAll(".", "")
        .replaceAll("(", "")
        .replaceAll(")", "");
}

async function uploadSubjects(){

    const file = document.getElementById("csvFile").files[0];

    if(!file){
        alert("Select CSV file");
        return;
    }

    log.innerHTML = "Reading CSV...\n";

    Papa.parse(file, {

        header: true,
        delimiter: ";",
        skipEmptyLines: true,

        complete: async function(results){

            const rows = results.data;

            log.innerHTML += `Rows: ${rows.length}\n\n`;

            for(const row of rows){

                const programName = (row["Насока"] || "").trim();
                const subjectName = (row["Предмет"] || "").trim();

                if(!programName || !subjectName){
                    continue;
                }

                const programId = programMap[programName];

                if(!programId){

                    log.innerHTML += `❌ Missing program: ${programName}\n`;
                    continue;
                }

                const semester = Number(
                    (row["Семестар"] || "").trim()
                );

                const required =
                    ((row["Задолжителен"] || "").trim() === "Да");

                const credits = parseFloat(
                    (row["Кредити"] || "0")
                        .replace(",", ".")
                        .trim()
                );

                // UNIQUE SUBJECT ID
                const subjectId =
                    programId + "-" + makeId(subjectName);

                await setDoc(
                    doc(db, "subjects_new", subjectId),
                    {
                        name: subjectName,
                        programId: programId,
                        semester: semester,
                        required: required,
                        credits: credits
                    }
                );

                log.innerHTML += `✓ ${subjectName}\n`;
            }

            log.innerHTML += `\nDONE`;
        }
    });
}

document
    .getElementById("uploadBtn")
    .addEventListener("click", uploadSubjects);

</script>

</body>
</html>
