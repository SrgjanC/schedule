<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>CSV Upload to Firebase</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body { font-family: Arial; padding: 20px; }
button { padding: 10px 15px; margin-top: 10px; }
input { margin-bottom: 10px; }
</style>
</head>

<body>

<h2>Upload Events CSV → Firebase</h2>

<input type="file" id="csvFile" accept=".csv" />
<br>
<button onclick="uploadCSV()">Upload to Firebase</button>

<p id="status"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, addDoc } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC0PZyTfo2t3ON7emYUS8NRMPgfMYvTJ2w",
  authDomain: "schedule-app-63c5e.firebaseapp.com",
  projectId: "schedule-app-63c5e",
  storageBucket: "schedule-app-63c5e.firebasestorage.app",
  messagingSenderId: "32553140850",
  appId: "1:32553140850:web:a2449581c3d4ae194c78eb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.uploadCSV = function () {

  const file = document.getElementById("csvFile").files[0];
  const status = document.getElementById("status");

  if (!file) {
    alert("Select CSV file first!");
    return;
  }

  status.innerText = "Parsing CSV...";

  Papa.parse(file, {
    header: true,
    delimiter: ";",
    skipEmptyLines: true,

    complete: async function(results) {

      const rows = results.data;

      console.log("CSV DATA:", rows);

      status.innerText = "Uploading to Firebase...";

      let count = 0;

      for (let r of rows) {

        const doc = {
          date: r["Датум"] || "",
          time: r["Час"] || "",
          room: r["Просторија"] || "",
          program: r["Студиска програма"] || "",
          semester: r["Семестар"] || "",
          subject: r["предмет"] || "",
          type: r["тип на настава"] || "",
          professor: r["проф/асс"] || "",
          groups: r["Групи"] || "",
          week: r["Недела"] || "",
          day: r["Ден"] || ""
        };

        await addDoc(collection(db, "events"), doc);
        count++;
      }

      status.innerText = `Upload complete! ${count} events added.`;
    }
  });
};

</script>

</body>
</html>
