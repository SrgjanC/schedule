<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>Upload events_new</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body{
    font-family: Arial;
    padding:40px;
}

h2{
    margin-bottom:20px;
}

.section{
    margin-bottom:40px;
    padding:20px;
    border:1px solid #ccc;
}

input[type=file]{
    margin-bottom:20px;
}

button{
    padding:12px 20px;
    font-size:16px;
    cursor:pointer;
}

#log{
    margin-top:20px;
    white-space:pre-wrap;
    background:#f5f5f5;
    border:1px solid #ccc;
    padding:15px;
    font-size:14px;
    max-height:600px;
    overflow:auto;
}
</style>
</head>

<body>

<h2>Firebase Upload Tool</h2>

<div class="section">

<h3>Upload events_new</h3>

<input type="file" id="eventsFile" accept=".csv">

<br>

<button id="uploadEventsBtn">
Upload Events
</button>

</div>

<div id="log"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
    getFirestore,
    collection,
    getDocs,
    addDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC0PZyTfo2t3ON7emYUS8NRMPgfMYvTJ2w",
  authDomain: "schedule-app-63c5e.firebaseapp.com",
  projectId: "schedule-app-63c5e",
  storageBucket: "schedule-app-63c5e.firebasestorage.app",
  messagingSenderId: "32553140850",
  appId: "1:32553140850:web:a2449581c3d4ae194c78eb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const log = document.getElementById("log");

// ===========================
// LAB ROOMS
// ===========================

const labRooms = [
    "07 лаб.",
    "08 лаб.",
    "09 лаб.",
    "10 лаб.",
    "11 лаб.",
    "12 лаб.",
    "14 лаб.",
    "НФИЦ"
];

// ===========================
// PROGRAM PRIORITY
// ===========================

const programPriority = {

    "Магистер": [
        "mr-farm-2025",
        "mr-farm-nova2021",
        "mr-farm-nova2015"
    ],

    "Лабораториско": [
        "lab-bio-2024",
        "lab-bio-2019"
    ],

    "Диететика": [
        "ффдд-23",
        "ффдд"
    ]
};

// ===========================
// HELPERS
// ===========================

function normalizeText(text){

    return text
        .toString()
        .trim()
        .toLowerCase()
        .replace(/\s+/g, " ");
}

function normalizeTime(time){

    let t = (time || "").trim();

    if(t.includes(".")){
        t = t.replace(".", ":");
    }

    const p = t.split(":");

    if(p.length === 2){
        return p[0].padStart(2,"0") + ":" + p[1].padStart(2,"0");
    }

    return t;
}

function detectFamily(programText){

    const p = normalizeText(programText);

    if(p.includes("магист"))
        return "Магистер";

    if(p.includes("лабо"))
        return "Лабораториско";

    if(p.includes("диет"))
        return "Диететика";

    return null;
}

function isLabRoom(room){

    return labRooms.includes(room);
}

// ===========================
// FIND SUBJECT
// ===========================

function findBestSubject(subjectName, semester, family, subjects){

    const normalizedSubject =
        normalizeText(subjectName);

    const priorityPrograms =
        programPriority[family] || [];

    // PASS 1
    // same semester + newest

    for(const programId of priorityPrograms){

        const found = subjects.find(s =>

            normalizeText(s.name) === normalizedSubject &&
            String(s.semester) === String(semester) &&
            s.programId === programId
        );

        if(found)
            return found;
    }

    // PASS 2
    // any semester

    for(const programId of priorityPrograms){

        const found = subjects.find(s =>

            normalizeText(s.name) === normalizedSubject &&
            s.programId === programId
        );

        if(found)
            return found;
    }

    return null;
}

// ===========================
// DUPLICATE RULES
// ===========================

function makeLectureKey(event){

    return [

        normalizeText(event.date),
        normalizeTime(event.time),
        normalizeText(event.subjectId),
        normalizeText(event.type)

    ].join("|");
}

function makeExerciseKey(event){

    return [

        normalizeText(event.date),
        normalizeTime(event.time),
        normalizeText(event.subjectId),
        normalizeText(event.type),
        normalizeText(event.room)

    ].join("|");
}

// ===========================
// UPLOAD EVENTS
// ===========================

async function uploadEvents(){

    const file =
        document.getElementById("eventsFile").files[0];

    if(!file){
        alert("Select events CSV");
        return;
    }

    log.innerHTML = "Loading subjects_new...\n";

    // LOAD SUBJECTS
    const subjectsSnap =
        await getDocs(collection(db, "subjects_new"));

    const subjects =
        subjectsSnap.docs.map(d => ({
            id: d.id,
            ...d.data()
        }));

    log.innerHTML +=
        `Subjects loaded: ${subjects.length}\n`;

    // LOAD EXISTING EVENTS
    log.innerHTML +=
        `Loading existing events_new...\n`;

    const eventsSnap =
        await getDocs(collection(db, "events_new"));

    const existingLectureKeys = new Set();
    const existingExerciseKeys = new Set();

    eventsSnap.forEach(docSnap => {

        const d = docSnap.data();

        const type =
            normalizeText(d.type);

        // ПРЕДАВАЊЕ
        if(type.includes("пред")){

            existingLectureKeys.add(
                makeLectureKey(d)
            );
        }

        // ВЕЖБИ
        else if(type.includes("веж")){

            existingExerciseKeys.add(
                makeExerciseKey(d)
            );
        }

        // OTHER
        else{

            existingLectureKeys.add(
                makeLectureKey(d)
            );
        }
    });

    log.innerHTML +=
        `Existing events loaded\n\n`;

    Papa.parse(file, {

        header: true,
        delimiter: ";",
        skipEmptyLines: true,

        complete: async function(results){

            const rows = results.data;

            log.innerHTML +=
                `CSV rows: ${rows.length}\n\n`;

            let uploaded = 0;
            let skipped = 0;
            let duplicates = 0;

            for(const row of rows){

                const subjectName =
                    (row["предмет"] || "").trim();

                const semester =
                    (row["Семестар"] || "").trim();

                const programText =
                    (row["Студиска програма"] || "").trim();

                const family =
                    detectFamily(programText);

                if(!family){

                    log.innerHTML +=
                        `❌ Unknown family: ${programText}\n`;

                    skipped++;
                    continue;
                }

                // FIND SUBJECT
                const subject =
                    findBestSubject(
                        subjectName,
                        semester,
                        family,
                        subjects
                    );

                if(!subject){

                    log.innerHTML +=
                        `❌ Subject not found: ${subjectName}\n`;

                    skipped++;
                    continue;
                }

                // EVENT DATA
                const eventData = {

                    week:
                        (row["Недела"] || "").trim(),

                    day:
                        (row["Ден"] || "").trim(),

                    date:
                        (row["Датум"] || "").trim(),

                    time:
                        normalizeTime(
                            row["Час"] || ""
                        ),

                    room:
                        (row["Просторија"] || "").trim(),

                    type:
                        (row["тип на настава"] || "").trim(),

                    professor:
                        (row["проф/асс"] || "").trim(),

                    groups:
                        (row["Групи"] || "").trim(),

                    subjectId:
                        subject.id,

                    programId:
                        subject.programId
                };

                const type =
                    normalizeText(eventData.type);

                let isDuplicate = false;

                // ===========================
                // ПРЕДАВАЊЕ
                // only ONE room allowed
                // ===========================

                if(type.includes("пред")){

                    const key =
                        makeLectureKey(eventData);

                    if(existingLectureKeys.has(key)){

                        isDuplicate = true;
                    }
                    else{

                        existingLectureKeys.add(key);
                    }
                }

                // ===========================
                // ВЕЖБИ
                // allowed in multiple LAB rooms
                // ===========================

                else if(type.includes("веж")){

                    if(isLabRoom(eventData.room)){

                        const key =
                            makeExerciseKey(eventData);

                        if(existingExerciseKeys.has(key)){

                            isDuplicate = true;
                        }
                        else{

                            existingExerciseKeys.add(key);
                        }
                    }
                    else{

                        const key =
                            makeLectureKey(eventData);

                        if(existingLectureKeys.has(key)){

                            isDuplicate = true;
                        }
                        else{

                            existingLectureKeys.add(key);
                        }
                    }
                }

                // ===========================
                // OTHER TYPES
                // ===========================

                else{

                    const key =
                        makeLectureKey(eventData);

                    if(existingLectureKeys.has(key)){

                        isDuplicate = true;
                    }
                    else{

                        existingLectureKeys.add(key);
                    }
                }

                // DUPLICATE
                if(isDuplicate){

                    log.innerHTML +=
                        `⚠ Duplicate skipped: ${subjectName} | ${eventData.date} ${eventData.time} | ${eventData.room}\n`;

                    duplicates++;
                    continue;
                }

                // SAVE
                await addDoc(
                    collection(db, "events_new"),
                    eventData
                );

                uploaded++;

                log.innerHTML +=
                    `✓ ${subjectName} → ${subject.programId} | ${eventData.date} ${eventData.time}\n`;
            }

            log.innerHTML +=
`
DONE

Uploaded: ${uploaded}
Duplicates: ${duplicates}
Skipped: ${skipped}
`;
        }
    });
}

document
    .getElementById("uploadEventsBtn")
    .addEventListener("click", uploadEvents);

</script>

</body>
</html>
