<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>Upload subjects_new + events_new</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body{
    font-family: Arial;
    padding:40px;
}

h2{
    margin-bottom:20px;
}

.section{
    margin-bottom:40px;
    padding:20px;
    border:1px solid #ccc;
}

input[type=file]{
    margin-bottom:20px;
}

button{
    padding:12px 20px;
    font-size:16px;
    cursor:pointer;
}

#log{
    margin-top:20px;
    white-space:pre-wrap;
    background:#f5f5f5;
    border:1px solid #ccc;
    padding:15px;
    font-size:14px;
    max-height:600px;
    overflow:auto;
}
</style>
</head>

<body>

<h2>Firebase Upload Tool</h2>

<div class="section">

<h3>Upload events_new</h3>

<input type="file" id="eventsFile" accept=".csv">

<br>

<button id="uploadEventsBtn">
Upload Events
</button>

</div>

<div id="log"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
    getFirestore,
    collection,
    getDocs,
    addDoc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC0PZyTfo2t3ON7emYUS8NRMPgfMYvTJ2w",
  authDomain: "schedule-app-63c5e.firebaseapp.com",
  projectId: "schedule-app-63c5e",
  storageBucket: "schedule-app-63c5e.firebasestorage.app",
  messagingSenderId: "32553140850",
  appId: "1:32553140850:web:a2449581c3d4ae194c78eb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const log = document.getElementById("log");

// ===========================
// PROGRAM FAMILY PRIORITY
// ===========================

const programPriority = {

    "Магистер": [
        "mr-farm-2025",
        "mr-farm-nova2021",
        "mr-farm-nova2015"
    ],

    "Лабораториско": [
        "lab-bio-2024",
        "lab-bio-2019"
    ],

    "Диететика": [
        "ффдд-23",
        "ффдд"
    ]
};

// ===========================
// HELPERS
// ===========================

function normalizeText(text){

    return text
        .toString()
        .trim()
        .toLowerCase()
        .replace(/\s+/g, " ");
}

function detectFamily(programText){

    const p = normalizeText(programText);

    if(p.includes("магист"))
        return "Магистер";

    if(p.includes("лабо"))
        return "Лабораториско";

    if(p.includes("диет"))
        return "Диететика";

    return null;
}

// ===========================
// FIND SUBJECT
// ===========================

function findBestSubject(subjectName, semester, family, subjects){

    const normalizedSubject =
        normalizeText(subjectName);

    const priorityPrograms =
        programPriority[family] || [];

    // FIRST PASS:
    // exact semester + newest program

    for(const programId of priorityPrograms){

        const found = subjects.find(s =>

            normalizeText(s.name) === normalizedSubject &&
            String(s.semester) === String(semester) &&
            s.programId === programId
        );

        if(found)
            return found;
    }

    // SECOND PASS:
    // same subject any semester

    for(const programId of priorityPrograms){

        const found = subjects.find(s =>

            normalizeText(s.name) === normalizedSubject &&
            s.programId === programId
        );

        if(found)
            return found;
    }

    return null;
}

// ===========================
// UPLOAD EVENTS
// ===========================

async function uploadEvents(){

    const file =
        document.getElementById("eventsFile").files[0];

    if(!file){
        alert("Select events CSV");
        return;
    }

    log.innerHTML = "Loading subjects_new...\n";

    // LOAD SUBJECTS
    const subjectsSnap =
        await getDocs(collection(db, "subjects_new"));

    const subjects =
        subjectsSnap.docs.map(d => ({
            id: d.id,
            ...d.data()
        }));

    log.innerHTML +=
        `Subjects loaded: ${subjects.length}\n\n`;

    Papa.parse(file, {

        header: true,
        delimiter: ";",
        skipEmptyLines: true,

        complete: async function(results){

            const rows = results.data;

            log.innerHTML +=
                `CSV rows: ${rows.length}\n\n`;

            let uploaded = 0;
            let skipped = 0;

            for(const row of rows){

                const subjectName =
                    (row["предмет"] || "").trim();

                const semester =
                    (row["Семестар"] || "").trim();

                const programText =
                    (row["Студиска програма"] || "").trim();

                const family =
                    detectFamily(programText);

                if(!family){

                    log.innerHTML +=
                        `❌ Unknown family: ${programText}\n`;

                    skipped++;
                    continue;
                }

                // FIND SUBJECT
                const subject =
                    findBestSubject(
                        subjectName,
                        semester,
                        family,
                        subjects
                    );

                if(!subject){

                    log.innerHTML +=
                        `❌ Subject not found: ${subjectName}\n`;

                    skipped++;
                    continue;
                }

                // CREATE EVENT
                await addDoc(
                    collection(db, "events_new"),
                    {

                        week:
                            (row["Недела"] || "").trim(),

                        day:
                            (row["Ден"] || "").trim(),

                        date:
                            (row["Датум"] || "").trim(),

                        time:
                            (row["Час"] || "").trim(),

                        room:
                            (row["Просторија"] || "").trim(),

                        type:
                            (row["тип на настава"] || "").trim(),

                        professor:
                            (row["проф/асс"] || "").trim(),

                        groups:
                            (row["Групи"] || "").trim(),

                        // CONNECTIONS
                        subjectId:
                            subject.id,

                        programId:
                            subject.programId
                    }
                );

                uploaded++;

                log.innerHTML +=
                    `✓ ${subjectName} → ${subject.programId}\n`;
            }

            log.innerHTML +=
                `\nDONE\nUploaded: ${uploaded}\nSkipped: ${skipped}`;
        }
    });
}

document
    .getElementById("uploadEventsBtn")
    .addEventListener("click", uploadEvents);

</script>

</body>
</html>
