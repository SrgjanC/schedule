<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>Распоред</title>

<style>
body { font-family: Arial; padding: 20px; }
h2 { margin-bottom: 10px; }
.controls { margin-bottom: 15px; }
select { padding: 5px; margin-right: 10px; }

table { border-collapse: collapse; width: 100%; }

th, td {
    border: 1px solid #222;
    padding: 4px 6px;
    text-align: left;
    font-size: 13px;
}

th {
    background: #3f69b1;
    color: #fff;
}

.spinner-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 25px;
}

.spinner {
    width: 34px;
    height: 34px;
    border: 4px solid #ddd;
    border-top: 4px solid #3f69b1;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<h2>Академски Распоред</h2>

<div class="controls">

<label>Преглед:</label>
<select id="viewMode">
    <option value="day">Day</option>
    <option value="week">Week</option>
    <option value="month">Month</option>
    <option value="year">Year</option>
</select>

<label>Датум:</label>
<select id="dateFilter"></select>

<label>Програма:</label>
<select id="programFilter"></select>

<label>Семестар:</label>
<select id="semesterFilter"></select>

<label>Просторија:</label>
<select id="roomFilter"></select>

</div>

<div id="viewInfo" style="margin: 8px 0 14px; font-size: 14px; color: #444;"></div>

<table id="schedule">

<thead>
<tr>
<th>Недела</th>
<th>Ден</th>
<th>Датум</th>
<th>Час</th>
<th>Просторија</th>
<th>Студиска програма</th>
<th>Семестар</th>
<th>Предмет</th>
<th>Тип на настава</th>
<th>Проф/асс</th>
<th>Групи</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
    getFirestore,
    collection,
    getDocs
}
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

// ================= FIREBASE =================

const firebaseConfig = {
  apiKey: "AIzaSyC0PZyTfo2t3ON7emYUS8NRMPgfMYvTJ2w",
  authDomain: "schedule-app-63c5e.firebaseapp.com",
  projectId: "schedule-app-63c5e",
  storageBucket: "schedule-app-63c5e.firebasestorage.app",
  messagingSenderId: "32553140850",
  appId: "1:32553140850:web:a2449581c3d4ae194c78eb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ================= DATA =================

let events = [];
let programs = [];
let subjects = [];
let rooms = [];

let isLoading = true;

// ================= ROOMS =================

const DAY_ROOMS = [
"01 пред.","02 пред.","03 пред.","04 пред.",
"08 лаб.","09 лаб.","10 лаб.","11 лаб.","12 лаб.","14 лаб.","НФИЦ"
];

// ================= COLORS =================

const roomColorCache = {};

function getRoomColor(room) {

    if (!room) return "#ffffff";

    if (roomColorCache[room])
        return roomColorCache[room];

    const palette = [
        "#f1dfd3",
        "#dde3ef",
        "#cfe7b4",
        "#f7e6b8",
        "#e3d9f6",
        "#d7eee8"
    ];

    let hash = 0;

    for (let i = 0; i < room.length; i++) {
        hash = room.charCodeAt(i) + ((hash << 5) - hash);
    }

    const color =
        palette[Math.abs(hash) % palette.length];

    roomColorCache[room] = color;

    return color;
}

// ================= DATE =================

function formatDate(dateStr) {

    if (!dateStr) return "";

    const d = new Date(dateStr);

    if (Number.isNaN(d.getTime()))
        return dateStr;

    const months = [
        "Јан","Фев","Мар","Апр","Мај","Јун",
        "Јул","Авг","Сеп","Окт","Ное","Дек"
    ];

    return `${d.getDate()}-${months[d.getMonth()]}`;
}

function todayISO() {

    const t = new Date();

    const y = t.getFullYear();
    const m = String(t.getMonth()+1).padStart(2,"0");
    const d = String(t.getDate()).padStart(2,"0");

    return `${y}-${m}-${d}`;
}

function buildTimeSlots() {

    const slots = [];

    for (let h = 8; h <= 20; h++) {

        slots.push(
            String(h).padStart(2,"0") + ":00"
        );
    }

    return slots;
}

const TIMES = buildTimeSlots();

// ================= FILTERS =================

function fillSelect(id, values) {

    const el = document.getElementById(id);

    el.innerHTML =
        "<option value=''>Сите</option>";

    values.forEach(v => {

        if (v !== undefined &&
            v !== null &&
            v !== "") {

            el.innerHTML +=
                `<option value="${v}">${v}</option>`;
        }
    });
}

function sortSemesters(values) {

    return values
        .map(v => Number(v))
        .filter(v => !Number.isNaN(v))
        .sort((a,b) => a - b);
}

// ================= LOAD =================

async function loadData() {

    // EVENTS
    const eventsSnap =
        await getDocs(collection(db, "events_new"));

    events =
        eventsSnap.docs.map(d => ({
            id: d.id,
            ...d.data()
        }));

    // PROGRAMS
    const progSnap =
        await getDocs(collection(db, "programs_new"));

    programs =
        progSnap.docs.map(d => ({
            id: d.id,
            ...d.data()
        }));

    // SUBJECTS
    const subjSnap =
        await getDocs(collection(db, "subjects_new"));

    subjects =
        subjSnap.docs.map(d => ({
            id: d.id,
            ...d.data()
        }));

    // ROOMS
    const roomsSnap =
        await getDocs(collection(db, "rooms"));

    rooms =
        roomsSnap.docs
            .map(d => d.data().name)
            .filter(Boolean);

    // CONNECT
    events = events.map(e => {

        const program =
            programs.find(p => p.id === e.programId);

        const subject =
            subjects.find(s => s.id === e.subjectId);

        return {

            ...e,

            program:
                program?.name || "",

            semester:
                subject?.semester || "",

            subject:
                subject?.name || ""
        };
    });

    isLoading = false;

    initFilters();

    render();
}

// ================= FILTER INIT =================

function initFilters() {

    const dates =
        [...new Set(events.map(e => e.date))]
        .sort();

    const progs =
        [...new Set(events.map(e => e.program))]
        .filter(Boolean);

    const semRaw =
        [...new Set(events.map(e => e.semester))];

    const semSorted =
        sortSemesters(semRaw);

    const roomSorted =
        [...new Set(rooms)].sort((a,b)=>
            a.localeCompare(b,"mk")
        );

    fillSelect("dateFilter", dates);
    fillSelect("programFilter", progs);
    fillSelect("semesterFilter", semSorted);
    fillSelect("roomFilter", roomSorted);

    const today = todayISO();

    if (dates.includes(today))
        document.getElementById("dateFilter").value =
            today;

    document.querySelectorAll("select").forEach(s =>
        s.addEventListener("change", render)
    );
}

// ================= RENDER =================

function render() {

const tbody = document.getElementById("tbody");

if (isLoading) {

    tbody.innerHTML = `
    <tr>
        <td colspan="11">
            <div class="spinner-wrap">
                <div class="spinner"></div>
            </div>
        </td>
    </tr>`;

    return;
}

tbody.innerHTML = "";

const dateF =
    document.getElementById("dateFilter").value;

const progF =
    document.getElementById("programFilter").value;

const semF =
    document.getElementById("semesterFilter").value;

const roomF =
    document.getElementById("roomFilter").value;

const view =
    document.getElementById("viewMode").value;

// ================= EVENT MAP =================

const map = {};

events.forEach(e => {

    map[`${e.date}_${e.time}_${e.room}`] = e;
});

const selectedDate =
    dateF || todayISO();

document.getElementById("viewInfo").textContent =
    dateF ? `Приказ: ${dateF}` : "Приказ за денес";

// ================= DAY VIEW =================

if (view === "day") {

    for (const room of DAY_ROOMS) {

        if (roomF && room !== roomF)
            continue;

        const bg =
            getRoomColor(room);

        for (const time of TIMES) {

            const key =
                `${selectedDate}_${time}_${room}`;

            const e = map[key];

            if (e) {

                if (progF && e.program !== progF)
                    continue;

                if (semF && String(e.semester) !== String(semF))
                    continue;
            }

            tbody.innerHTML += `
            <tr style="background:${bg}; opacity:${e ? 1 : 0.55}">
                <td>${e?.week || ""}</td>
                <td>${e?.day || ""}</td>
                <td>${formatDate(selectedDate)}</td>
                <td>${time}</td>
                <td>${room}</td>
                <td>${e?.program || ""}</td>
                <td>${e?.semester || ""}</td>
                <td>${e?.subject || ""}</td>
                <td>${e?.type || ""}</td>
                <td>${e?.professor || ""}</td>
                <td>${e?.groups || ""}</td>
            </tr>`;
        }
    }

    return;
}

// ================= NORMAL VIEW =================

const sorted = [...events].sort((a,b)=>

    (a.date||"").localeCompare(b.date||"") ||

    (a.room||"").localeCompare(b.room||"") ||

    (a.time||"").localeCompare(b.time||"")
);

sorted.forEach(e => {

    if (dateF && e.date !== dateF)
        return;

    if (progF && e.program !== progF)
        return;

    if (semF && String(e.semester) !== String(semF))
        return;

    if (roomF && e.room !== roomF)
        return;

    tbody.innerHTML += `
    <tr style="background:${getRoomColor(e.room)}">
        <td>${e.week || ""}</td>
        <td>${e.day || ""}</td>
        <td>${formatDate(e.date)}</td>
        <td>${e.time || ""}</td>
        <td>${e.room || ""}</td>
        <td>${e.program || ""}</td>
        <td>${e.semester || ""}</td>
        <td>${e.subject || ""}</td>
        <td>${e.type || ""}</td>
        <td>${e.professor || ""}</td>
        <td>${e.groups || ""}</td>
    </tr>`;
});

}

loadData();

</script>

</body>
</html>
