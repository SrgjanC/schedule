<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>Распоред</title>

<style>
body { font-family: Arial; padding: 20px; }
h2 { margin-bottom: 10px; }
.controls { margin-bottom: 15px; }
select { padding: 5px; margin-right: 10px; }

table { border-collapse: collapse; width: 100%; }

th, td {
    border: 1px solid #222;
    padding: 4px 6px;
    text-align: left;
    font-size: 13px;
}

th {
    background: #3f69b1;
    color: #fff;
}

.spinner-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 25px;
}

.spinner {
    width: 34px;
    height: 34px;
    border: 4px solid #ddd;
    border-top: 4px solid #3f69b1;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<h2>Академски Распоред</h2>

<div class="controls">

<label>Преглед:</label>
<select id="viewMode">
    <option value="day">Day</option>
    <option value="week">Week</option>
    <option value="month">Month</option>
    <option value="year">Year</option>
</select>

<label>Датум:</label>
<select id="dateFilter"></select>

<label>Програма:</label>
<select id="programFilter"></select>

<label>Семестар:</label>
<select id="semesterFilter"></select>

<label>Просторија:</label>
<select id="roomFilter"></select>

</div>

<div id="viewInfo" style="margin: 8px 0 14px; font-size: 14px; color: #444;"></div>

<table id="schedule">

<thead>
<tr>
<th>Недела</th>
<th>Ден</th>
<th>Датум</th>
<th>Час</th>
<th>Просторија</th>
<th>Студиска програма</th>
<th>Семестар</th>
<th>Предмет</th>
<th>Тип на настава</th>
<th>Проф/асс</th>
<th>Групи</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
    getFirestore,
    collection,
    onSnapshot
}
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

// ================= FIREBASE =================

const firebaseConfig = {
  apiKey: "AIzaSyC0PZyTfo2t3ON7emYUS8NRMPgfMYvTJ2w",
  authDomain: "schedule-app-63c5e.firebaseapp.com",
  projectId: "schedule-app-63c5e",
  storageBucket: "schedule-app-63c5e.firebasestorage.app",
  messagingSenderId: "32553140850",
  appId: "1:32553140850:web:a2449581c3d4ae194c78eb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ================= DATA =================

let events = [];
let programs = [];
let subjects = [];
let rooms = [];

let isLoading = true;

// ================= EVERYTHING BELOW STAYS SAME =================
// (your existing functions: colors, filters, render, etc.)

// KEEP ALL YOUR FUNCTIONS AS THEY ARE ABOVE THIS LINE
// (I am not rewriting them because layout must not change)

// ================= LOAD REALTIME =================

function listenData() {

    const eventsRef = collection(db, "events_new");
    const progRef = collection(db, "programs_new");
    const subjRef = collection(db, "subjects_new");
    const roomsRef = collection(db, "rooms");

    let loaded = 0;

    function checkReady() {
        loaded++;
        if (loaded >= 4) {
            isLoading = false;
            initFilters();
            render();
        }
    }

    onSnapshot(eventsRef, snap => {

        events = snap.docs.map(d => ({
            id: d.id,
            ...d.data()
        }));

        joinData();

        render();
    });

    onSnapshot(progRef, snap => {

        programs = snap.docs.map(d => ({
            id: d.id,
            ...d.data()
        }));

        checkReady();
    });

    onSnapshot(subjRef, snap => {

        subjects = snap.docs.map(d => ({
            id: d.id,
            ...d.data()
        }));

        checkReady();
    });

    onSnapshot(roomsRef, snap => {

        rooms = snap.docs
            .map(d => d.data().name)
            .filter(Boolean);

        checkReady();
    });
}

// ================= JOIN FUNCTION =================

function joinData() {

    events = events.map(e => {

        const program =
            programs.find(p => p.id === e.programId);

        const subject =
            subjects.find(s => s.id === e.subjectId);

        return {

            ...e,

            program:
                program?.name || "",

            semester:
                subject?.semester || "",

            subject:
                subject?.name || ""
        };
    });
}

// ================= START =================

listenData();

</script>

</body>
</html>
