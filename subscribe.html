<!DOCTYPE html>
<html lang="mk">
<head>

<meta charset="UTF-8">

<title>Calendar Subscription</title>

<style>

body{

    font-family:Arial;
    background:#f4f6fb;
    margin:30px;

}

.container{

    max-width:1500px;

    margin:auto;

    background:white;

    padding:25px;

    border-radius:10px;

    box-shadow:0 0 10px rgba(0,0,0,.08);

}

.mainLayout{

    display:grid;

    grid-template-columns:420px 1fr;

    gap:25px;

    align-items:start;

}

.leftPanel{

    display:flex;

    flex-direction:column;

    gap:18px;

}

.rightPanel{

    border-left:1px solid #ddd;

    padding-left:25px;

}

@media(max-width:1000px){

.mainLayout{

    grid-template-columns:1fr;

}

.rightPanel{

    border-left:none;

    border-top:1px solid #ddd;

    padding-left:0;

    padding-top:20px;

}

}
    
h2{

    margin-top:0;

    color:#3f69b1;

}

.section{

    margin-bottom:25px;

}

label{

    display:block;

    margin-bottom:6px;

    font-weight:bold;

}

select{

    width:100%;

    padding:8px;

    font-size:14px;

}

#subjects{

    border:1px solid #ddd;

    border-radius:6px;

    padding:10px;

    max-height:320px;

    overflow:auto;

    background:white;

}

.subject{

    padding:6px;

}

button{

    background:#3f69b1;

    color:white;

    border:none;

    padding:12px 20px;

    border-radius:6px;

    font-size:15px;

    cursor:pointer;

}

button:disabled{

    background:#999;

    cursor:not-allowed;

}

    /* Subject toolbar */

.subjectToolbar{

    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
    gap:10px;
    flex-wrap:wrap;

}

#subjectSearch{

    flex:1;
    min-width:220px;
    padding:8px 12px;
    border:1px solid #ccc;
    border-radius:6px;

}

#selectedCount{

    font-size:13px;
    color:#666;
    white-space:nowrap;

}

/* Subject row */

.subjectRow{

    display:flex;
    align-items:center;
    gap:10px;
    padding:8px 10px;
    border-bottom:1px solid #eee;
    transition:.15s;

}

.subjectRow:hover{

    background:#f7faff;

}

.subjectName{

    flex:1;
    font-size:14px;

}

.subjectBadge{

    color:white;
    font-size:11px;
    font-weight:bold;
    border-radius:12px;
    padding:3px 8px;
    min-width:42px;
    text-align:center;

}

.badgeMandatory{

    background:#d1fae5;
    color:#065f46;
    padding:3px 8px;
    border-radius:10px;
    font-size:11px;

}

.badgeElective{

    background:#dbeafe;
    color:#1e40af;
    padding:3px 8px;
    border-radius:10px;
    font-size:11px;

}

.badgeCredits{

    background:#f3f4f6;
    padding:3px 8px;
    border-radius:10px;
    font-size:11px;

}

.subjectRow.selected{
    background:#e8f2ff;
    border-left:4px solid #3f69b1;
    padding-left:6px;

}

.badgeSemester{
    background:#eef2ff;
    color:#4338ca;
    padding:3px 8px;
    border-radius:10px;
    font-size:11px;
    font-weight:bold;
}

/* ---------- Live Preview ---------- */

#previewStats{
    display:flex;
    gap:10px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

.statCard{
    flex:1;
    min-width:150px;
    background:#f8fbff;
    border:1px solid #d8e5ff;
    border-radius:10px;
    padding:12px;
}

#previewList{
    border:1px solid #ddd;
    border-radius:8px;
    background:white;
    min-height:500px;
    max-height:700px;
    overflow:auto;
}

.emptyPreview{
    padding:40px;
    text-align:center;
    color:#777;
}


.previewEvent{
    padding:12px;
    border-bottom:1px solid #eee;
}

.previewEvent:hover{
    background:#f7fbff;
}

</style>

    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>

</head>

<body>
    



        

<div class="container">

<h2>📅 Calendar Subscription</h2>

<div class="mainLayout">

<div class="leftPanel">

<div class="section">

<label>Academic Year</label>

<select id="yearFilter"></select>

</div>

<div class="section">

<label>Program</label>

<select id="programFilter"></select>

</div>

<div class="section">

<label>Semester</label>

<select id="semesterFilter"></select>

</div>

<div class="section">

<label>Subjects</label>

<div id="subjects"></div>

</div>

<div class="section">

<label>Professor (optional)</label>

<select id="professorFilter">

<option value="">All Professors</option>

</select>

</div>

<div class="section">

<button
id="createBtn"
disabled>

📅 Create Subscription

</button>

</div>

</div>

<div class="rightPanel">

    <h3>Live Preview</h3>

    <div id="previewStats">

        <div class="statCard">

            📚
            <strong>Subjects:</strong>

            <span id="previewSubjects">
                0
            </span>

        </div>

        <div class="statCard">

            👨‍🏫
            <strong>Professor:</strong>

            <span id="previewProfessor">

                All

            </span>

        </div>

        <div class="statCard">

            📅
            <strong>Events:</strong>

            <span id="previewEvents">

                0

            </span>

        </div>

    </div>

    <div id="previewList">

        <div class="emptyPreview">

            Select subjects or a professor to preview the calendar.

        </div>

    </div>

</div>

</div>

</div>

    <script type="module">

import { createClient }
from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
    'https://elmxwpwhyewgjlvoadtb.supabase.co',
    'sb_publishable_yUCov2V1dKGEc-rBwt6v2A_dBkHEiYd'
);


let professorSelect = null;
        let professorRefreshTimer = null;
    

        const INSTITUTE_COLORS = {

    "ИФГ":"#4CAF50",   // Green
    "ИПБ":"#2196F3",   // Blue
    "ИФТ":"#F44336",   // Red
    "ИФХ":"#FF9800",   // Orange
    "ИПХФА":"#9C27B0"  // Purple

};
        
        
  function loadAcademicYears(){

    const select =
        document.getElementById("yearFilter");

      select.innerHTML = "";

    const now =
        new Date();

    const year =
        now.getMonth() >= 9
        ? now.getFullYear()
        : now.getFullYear()-1;

    for(let i=-1;i<=3;i++){

        const start =
            year+i;

        const end =
            start+1;

        select.innerHTML +=
        `<option value="${start}">
            ${start}/${end}
        </option>`;

    }

}

async function loadPrograms(){

    const select =
        document.getElementById("programFilter");

    select.innerHTML =
        `<option value="">-- Select Program --</option>`;

    const { data, error } =
        await supabase
        .from("programs")
        .select("*")
        .order("name");

    if(error){

        alert(error.message);
        return;

    }

    data.forEach(program=>{

        select.innerHTML += `
            <option value="${program.id}">
                ${program.name}
            </option>
        `;

    });

}

        async function loadSemesters(){

    const programId =
        document.getElementById("programFilter").value;

    const select =
        document.getElementById("semesterFilter");

    select.innerHTML =
        `<option value="">-- Select Semester --</option>`;

    if(!programId)
        return;

    const { data, error } =
        await supabase
        .from("subjects")
        .select("semester")
        .eq("program_id", programId)
        .order("semester");

    if(error){

        alert(error.message);
        return;

    }

    // remove duplicates
    const semesters =
        [...new Set(
            data.map(s => s.semester)
        )];

    semesters.forEach(semester=>{

        select.innerHTML += `
            <option value="${semester}">
                Semester ${semester}
            </option>
        `;

    });

}

async function loadSubjects(){

    const programId=document.getElementById("programFilter").value;
    const semester=document.getElementById("semesterFilter").value;
    const container=document.getElementById("subjects");

    container.innerHTML="";

    if(!programId) return;

let query = supabase
    .from("subjects")
    .select(`
        id,
        name,
        institute,
        credits,
        mandatory,
        semester
    `)
    .eq("program_id", programId);

if (semester) {

    query = query.eq("semester", semester);

}

const { data, error } = await query
    .order("semester")
    .order("name");

    if(error){

        alert(error.message);
        return;

    }

    container.innerHTML=`

<div class="subjectToolbar">

<label>
<input
type="checkbox"
id="checkAllSubjects">
Select All
</label>

<div id="selectedCount">

0 / ${data.length} selected

</div>

</div>

<input
type="text"
id="subjectSearch"
placeholder="🔍 Search subjects...">

<hr>

<div id="subjectList"></div>

`;

    const list=document.getElementById("subjectList");

    data.forEach(subject=>{

        const hasInstitute =
    subject.institute &&
    subject.institute.trim() !== "";

const instituteBadge = hasInstitute
    ? `
        <span
            class="subjectBadge"
            style="background:${INSTITUTE_COLORS[subject.institute] || "#666"};">
            ${subject.institute}
        </span>
      `
    : "";

list.innerHTML += `

<label class="subjectRow">

    <input
        type="checkbox"
        class="subjectCheck"
        value="${subject.id}">

    <div class="subjectName">
        ${subject.name}
    </div>
    
    <span class="badgeSemester">
        Сем. ${subject.semester}
    </span>
    
    ${instituteBadge}

    <span class="badgeCredits">
        ${subject.credits} ЕКТС
    </span>

    <span class="${
        subject.mandatory
            ? "badgeMandatory"
            : "badgeElective"
    }">
        ${
            subject.mandatory
            ?
            "Задолжителен"
            :
            "Изборен"
       }
    </span>

</label>

`;

    });

    initSubjectSelection();

}

function refreshProfessorsDebounced(){

    clearTimeout(professorRefreshTimer);

    professorRefreshTimer = setTimeout(async ()=>{

        await loadProfessors();

    },250);

}

        function updatePreviewStats(){

    // Subjects selected
    const subjectCount =
        document.querySelectorAll(".subjectCheck:checked").length;

    document.getElementById("previewSubjects").innerText =
        subjectCount;

    // Professor
    const professor =
        document.getElementById("professorFilter");

    document.getElementById("previewProfessor").innerText =
        professor.options[professor.selectedIndex]?.text
        || "All";

}
        
function initSubjectSelection(){

    const all=document.getElementById("checkAllSubjects");

    const checks=document.querySelectorAll(".subjectCheck");

    const counter=document.getElementById("selectedCount");

    const search=document.getElementById("subjectSearch");

    function updateCounter(){

        const selected=[...checks]
            .filter(c=>c.checked).length;

        counter.innerText=
            `${selected} / ${checks.length} selected`;

        all.checked=
            selected===checks.length;

        checks.forEach(c=>{

            c.closest(".subjectRow")
                .classList.toggle(
                    "selected",
                    c.checked
                );

        });
        updatePreviewStats();
        refreshPreview();
    }    

    checks.forEach(c=>{

    c.addEventListener(
        "change",
        async ()=>{

            updateCounter();

            refreshProfessorsDebounced();

        }
    );

});

    all.addEventListener("change",()=>{

        checks.forEach(c=>{

            if(c.closest(".subjectRow").style.display!=="none"){

                c.checked=all.checked;

            }

        });

        updateCounter();
        refreshProfessorsDebounced();
    });

    search.addEventListener("input",()=>{

        const term=
            search.value.toLowerCase();

        document
        .querySelectorAll(".subjectRow")
        .forEach(row=>{

            row.style.display=
                row.innerText
                .toLowerCase()
                .includes(term)
                ? "flex"
                : "none";

        });

    });

    updateCounter();

}


async function loadProfessors() {

    const programId =
        document.getElementById("programFilter").value;

    const semester =
        document.getElementById("semesterFilter").value;

    const select =
        document.getElementById("professorFilter");
    const currentProfessor =
    select.value;

    if (!programId)
        return;

    // Selected subjects
    const selectedSubjects =
        [...document.querySelectorAll(".subjectCheck:checked")]
        .map(c => Number(c.value));

    let query =
        supabase
        .from("events")
        .select(`
            professor_id,
            professors (
                id,
                name
            ),
            subjects!inner(
                program_id,
                semester
            )
        `)
        .eq("subjects.program_id", programId);

    if (semester) {

        query =
            query.eq(
                "subjects.semester",
                semester
            );

    }

    if (selectedSubjects.length > 0) {

        query =
            query.in(
                "subject_id",
                selectedSubjects
            );

    }

    const { data, error } =
        await query;

    if (error) {

        console.error(error);

        return;

    }

    const unique = [];

    data.forEach(row => {

        if (!row.professors)
            return;

        if (
            !unique.find(
                p => p.id === row.professors.id
            )
        ) {

            unique.push(row.professors);

        }

    });

    unique.sort((a, b) =>
        a.name.localeCompare(
            b.name,
            "mk"
        )
    );

    select.innerHTML =
        `<option value="">All Professors</option>`;

    unique.forEach(p => {

    select.innerHTML += `
<option value="${p.id}">
${p.name}
</option>
`;

});

select.value = currentProfessor;
    
    
    if (professorSelect) {

        professorSelect.destroy();

    }

    professorSelect =
        new TomSelect(
            "#professorFilter",
            {
                create:false,
                allowEmptyOption:true,
                placeholder:"Search professor..."
            }
        );
    
    professorSelect.on("change",()=>{
        updatePreviewStats();
        refreshPreview();
    });
}

        async function getFilteredEvents(){

    const programId =
        document.getElementById("programFilter").value;

    if(!programId)
        return [];

    const semester =
        document.getElementById("semesterFilter").value;

    const professorId =
        document.getElementById("professorFilter").value;

    const selectedSubjects =
        [...document.querySelectorAll(".subjectCheck:checked")]
        .map(c => Number(c.value));

    let query =
        supabase
        .from("events")
        .select(`
            id,
            event_date,
            event_time,
            type,
            groups_text,

            subjects!inner(
                id,
                name,
                semester,
                program_id
            ),

            professors(
                id,
                name
            ),

            rooms(
                id,
                name
            )
        `)
        .eq(
            "subjects.program_id",
            programId
        );

    if(semester){

        query =
            query.eq(
                "subjects.semester",
                semester
            );

    }

    if(selectedSubjects.length){

        query =
            query.in(
                "subject_id",
                selectedSubjects
            );

    }

    if(professorId){

        query =
            query.eq(
                "professor_id",
                professorId
            );

    }

    const {data,error} =
        await query;

    if(error){

        console.error(error);

        return [];

    }

    return data;

}

        async function refreshPreview(){

    const events =
        await getFilteredEvents();

    console.log(events);

}


        async function loadPreview(){

    const programId =
        document.getElementById("programFilter").value;

    if(!programId){

        document.getElementById("previewEvents").innerText = "0";
        document.getElementById("previewList").innerHTML =
            `<div class="emptyPreview">
                Select a program.
            </div>`;

        return;

    }

    const semester =
        document.getElementById("semesterFilter").value;

    const professor =
        document.getElementById("professorFilter").value;

    const selectedSubjects =
        [...document.querySelectorAll(".subjectCheck:checked")]
        .map(c => Number(c.value));

    let query =
        supabase
        .from("events")
        .select(`
            *,
            subjects(
                name,
                semester
            ),
            professors(
                name
            ),
            rooms(
                name
            )
        `);

    if(selectedSubjects.length){

        query =
            query.in(
                "subject_id",
                selectedSubjects
            );

    }else{

        // Filter by program using joined subjects
        query =
            query.eq(
                "subjects.program_id",
                programId
            );

        if(semester){

            query =
                query.eq(
                    "subjects.semester",
                    semester
                );

        }

    }

    if(professor){

        query =
            query.eq(
                "professor_id",
                professor
            );

    }

    const { data, error } =
        await query;

    if(error){

        console.error(error);

        return;

    }

    document.getElementById(
        "previewEvents"
    ).innerText = data.length;

    renderPreview(data);

}

function renderPreview(events){

    const preview =
        document.getElementById("previewList");

    if(events.length===0){

        preview.innerHTML = `
        <div class="emptyPreview">

            No matching events.

        </div>
        `;

        return;

    }

    events.sort((a,b)=>{

        if(a.event_date!==b.event_date){

            return a.event_date.localeCompare(
                b.event_date
            );

        }

        return a.event_time.localeCompare(
            b.event_time
        );

    });

    preview.innerHTML="";

    events.slice(0,50).forEach(event=>{
        preview.innerHTML += `
            <div class="previewEvent">
                <div>
                    <strong>
                        ${event.event_date}
                    </strong>
                    &nbsp;
                    ${event.event_time.substring(0,5)}
                </div>
                <div>
                    ${event.subjects?.name || ""}
                </div>
                <div style="font-size:12px;color:#666;">
                    ${event.type}
                    &nbsp;
                    •
                    &nbsp;
                    ${event.rooms?.name || ""}
                    &nbsp;
                    •
                    &nbsp;
                    ${event.professors?.name || ""}
                </div>
            </div>
        `;

    });

}
        

document.addEventListener("DOMContentLoaded", async () => {

    loadAcademicYears();

    await loadPrograms();

document
.getElementById("programFilter")
.addEventListener(
    "change",
    async () => {

        await loadSemesters();

        // Reset semester selection
        document.getElementById("semesterFilter").value = "";

        // Load all subjects for the selected program
        await loadSubjects();
        await loadProfessors();
        await refreshPreview();

    }
);

document
.getElementById("semesterFilter")
.addEventListener(
    "change",
    async () => {

        await loadSubjects();
        await loadProfessors();
        await refreshPreview();

    }
);
updatePreviewStats();
});

        
  </script>
