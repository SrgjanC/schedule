<!DOCTYPE html>
<html lang="mk">
<head>

<meta charset="UTF-8">

<title>Calendar Subscription</title>

<style>

body{

    font-family:Arial;
    background:#f4f6fb;
    margin:30px;

}

.container{

    max-width:900px;
    margin:auto;

    background:white;

    padding:25px;

    border-radius:10px;

    box-shadow:0 0 10px rgba(0,0,0,.08);

}

h2{

    margin-top:0;

    color:#3f69b1;

}

.section{

    margin-bottom:25px;

}

label{

    display:block;

    margin-bottom:6px;

    font-weight:bold;

}

select{

    width:100%;

    padding:8px;

    font-size:14px;

}

#subjects{

    border:1px solid #ddd;

    border-radius:6px;

    padding:10px;

    max-height:320px;

    overflow:auto;

    background:white;

}

.subject{

    padding:6px;

}

button{

    background:#3f69b1;

    color:white;

    border:none;

    padding:12px 20px;

    border-radius:6px;

    font-size:15px;

    cursor:pointer;

}

button:disabled{

    background:#999;

    cursor:not-allowed;

}

    /* Subject toolbar */

.subjectToolbar{

    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
    gap:10px;
    flex-wrap:wrap;

}

#subjectSearch{

    flex:1;
    min-width:220px;
    padding:8px 12px;
    border:1px solid #ccc;
    border-radius:6px;

}

#selectedCount{

    font-size:13px;
    color:#666;
    white-space:nowrap;

}

/* Subject row */

.subjectRow{

    display:flex;
    align-items:center;
    gap:10px;
    padding:8px 10px;
    border-bottom:1px solid #eee;
    transition:.15s;

}

.subjectRow:hover{

    background:#f7faff;

}

.subjectName{

    flex:1;
    font-size:14px;

}

.subjectBadge{

    color:white;
    font-size:11px;
    font-weight:bold;
    border-radius:12px;
    padding:3px 8px;
    min-width:42px;
    text-align:center;

}

.badgeMandatory{

    background:#d1fae5;
    color:#065f46;
    padding:3px 8px;
    border-radius:10px;
    font-size:11px;

}

.badgeElective{

    background:#dbeafe;
    color:#1e40af;
    padding:3px 8px;
    border-radius:10px;
    font-size:11px;

}

.badgeCredits{

    background:#f3f4f6;
    padding:3px 8px;
    border-radius:10px;
    font-size:11px;

}

.subjectRow.selected{
    background:#e8f2ff;
    border-left:4px solid #3f69b1;
    padding-left:6px;

}

.badgeSemester{
    background:#eef2ff;
    color:#4338ca;
    padding:3px 8px;
    border-radius:10px;
    font-size:11px;
    font-weight:bold;
}
</style>

</head>

<body>
    



        

<div class="container">

<h2>📅 Calendar Subscription</h2>

<div class="section">

<label>Academic Year</label>

<select id="yearFilter"></select>

</div>

<div class="section">

<label>Program</label>

<select id="programFilter"></select>

</div>

<div class="section">

<label>Semester</label>

<select id="semesterFilter"></select>

</div>

<div class="section">

<label>Subjects</label>

<div id="subjects"></div>

</div>

<div class="section">

<label>Professor (optional)</label>

<select id="professorFilter"></select>

</div>

<button
id="createBtn"
disabled>

📅 Create Subscription

</button>

</div>

    <script type="module">

import { createClient }
from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
    'https://elmxwpwhyewgjlvoadtb.supabase.co',
    'sb_publishable_yUCov2V1dKGEc-rBwt6v2A_dBkHEiYd'
);

    const INSTITUTE_INFO = {

    "ИФТ":{
        name:"Институт за фармацевтска технологија",
        color:"#4F46E5"
    },

    "ИХ":{
        name:"Институт за хемија",
        color:"#059669"
    },

    "ИБ":{
        name:"Институт за биологија",
        color:"#0891B2"
    },

    "ИФ":{
        name:"Институт за фармакологија",
        color:"#DC2626"
    },

    "ИФК":{
        name:"Институт за фармакогнозија",
        color:"#CA8A04"
    }

};
        const INSTITUTE_COLORS = {

    "ИФГ":"#4CAF50",   // Green
    "ИПБ":"#2196F3",   // Blue
    "ИФТ":"#F44336",   // Red
    "ИФХ":"#FF9800",   // Orange
    "ИПХФА":"#9C27B0"  // Purple

};
        
        
  function loadAcademicYears(){

    const select =
        document.getElementById("yearFilter");

      select.innerHTML = "";

    const now =
        new Date();

    const year =
        now.getMonth() >= 9
        ? now.getFullYear()
        : now.getFullYear()-1;

    for(let i=-1;i<=3;i++){

        const start =
            year+i;

        const end =
            start+1;

        select.innerHTML +=
        `<option value="${start}">
            ${start}/${end}
        </option>`;

    }

}

async function loadPrograms(){

    const select =
        document.getElementById("programFilter");

    select.innerHTML =
        `<option value="">-- Select Program --</option>`;

    const { data, error } =
        await supabase
        .from("programs")
        .select("*")
        .order("name");

    if(error){

        alert(error.message);
        return;

    }

    data.forEach(program=>{

        select.innerHTML += `
            <option value="${program.id}">
                ${program.name}
            </option>
        `;

    });

}

        async function loadSemesters(){

    const programId =
        document.getElementById("programFilter").value;

    const select =
        document.getElementById("semesterFilter");

    select.innerHTML =
        `<option value="">-- Select Semester --</option>`;

    if(!programId)
        return;

    const { data, error } =
        await supabase
        .from("subjects")
        .select("semester")
        .eq("program_id", programId)
        .order("semester");

    if(error){

        alert(error.message);
        return;

    }

    // remove duplicates
    const semesters =
        [...new Set(
            data.map(s => s.semester)
        )];

    semesters.forEach(semester=>{

        select.innerHTML += `
            <option value="${semester}">
                Semester ${semester}
            </option>
        `;

    });

}

async function loadSubjects(){

    const programId=document.getElementById("programFilter").value;
    const semester=document.getElementById("semesterFilter").value;
    const container=document.getElementById("subjects");

    container.innerHTML="";

    if(!programId || !semester) return;

let query = supabase
    .from("subjects")
    .select(`
        id,
        name,
        institute,
        credits,
        mandatory,
        semester
    `)
    .eq("program_id", programId);

if (semester) {

    query = query.eq("semester", semester);

}

const { data, error } = await query
    .order("semester")
    .order("name");

    if(error){

        alert(error.message);
        return;

    }

    container.innerHTML=`

<div class="subjectToolbar">

<label>
<input
type="checkbox"
id="checkAllSubjects">
Select All
</label>

<div id="selectedCount">

0 / ${data.length} selected

</div>

</div>

<input
type="text"
id="subjectSearch"
placeholder="🔍 Search subjects...">

<hr>

<div id="subjectList"></div>

`;

    const list=document.getElementById("subjectList");

    data.forEach(subject=>{

        const hasInstitute =
    subject.institute &&
    subject.institute.trim() !== "";

const instituteBadge = hasInstitute
    ? `
        <span
            class="subjectBadge"
            style="background:${INSTITUTE_COLORS[subject.institute] || "#666"};">
            ${subject.institute}
        </span>
      `
    : "";

list.innerHTML += `

<label class="subjectRow">

    <input
        type="checkbox"
        class="subjectCheck"
        value="${subject.id}">

    <div class="subjectName">
        ${subject.name}
    </div>
    
    <span class="badgeSemester">
        Сем. ${subject.semester}
    </span>
    
    ${instituteBadge}

    <span class="badgeCredits">
        ${subject.credits} ЕКТС
    </span>

    <span class="${
        subject.mandatory
            ? "badgeMandatory"
            : "badgeElective"
    }">
        ${
            subject.mandatory
            ?
            "Задолжителен"
            :
            "Изборен"
       }
    </span>

</label>

`;

    });

    initSubjectSelection();

}


        
function initSubjectSelection(){

    const all=document.getElementById("checkAllSubjects");

    const checks=document.querySelectorAll(".subjectCheck");

    const counter=document.getElementById("selectedCount");

    const search=document.getElementById("subjectSearch");

    function updateCounter(){

        const selected=[...checks]
            .filter(c=>c.checked).length;

        counter.innerText=
            `${selected} / ${checks.length} selected`;

        all.checked=
            selected===checks.length;

        checks.forEach(c=>{

            c.closest(".subjectRow")
                .classList.toggle(
                    "selected",
                    c.checked
                );

        });

    }    

    checks.forEach(c=>{

        c.addEventListener(
            "change",
            updateCounter
        );

    });

    all.addEventListener("change",()=>{

        checks.forEach(c=>{

            if(c.closest(".subjectRow").style.display!=="none"){

                c.checked=all.checked;

            }

        });

        updateCounter();

    });

    search.addEventListener("input",()=>{

        const term=
            search.value.toLowerCase();

        document
        .querySelectorAll(".subjectRow")
        .forEach(row=>{

            row.style.display=
                row.innerText
                .toLowerCase()
                .includes(term)
                ? "flex"
                : "none";

        });

    });

    updateCounter();

}

document.addEventListener("DOMContentLoaded", async () => {

    loadAcademicYears();

    await loadPrograms();

    document
.getElementById("programFilter")
.addEventListener(
    "change",
    async ()=>{

        await loadSemesters();

        document.getElementById("subjects").innerHTML="";

    }
);

document
.getElementById("semesterFilter")
.addEventListener(
    "change",
    loadSubjects
);

});

        
  </script>
