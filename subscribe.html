<!DOCTYPE html>
<html lang="mk">
<head>

<meta charset="UTF-8">

<title>Calendar Subscription</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f4f6fb;
    margin:30px;
}

/* ==========================
   Layout
========================== */

.container{
    max-width:1500px;
    margin:auto;
    background:#fff;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.08);
}

.mainLayout{
    display:grid;
    grid-template-columns:420px 1fr;
    gap:25px;
    align-items:start;
}

.leftPanel{
    display:flex;
    flex-direction:column;
    gap:18px;
}

.rightPanel{
    border-left:1px solid #ddd;
    padding-left:25px;
}

@media (max-width:1000px){

    .mainLayout{
        grid-template-columns:1fr;
    }

    .rightPanel{
        border-left:none;
        border-top:1px solid #ddd;
        padding-left:0;
        padding-top:20px;
    }

}

/* ==========================
   General
========================== */

h2{
    margin-top:0;
    color:#3f69b1;
}

.section{
    margin-bottom:25px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
}

select{
    width:100%;
    padding:8px;
    font-size:14px;
}

button{
    background:#3f69b1;
    color:#fff;
    border:none;
    padding:12px 20px;
    border-radius:6px;
    font-size:15px;
    cursor:pointer;
}

button:disabled{
    background:#999;
    cursor:not-allowed;
}

/* ==========================
   Subjects
========================== */

#subjects{
    border:1px solid #ddd;
    border-radius:6px;
    padding:10px;

    overflow:auto;
    background:#fff;
}

.subject{

.subjectToolbar{

}

#subjectSearch{
    flex:1;
    min-width:220px;
    padding:8px 12px;
    border:1px solid #ccc;
    border-radius:6px;
}

#selectedCount{
    font-size:13px;
    color:#666;
    white-space:nowrap;
}

.subjectRow{
    display:flex;
    align-items:center;
    gap:10px;
    padding:8px 10px;
    border-bottom:1px solid #eee;
    transition:.15s;
}

.subjectRow:hover{
    background:#f7faff;
}

.subjectRow.selected{
    background:#e8f2ff;
    border-left:4px solid #3f69b1;
    padding-left:6px;
}

.subjectName{
    flex:1;
    font-size:14px;
}

/* ==========================
   Badges
========================== */

.subjectBadge{
    color:#fff;
    font-size:11px;
    font-weight:bold;
    border-radius:12px;
    padding:3px 8px;
    min-width:42px;
    text-align:center;
}

.badgeMandatory{
    background:#d1fae5;
    color:#065f46;
    padding:3px 8px;
    border-radius:10px;
    font-size:11px;
}

.badgeElective{
    background:#dbeafe;
    color:#1e40af;
    padding:3px 8px;
    border-radius:10px;
    font-size:11px;
}

.badgeCredits{
    background:#f3f4f6;
    padding:3px 8px;
    border-radius:10px;
    font-size:11px;
}

.badgeSemester{
    background:#eef2ff;
    color:#4338ca;
    padding:3px 8px;
    border-radius:10px;
    font-size:11px;
    font-weight:bold;
}

/* ==========================
   Preview Header
========================== */

#previewHeader{
    display:flex;
    flex-direction:column;
    gap:15px;
    margin-bottom:25px;
}

.previewCard{
    background:#f9fbff;
    border:1px solid #dde7ff;
    border-radius:10px;
    padding:15px;
}

.previewCard h4{
    margin:0 0 10px;
    color:#3f69b1;
}

.previewSubjectItem{
    padding:4px 0;
    font-size:14px;
}

/* ==========================
   Preview Events
========================== */

#previewList{
    border:1px solid #ddd;
    border-radius:8px;
    background:#fff;
    min-height:500px;
    max-height:700px;
    overflow:auto;
}

.emptyPreview{
    padding:40px;
    text-align:center;
    color:#777;
}

.previewEvent{
    padding:14px;
    border-bottom:1px solid #ececec;
}

.previewEvent:hover{
    background:#f7fbff;
}

.previewDate{
    color:#3f69b1;
    font-weight:bold;
}

.previewSubject{
    margin-top:5px;
    font-weight:bold;
}

.previewInfo{
    margin-top:4px;
    color:#666;
    font-size:13px;
}

.previewMore{
    padding:20px;
    text-align:center;
    color:#777;
    font-style:italic;
}
    
.previewDay{
    position:sticky;
    top:0;
    background:#eef4ff;
    color:#3f69b1;
    font-weight:bold;
    padding:10px 14px;
    border-bottom:2px solid #d6e4ff;
    z-index:1;
}

.previewTime{
    font-size:15px;
    font-weight:bold;
    color:#3f69b1;
    margin-bottom:5px;
}

    border-radius:10px;

.successCard h3{

    <script type="module">

import { createClient }
from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
    'https://elmxwpwhyewgjlvoadtb.supabase.co',
    'sb_publishable_yUCov2V1dKGEc-rBwt6v2A_dBkHEiYd'
);


let professorSelect = null;
        let professorRefreshTimer = null;
    

        const INSTITUTE_COLORS = {

    "ИФГ":"#4CAF50",   // Green
    "ИПБ":"#2196F3",   // Blue
    "ИФТ":"#F44336",   // Red
    "ИФХ":"#FF9800",   // Orange
    "ИПХФА":"#9C27B0"  // Purple

};
        
        
  function loadAcademicYears(){

    const select =
        document.getElementById("yearFilter");

      select.innerHTML = "";

    const now =
        new Date();

    const year =
        now.getMonth() >= 9
        ? now.getFullYear()
        : now.getFullYear()-1;

    for(let i=-1;i<=3;i++){

        const start =
            year+i;

        const end =
            start+1;

        select.innerHTML +=
        `<option value="${start}">
            ${start}/${end}
        </option>`;

    }

}

async function loadPrograms(){

    const select =
        document.getElementById("programFilter");

    select.innerHTML =
        `<option value="">-- Select Program --</option>`;

    const { data, error } =
        await supabase
        .from("programs")
        .select("*")
        .order("name");

    if(error){

        alert(error.message);
        return;

    }

    data.forEach(program=>{

        select.innerHTML += `
            <option value="${program.id}">
                ${program.name}
            </option>
        `;

    });

}

        async function loadSemesters(){

    const programId =
        document.getElementById("programFilter").value;

    const select =
        document.getElementById("semesterFilter");

    select.innerHTML =
        `<option value="">-- Select Semester --</option>`;

    if(!programId)
        return;

    const { data, error } =
        await supabase
        .from("subjects")
        .select("semester")
        .eq("program_id", programId)
        .order("semester");

    if(error){

        alert(error.message);
        return;

    }

    // remove duplicates
    const semesters =
        [...new Set(
            data.map(s => s.semester)
        )];

    semesters.forEach(semester=>{

        select.innerHTML += `
            <option value="${semester}">
                Semester ${semester}
            </option>
        `;

    });

}

async function loadSubjects(){

    const programId=document.getElementById("programFilter").value;
    const semester=document.getElementById("semesterFilter").value;
    const container=document.getElementById("subjects");

    container.innerHTML="";

    if(!programId) return;

let query = supabase
    .from("subjects")
    .select(`
        id,
        name,
        institute,
        credits,
        mandatory,
        semester
    `)
    .eq("program_id", programId);

if (semester) {

    query = query.eq("semester", semester);

}

const { data, error } = await query
    .order("semester")
    .order("name");

    if(error){

        alert(error.message);
        return;

    }

    container.innerHTML=`

<div class="subjectToolbar">

<label>
<input
type="checkbox"
id="checkAllSubjects">
Select All
</label>

<div id="selectedCount">

0 / ${data.length} selected

</div>

</div>

<input
type="text"
id="subjectSearch"
placeholder="🔍 Search subjects...">

<hr>

<div id="subjectList"></div>

`;

    const list=document.getElementById("subjectList");

    data.forEach(subject=>{

        const hasInstitute =
    subject.institute &&
    subject.institute.trim() !== "";

const instituteBadge = hasInstitute
    ? `
        <span
            class="subjectBadge"
            style="background:${INSTITUTE_COLORS[subject.institute] || "#666"};">
            ${subject.institute}
        </span>
      `
    : "";

list.innerHTML += `

<label class="subjectRow">

    <input
        type="checkbox"
        class="subjectCheck"
        value="${subject.id}">

    <div class="subjectName">
        ${subject.name}
    </div>
    
    <span class="badgeSemester">
        Сем. ${subject.semester}
    </span>
    
    ${instituteBadge}

    <span class="badgeCredits">
        ${subject.credits} ЕКТС
    </span>

    <span class="${
        subject.mandatory
            ? "badgeMandatory"
            : "badgeElective"
    }">
        ${
            subject.mandatory
            ?
            "Задолжителен"
            :
            "Изборен"
       }
    </span>

</label>

`;

    });

    initSubjectSelection();

}

function refreshProfessorsDebounced(){

    clearTimeout(professorRefreshTimer);

    professorRefreshTimer = setTimeout(async ()=>{

        await loadProfessors();

    },250);

}

function updatePreviewStats(){

    const selected =
        [...document.querySelectorAll(".subjectCheck:checked")];

    const list =
        document.getElementById(
            "previewSubjectsList"
        );

    if(selected.length===0){

        list.innerHTML =
            "<i>All subjects</i>";

    }else{

        list.innerHTML =
            selected.map(s=>{

                const row =
                    s.closest(".subjectRow");

                const name =
                    row.querySelector(".subjectName").innerText;

                return `
<div class="previewSubjectItem">

✔ ${name}

</div>
`;

            }).join("");

    }

    const professor =
        document.getElementById(
            "professorFilter"
        );

    document.getElementById(
        "previewProfessor"
    ).innerText =
        professor.options[
            professor.selectedIndex
        ]?.text || "All Professors";

}
        
function initSubjectSelection(){

    const all=document.getElementById("checkAllSubjects");

    const checks=document.querySelectorAll(".subjectCheck");

    const counter=document.getElementById("selectedCount");

    const search=document.getElementById("subjectSearch");

    function updateCounter(){

        const selected=[...checks]
            .filter(c=>c.checked).length;

        counter.innerText=
            `${selected} / ${checks.length} selected`;

        all.checked=
            selected===checks.length;

        checks.forEach(c=>{

            c.closest(".subjectRow")
                .classList.toggle(
                    "selected",
                    c.checked
                );

        });
        updatePreviewStats();
        refreshPreview();
    }    

    checks.forEach(c=>{

    c.addEventListener(
        "change",
        async ()=>{

            updateCounter();

            refreshProfessorsDebounced();

        }
    );

});

    all.addEventListener("change",()=>{

        checks.forEach(c=>{

            if(c.closest(".subjectRow").style.display!=="none"){

                c.checked=all.checked;

            }

        });

        updateCounter();
        refreshProfessorsDebounced();
    });

    search.addEventListener("input",()=>{

        const term=
            search.value.toLowerCase();

        document
        .querySelectorAll(".subjectRow")
        .forEach(row=>{

            row.style.display=
                row.innerText
                .toLowerCase()
                .includes(term)
                ? "flex"
                : "none";

        });

    });

    updateCounter();

}


async function loadProfessors() {

    const programId =
        document.getElementById("programFilter").value;

    const semester =
        document.getElementById("semesterFilter").value;

    const select =
        document.getElementById("professorFilter");
    const currentProfessor =
    select.value;

    if (!programId)
        return;

    // Selected subjects
    const selectedSubjects =
        [...document.querySelectorAll(".subjectCheck:checked")]
        .map(c => Number(c.value));

    let query =
        supabase
        .from("events")
        .select(`
            professor_id,
            professors (
                id,
                name
            ),
            subjects!inner(
                program_id,
                semester
            )
        `)
        .eq("subjects.program_id", programId);

    if (semester) {

        query =
            query.eq(
                "subjects.semester",
                semester
            );

    }

    if (selectedSubjects.length > 0) {

        query =
            query.in(
                "subject_id",
                selectedSubjects
            );

    }

    const { data, error } =
        await query;

    if (error) {

        console.error(error);

        return;

    }

    const unique = [];

    data.forEach(row => {

        if (!row.professors)
            return;

        if (
            !unique.find(
                p => p.id === row.professors.id
            )
        ) {

            unique.push(row.professors);

        }

    });

    unique.sort((a, b) =>
        a.name.localeCompare(
            b.name,
            "mk"
        )
    );

    select.innerHTML =
        `<option value="">All Professors</option>`;

    unique.forEach(p => {

    select.innerHTML += `
<option value="${p.id}">
${p.name}
</option>
`;

});

select.value = currentProfessor;
    
    
    if (professorSelect) {

        professorSelect.destroy();

    }

    professorSelect =
        new TomSelect(
            "#professorFilter",
            {
                create:false,
                allowEmptyOption:true,
                placeholder:"Search professor..."
            }
        );
    
    professorSelect.on("change",()=>{
        updatePreviewStats();
        refreshPreview();
    });
}

        async function getFilteredEvents(){

    const programId =
        document.getElementById("programFilter").value;

    if(!programId)
        return [];

    const semester =
        document.getElementById("semesterFilter").value;

    const professorId =
        document.getElementById("professorFilter").value;

    const selectedSubjects =
        [...document.querySelectorAll(".subjectCheck:checked")]
        .map(c => Number(c.value));

    let query =
        supabase
        .from("events")
        .select(`
            id,
            event_date,
            event_time,
            type,
            groups_text,

            subjects!inner(
                id,
                name,
                semester,
                program_id
            ),

            professors(
                id,
                name
            ),

            rooms(
                id,
                name
            )
        `)
        .eq(
            "subjects.program_id",
            programId
        );

    if(semester){

        query =
            query.eq(
                "subjects.semester",
                semester
            );

    }

    if(selectedSubjects.length){

        query =
            query.in(

    }

        query =
            query.eq(
                "professor_id",
                professorId
            );

    }

    const {data,error} =
        await query;

    if(error){

        console.error(error);

        return [];

    }
console.log(data[0]);
    return data;

}


        function getSelectedSubjects(){

    return [...document.querySelectorAll(".subjectCheck:checked")]
        .map(c => Number(c.value));

}

        
async function createSubscription(){

    const filters = {

        academicYear:
    document.getElementById("yearFilter")
        .options[
            document.getElementById("yearFilter").selectedIndex
        ].text,

        program:
            document.getElementById("programFilter").value,

        semester:
            document.getElementById("semesterFilter").value || null,

        subjects:
            getSelectedSubjects(),

        professor:
            document.getElementById("professorFilter").value || null

    };

    const events =
        await getFilteredEvents();

const response = await fetch(
    "https://elmxwpwhyewgjlvoadtb.supabase.co/functions/v1/super-worker",
    {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            filters,
            eventCount: events.length
        })
    }
);

if(!response.ok){

    alert("Failed to create subscription.");

    return;

}

const result = await response.json();

showSubscription(
    result.calendarUrl
);

}


function showSubscription(url){

    document.getElementById(
        "subscriptionUrl"
    ).value = url;

    document.getElementById(
        "subscriptionResult"
    ).style.display = "block";

}
        

async function refreshPreview(){

    const events =
        await getFilteredEvents();

    updatePreviewStats();

    document.getElementById(
        "previewEvents"
    ).innerText = events.length;

    renderPreview(events);

}



        function formatPreviewDate(dateString){

    const d = new Date(dateString);

    return d.toLocaleDateString(
        "mk-MK",
        {
            weekday:"long",
            day:"2-digit",
            month:"2-digit",
            year:"numeric"
        }
    );

}

function addHour(time){

    const [h,m]=time.split(":").map(Number);

    const d=new Date();

    d.setHours(h,m);

    d.setHours(d.getHours()+1);

    return d.toTimeString().substring(0,5);

}
        function mergeEvents(events){

    const merged=[];

    events.forEach(event=>{

        const last=merged[merged.length-1];

        if(

            last &&

            last.event_date===event.event_date &&

            last.subjects.id===event.subjects.id &&

            last.type===event.type &&

            (last.rooms?.id||0)===(event.rooms?.id||0) &&

            (last.professors?.id||0)===(event.professors?.id||0) &&

            addHour(last.endTime)===event.event_time.substring(0,5)

        ){

            last.endTime=event.event_time.substring(0,5);

        }

        else{

            merged.push({

                ...event,

                startTime:event.event_time.substring(0,5),

                endTime:event.event_time.substring(0,5)

            });

        }

    });

    return merged;

}
        
function renderPreview(events){

    const preview =
        document.getElementById(
            "previewList"
        );

    preview.innerHTML="";

    if(events.length===0){

        preview.innerHTML=`

<div class="emptyPreview">

No matching events.

</div>

`;

        return;

    }

    events.sort((a,b)=>{

        if(a.event_date!==b.event_date){

            return a.event_date.localeCompare(
                b.event_date
            );

        }

        return a.event_time.localeCompare(
            b.event_time
        );

    });
    events = mergeEvents(events);

    let currentDate = "";

events.slice(0,20).forEach(event=>{

    if(currentDate !== event.event_date){

        currentDate = event.event_date;

        preview.innerHTML += `

<div class="previewDay">

📅 ${formatPreviewDate(currentDate)}

</div>

`;

    }

    preview.innerHTML += `

<div class="previewEvent">

<div class="previewTime">

${event.startTime}

-

${addHour(event.endTime)}

</div>

<div class="previewSubject">

${event.subjects.name}

</div>

<div class="previewInfo">

${event.type}

${event.rooms
    ? " • " + event.rooms.name
    : ""}

${event.professors
    ? " • " + event.professors.name
    : ""}

</div>

</div>

`;

});

    if(events.length>20){

        preview.innerHTML += `

<div class="previewMore">

Showing first 20 of ${events.length} events

</div>

`;

    }

}
        

        async function loadPreview(){

    const programId =
        document.getElementById("programFilter").value;

    if(!programId){

        document.getElementById("previewEvents").innerText = "0";
        document.getElementById("previewList").innerHTML =
            `<div class="emptyPreview">
                Select a program.
            </div>`;

        return;

    }

    const semester =
        document.getElementById("semesterFilter").value;

    const professor =
        document.getElementById("professorFilter").value;

    const selectedSubjects =
        [...document.querySelectorAll(".subjectCheck:checked")]
        .map(c => Number(c.value));

    let query =
        supabase
        .from("events")
        .select(`
            *,
            subjects(
                name,
                semester
            ),
            professors(
                name
            ),
            rooms(
                name
            )
        `);

    if(selectedSubjects.length){

        query =
            query.in(
                "subject_id",
                selectedSubjects
            );

    }else{

        // Filter by program using joined subjects
        query =
            query.eq(
                "subjects.program_id",
                programId
            );

        if(semester){

            query =
                query.eq(
                    "subjects.semester",
                    semester
                );

        }

    }

    if(professor){

        query =
            query.eq(
                "professor_id",
                professor
            );

    }

    const { data, error } =
        await query;

    if(error){

        console.error(error);

        return;

    }

    document.getElementById(
        "previewEvents"
    ).innerText = data.length;

    renderPreview(data);

}


        function addOneHour(time){

    const [h,m]=time.split(":").map(Number);

    const d=new Date();

    d.setHours(h,m+60,0);

    return d.toTimeString().substring(0,5)+":00";

}
