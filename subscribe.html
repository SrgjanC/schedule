<!DOCTYPE html>
<html lang="mk">
<head>

<meta charset="UTF-8">

<title>Calendar Subscription</title>

<style>

body{

    font-family:Arial;
    background:#f4f6fb;
    margin:30px;

}

.container{

    max-width:900px;
    margin:auto;

    background:white;

    padding:25px;

    border-radius:10px;

    box-shadow:0 0 10px rgba(0,0,0,.08);

}

h2{

    margin-top:0;

    color:#3f69b1;

}

.section{

    margin-bottom:25px;

}

label{

    display:block;

    margin-bottom:6px;

    font-weight:bold;

}

select{

    width:100%;

    padding:8px;

    font-size:14px;

}

#subjects{

    border:1px solid #ddd;

    border-radius:6px;

    padding:10px;

    max-height:320px;

    overflow:auto;

    background:white;

}

.subject{

    padding:6px;

}

button{

    background:#3f69b1;

    color:white;

    border:none;

    padding:12px 20px;

    border-radius:6px;

    font-size:15px;

    cursor:pointer;

}

button:disabled{

    background:#999;

    cursor:not-allowed;

}

</style>

</head>

<body>
    



        

<div class="container">

<h2>📅 Calendar Subscription</h2>

<div class="section">

<label>Academic Year</label>

<select id="yearFilter"></select>

</div>

<div class="section">

<label>Program</label>

<select id="programFilter"></select>

</div>

<div class="section">

<label>Semester</label>

<select id="semesterFilter"></select>

</div>

<div class="section">

<label>Subjects</label>

<div id="subjects"></div>

</div>

<div class="section">

<label>Professor (optional)</label>

<select id="professorFilter"></select>

</div>

<button
id="createBtn"
disabled>

📅 Create Subscription

</button>

</div>

    <script type="module">

import { createClient }
from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
    'https://elmxwpwhyewgjlvoadtb.supabase.co',
    'sb_publishable_yUCov2V1dKGEc-rBwt6v2A_dBkHEiYd'
);

        
  function loadAcademicYears(){

    const select =
        document.getElementById("yearFilter");

      select.innerHTML = "";

    const now =
        new Date();

    const year =
        now.getMonth() >= 9
        ? now.getFullYear()
        : now.getFullYear()-1;

    for(let i=-1;i<=3;i++){

        const start =
            year+i;

        const end =
            start+1;

        select.innerHTML +=
        `<option value="${start}">
            ${start}/${end}
        </option>`;

    }

}

async function loadPrograms(){

    const select =
        document.getElementById("programFilter");

    select.innerHTML =
        `<option value="">-- Select Program --</option>`;

    const { data, error } =
        await supabase
        .from("programs")
        .select("*")
        .order("name");

    if(error){

        alert(error.message);
        return;

    }

    data.forEach(program=>{

        select.innerHTML += `
            <option value="${program.id}">
                ${program.name}
            </option>
        `;

    });

}

        async function loadSemesters(){

    const programId =
        document.getElementById("programFilter").value;

    const select =
        document.getElementById("semesterFilter");

    select.innerHTML =
        `<option value="">-- Select Semester --</option>`;

    if(!programId)
        return;

    const { data, error } =
        await supabase
        .from("subjects")
        .select("semester")
        .eq("program_id", programId)
        .order("semester");

    if(error){

        alert(error.message);
        return;

    }

    // remove duplicates
    const semesters =
        [...new Set(
            data.map(s => s.semester)
        )];

    semesters.forEach(semester=>{

        select.innerHTML += `
            <option value="${semester}">
                Semester ${semester}
            </option>
        `;

    });

}

        async function loadSubjects(){

    const programId =
        document.getElementById("programFilter").value;

    const semester =
        document.getElementById("semesterFilter").value;

    const container =
        document.getElementById("subjects");

    container.innerHTML = "";

    if(!programId || !semester)
        return;

    const { data, error } =
        await supabase
        .from("subjects")
        .select(`
            id,
            name,
            institute
        `)
        .eq("program_id", programId)
        .eq("semester", semester)
        .order("name");

    if(error){

        alert(error.message);
        return;

    }

    // Select All
    container.innerHTML += `
        <div class="subject">
            <label>
                <input
                    type="checkbox"
                    id="checkAllSubjects"
                >
                <b>Select All</b>
            </label>
        </div>
        <hr>
    `;

    data.forEach(subject=>{

        container.innerHTML += `
            <div class="subject">

                <label>

                    <input
                        type="checkbox"
                        class="subjectCheck"
                        value="${subject.id}"
                    >

                    ${subject.name}

                </label>

            </div>
        `;

    });

    initSubjectSelection();

}
        function initSubjectSelection(){

    const all =
        document.getElementById(
            "checkAllSubjects"
        );

    const checks =
        document.querySelectorAll(
            ".subjectCheck"
        );

    all.addEventListener("change",()=>{

        checks.forEach(c=>{

            c.checked = all.checked;

        });

    });

}

document.addEventListener("DOMContentLoaded", async () => {

    loadAcademicYears();

    await loadPrograms();

    document
.getElementById("programFilter")
.addEventListener(
    "change",
    async ()=>{

        await loadSemesters();

        document.getElementById("subjects").innerHTML="";

    }
);

document
.getElementById("semesterFilter")
.addEventListener(
    "change",
    loadSubjects
);

});

        
  </script>
