<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>Admin Распоред 2.2</title>

<style>

body{
    font-family:Arial;
    padding:20px;
    margin:0;
}

h2{
    margin-bottom:15px;
}

.controls{
    margin-bottom:15px;
}

select,
button,
input{
    padding:6px 8px;
    margin-right:8px;
    font-size:14px;
}

table{
    border-collapse:collapse;
    width:100%;
    table-layout:fixed;
}

th,td{
    border:1px solid #333;
    padding:4px;
    vertical-align:top;
    font-size:12px;
}

th{
    background:#3f69b1;
    color:white;
    text-align:center;
}

.time-col{
    width:70px;
    background:#f5f5f5;
    font-weight:bold;
    text-align:center;
}

.slot{
    min-height:70px;
    cursor:pointer;
    transition:0.15s;
}

.slot:hover{
    background:#eef4ff;
}

.event{
    background:#d9e8ff;
    border:1px solid #6f9be8;
    border-radius:4px;
    padding:4px;
    font-size:11px;
    line-height:1.3;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal-content{
    background:white;
    padding:20px;
    width:420px;
    border-radius:8px;
}

.modal-content h3{
    margin-top:0;
}

.modal-content label{
    display:block;
    margin-top:10px;
    margin-bottom:4px;
    font-size:13px;
}

.modal-content select,
.modal-content input{
    width:100%;
    box-sizing:border-box;
}

.modal-buttons{
    margin-top:15px;
    text-align:right;
}

.delete-btn{
    background:#c0392b;
    color:white;
    border:none;
}

.save-btn{
    background:#2e7d32;
    color:white;
    border:none;
}

.close-btn{
    background:#777;
    color:white;
    border:none;
}

.info{
    margin:10px 0;
    color:#444;
}

</style>
</head>

<body>

<h2>Admin Распоред</h2>

<div class="controls">

<label>Датум:</label>
<input type="date" id="datePicker">

<button id="todayBtn">Денес</button>

</div>

<div class="info" id="info"></div>

<table id="scheduleTable">

<thead>
<tr>
<th class="time-col">Час</th>

<th>01 пред.</th>
<th>02 пред.</th>
<th>03 пред.</th>
<th>04 пред.</th>

<th>08 лаб.</th>
<th>09 лаб.</th>
<th>10 лаб.</th>
<th>11 лаб.</th>
<th>12 лаб.</th>
<th>14 лаб.</th>

<th>НФИЦ</th>
<th>Инст. за Физиологија</th>
<th>Инст. за Микробиологија</th>
<th>Инст. за Анатомија</th>
<th>ПМФ</th>
<th>Фак. за физичко образование</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

<div class="modal" id="modal">

<div class="modal-content">

<h3>Распоред</h3>

<label>Програма</label>
<select id="programSelect"></select>

<label>Семестар</label>
<select id="semesterSelect"></select>

<label>Предмет</label>
<select id="subjectSelect"></select>

<label>Тип</label>
<select id="typeSelect">
<option value="Предавање">Предавање</option>
<option value="Вежби">Вежби</option>
<option value="Колоквиум">Колоквиум</option>
<option value="Испит">Испит</option>
</select>

    <label>Просторија</label>
<select id="roomSelect"></select>
    
<label>Професор</label>
<select id="professorSelect"></select>

<label>Групи</label>
<input type="text" id="groupsInput">

<label>Коментар</label>
<input type="text" id="commentInput">

<div class="modal-buttons">

<button class="delete-btn" id="deleteBtn">Delete</button>

<button class="close-btn" id="closeBtn">Cancel</button>

<button class="save-btn" id="saveBtn">Save</button>

</div>

</div>
</div>

<script type="module">

import { createClient }
from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabaseUrl =
'https://elmxwpwhyewgjlvoadtb.supabase.co';

const supabaseKey =
'YOUR_SUPABASE_KEY';

const supabase =
    createClient(
        supabaseUrl,
        supabaseKey
    );



/* =====================================================
   GLOBALS
===================================================== */

let events = [];
let programs = [];
let subjects = [];
let professors = [];
let rooms = [];

let currentDate = "";
let currentRoom = "";
let currentTime = "";
let editingId = null;



/* =====================================================
   HELPERS
===================================================== */

function todayISO(){

    const t = new Date();

    return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,"0")}-${String(t.getDate()).padStart(2,"0")}`;
}

const LAB_ROOMS = [
"08 лаб.","09 лаб.","10 лаб.","11 лаб.",
"12 лаб.","14 лаб.","НФИЦ"
];

const TIMES = [];

for(let h=8; h<=20; h++){

    TIMES.push(
        String(h).padStart(2,"0")+":00"
    );
}



/* =====================================================
   LOGGING
===================================================== */

async function addLog(action, eventData){

    const room =
        rooms.find(r =>
            r.id == eventData.room_id
        );

    const subject =
        subjects.find(s =>
            s.id == eventData.subject_id
        );

    const professor =
        professors.find(p =>
            p.id == eventData.professor_id
        );

    const payload = {

        action,

        event_id:
            eventData.id || null,

        event_date:
            eventData.event_date,

        event_time:
            eventData.event_time,

        room_id:
            eventData.room_id,

        room_name:
            room?.name || "",

        subject_id:
            eventData.subject_id,

        subject_name:
            subject?.name || "",

        professor_id:
            eventData.professor_id || null,

        professor_name:
            professor?.name || "",

        type:
            eventData.type || "",

        groups_text:
            eventData.groups_text || "",

        comment:
            eventData.comment || ""
    };

    const { error } =
        await supabase
        .from('logs')
        .insert([payload]);

    console.log(error);
}



/* =====================================================
   LOAD DATA
===================================================== */

async function loadAll(){

    const { data: programsData } =
        await supabase
        .from('programs')
        .select('*')
        .order('name');

    programs = programsData || [];


    const { data: subjectsData } =
        await supabase
        .from('subjects')
        .select('*')
        .order('semester');

    subjects = subjectsData || [];


    const { data: professorsData } =
        await supabase
        .from('professors')
        .select('*')
        .order('name');

    professors = professorsData || [];


    const { data: roomsData } =
        await supabase
        .from('rooms')
        .select('*')
        .order('name');

    rooms = roomsData || [];


    const { data: eventsData } =
        await supabase
        .from('events')
        .select(`
            *,
            subjects (
                id,
                name,
                semester,
                program_id
            ),
            professors (
                id,
                name
            ),
            rooms (
                id,
                name
            )
        `);

    events = (eventsData || []).map(e => ({

        id: e.id,

        date: e.event_date,

        time:
            e.event_time?.substring(0,5),

        room_id:
            e.room_id,

        room:
            e.rooms?.name || "",

        subjectId:
            e.subject_id,

        semester:
            e.subjects?.semester || "",

        programId:
            e.subjects?.program_id || "",

        type:
            e.type,

        professor_id:
            e.professor_id,

        groups:
            e.groups_text,

        comment:
            e.comment
    }));

    fillPrograms();
    fillProfessors();
    fillRooms();

    render();
}



/* =====================================================
   SELECTS
===================================================== */

function fillPrograms(){

    const sel =
        document.getElementById("programSelect");

    sel.innerHTML = "";

    programs.forEach(p => {

        sel.innerHTML += `
        <option value="${p.id}">
            ${p.name}
        </option>`;
    });

    updateSubjects();

    sel.onchange = updateSubjects;
}

function fillProfessors(){

    const sel =
        document.getElementById("professorSelect");

    sel.innerHTML =
        `<option value="">--</option>`;

    professors.forEach(p => {

        sel.innerHTML += `
        <option value="${p.id}">
            ${p.name}
        </option>`;
    });
}

function fillRooms(){

    const sel =
        document.getElementById("roomSelect");

    sel.innerHTML = "";

    rooms.forEach(r => {

        sel.innerHTML += `
        <option value="${r.id}">
            ${r.name}
        </option>`;
    });
}

function updateSubjects(){

    const programId =
        document.getElementById("programSelect").value;

    const semesterSel =
        document.getElementById("semesterSelect");

    const subjectSel =
        document.getElementById("subjectSelect");

    const filtered =
        subjects.filter(s =>
            String(s.program_id) === String(programId)
        );

    const semesters =
        [...new Set(filtered.map(s => s.semester))]
        .sort((a,b)=>a-b);

    semesterSel.innerHTML = "";

    semesters.forEach(s => {

        semesterSel.innerHTML += `
        <option value="${s}">
            ${s}
        </option>`;
    });

    function refreshSubjects(){

        const sem =
            semesterSel.value;

        const list =
            filtered.filter(s =>
                String(s.semester) === String(sem)
            );

        subjectSel.innerHTML = "";

        list.forEach(s => {

            subjectSel.innerHTML += `
            <option value="${s.id}">
                ${s.name}
            </option>`;
        });
    }

    refreshSubjects();

    semesterSel.onchange =
        refreshSubjects;
}



/* =====================================================
   RENDER
===================================================== */

function render(){

    const tbody =
        document.getElementById("tbody");

    tbody.innerHTML = "";

    const selectedDate =
        document.getElementById("datePicker").value;

    TIMES.forEach(time => {

        let row = `
        <tr>
            <td class="time-col">${time}</td>
        `;

        rooms.forEach(room => {

            const event =
                events.find(e =>
                    e.date === selectedDate &&
                    e.time === time &&
                    e.room_id === room.id
                );

            let content = "";

            if(event){

                const subject =
                    subjects.find(s =>
                        s.id == event.subjectId
                    );

                content = `
                <div class="event">
                    <b>${subject?.name || ""}</b><br>
                    ${event.type || ""}
                </div>`;
            }

            row += `
            <td class="slot"
                data-room="${room.id}"
                data-time="${time}"
                onclick="openSlot(this)">
                ${content}
            </td>`;
        });

        row += "</tr>";

        tbody.innerHTML += row;
    });
}



/* =====================================================
   OPEN SLOT
===================================================== */

window.openSlot = function(cell){

    currentRoom =
        Number(cell.dataset.room);

    currentTime =
        cell.dataset.time;

    currentDate =
        document.getElementById("datePicker").value;

    const existing =
        events.find(e =>
            e.date === currentDate &&
            e.time === currentTime &&
            e.room_id === currentRoom
        );

    editingId =
        existing?.id || null;

    if(existing){

        document.getElementById("roomSelect").value =
            existing.room_id;

        document.getElementById("programSelect").value =
            existing.programId;

        updateSubjects();

        document.getElementById("semesterSelect").value =
            existing.semester;

        updateSubjects();

        document.getElementById("subjectSelect").value =
            existing.subjectId;

        document.getElementById("typeSelect").value =
            existing.type;

        document.getElementById("professorSelect").value =
            existing.professor_id || "";

        document.getElementById("groupsInput").value =
            existing.groups || "";

        document.getElementById("commentInput").value =
            existing.comment || "";
    }
    else{

        editingId = null;

        document.getElementById("roomSelect").value =
            currentRoom;
    }

    document.getElementById("modal").style.display =
        "flex";
};



/* =====================================================
   SAVE EVENT
===================================================== */

document.getElementById("saveBtn")
.addEventListener("click", async ()=>{

    const payload = {

        event_date:
            currentDate,

        event_time:
            currentTime,

        room_id:
            Number(
                document.getElementById("roomSelect").value
            ),

        subject_id:
            Number(
                document.getElementById("subjectSelect").value
            ),

        type:
            document.getElementById("typeSelect").value,

        professor_id:
            document.getElementById("professorSelect").value || null,

        groups_text:
            document.getElementById("groupsInput").value,

        comment:
            document.getElementById("commentInput").value
    };



    /* UPDATE */

    if(editingId){

        const { error } =
            await supabase
            .from('events')
            .update(payload)
            .eq('id', editingId);

        console.log(error);

        if(!error){

            await addLog(
                "UPDATE",
                {
                    id: editingId,
                    ...payload
                }
            );
        }
    }



    /* INSERT */

    else{

        const {
            data: inserted,
            error
        } =
            await supabase
            .from('events')
            .insert([payload])
            .select();

        console.log(error);

        if(!error && inserted?.length){

            await addLog(
                "ADD",
                inserted[0]
            );
        }
    }

    await loadAll();

    document.getElementById("modal").style.display =
        "none";
});



/* =====================================================
   DELETE
===================================================== */

document.getElementById("deleteBtn")
.addEventListener("click", async ()=>{

    if(!editingId)
        return;

    const existing =
        events.find(e =>
            e.id === editingId
        );

    if(existing){

        await addLog(
            "DELETE",
            {
                id: existing.id,

                event_date:
                    existing.date,

                event_time:
                    existing.time,

                room_id:
                    existing.room_id,

                subject_id:
                    existing.subjectId,

                professor_id:
                    existing.professor_id,

                type:
                    existing.type,

                groups_text:
                    existing.groups,

                comment:
                    existing.comment
            }
        );
    }

    const { error } =
        await supabase
        .from('events')
        .delete()
        .eq('id', editingId);

    console.log(error);

    await loadAll();

    document.getElementById("modal").style.display =
        "none";
});



/* =====================================================
   CLOSE
===================================================== */

document.getElementById("closeBtn")
.addEventListener("click",()=>{

    document.getElementById("modal").style.display =
        "none";
});



/* =====================================================
   INIT
===================================================== */

document.getElementById("datePicker").value =
    todayISO();

document.getElementById("datePicker")
.addEventListener("change", render);

loadAll();

</script>
</body>
</html>
