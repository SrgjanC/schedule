<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>Admin Распоред 2.2</title>

<style>

body{
    font-family:Arial;
    padding:20px;
    margin:0;
}

h2{
    margin-bottom:15px;
}

.controls{
    margin-bottom:15px;
}

select,
button,
input{
    padding:6px 8px;
    margin-right:8px;
    font-size:14px;
}

table{
    border-collapse:collapse;
    width:100%;
    table-layout:fixed;
}

th,td{
    border:1px solid #333;
    padding:4px;
    vertical-align:top;
    font-size:12px;
}

th{
    background:#3f69b1;
    color:white;
    text-align:center;
}

.time-col{
    width:70px;
    background:#f5f5f5;
    font-weight:bold;
    text-align:center;
}

.slot{
    min-height:70px;
    cursor:pointer;
    transition:0.15s;
}

.slot:hover{
    background:#eef4ff;
}

.event{
    background:#d9e8ff;
    border:1px solid #6f9be8;
    border-radius:4px;
    padding:4px;
    font-size:11px;
    line-height:1.3;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal-content{
    background:white;
    padding:20px;
    width:420px;
    border-radius:8px;
}

.modal-content h3{
    margin-top:0;
}

.modal-content label{
    display:block;
    margin-top:10px;
    margin-bottom:4px;
    font-size:13px;
}

.modal-content select,
.modal-content input{
    width:100%;
    box-sizing:border-box;
}

.modal-buttons{
    margin-top:15px;
    text-align:right;
}

.delete-btn{
    background:#c0392b;
    color:white;
    border:none;
}

.save-btn{
    background:#2e7d32;
    color:white;
    border:none;
}

.close-btn{
    background:#777;
    color:white;
    border:none;
}

.info{
    margin:10px 0;
    color:#444;
}

</style>
</head>

<body>

<h2>Admin Распоред</h2>

<div class="controls">

<label>Датум:</label>
<input type="date" id="datePicker">

<button id="todayBtn">Денес</button>

</div>

<div class="info" id="info"></div>

<table id="scheduleTable">

<thead>
<tr>
<th class="time-col">Час</th>

<th>01 пред.</th>
<th>02 пред.</th>
<th>03 пред.</th>
<th>04 пред.</th>

<th>08 лаб.</th>
<th>09 лаб.</th>
<th>10 лаб.</th>
<th>11 лаб.</th>
<th>12 лаб.</th>
<th>14 лаб.</th>

<th>НФИЦ</th>
<th>Инст. за Физиологија</th>
<th>Инст. за Микробиологија</th>
<th>Инст. за Анатомија</th>
<th>ПМФ</th>
<th>Фак. за физичко образование</th>
<th>Кат. за Медицинска физика</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

<div class="modal" id="modal">

<div class="modal-content">

<h3>Распоред</h3>

<label>Програма</label>
<select id="programSelect"></select>

<label>Семестар</label>
<select id="semesterSelect"></select>

<label>Предмет</label>
<select id="subjectSelect"></select>
    
<label>Тип на настава</label>
<select id="typeSelect"></select>

    <label>Просторија</label>
<select id="roomSelect"></select>
    
<label>Професор</label>
<select id="professorSelect"></select>

<label>Групи</label>
<input type="text" id="groupsInput">

<label>Коментар</label>
<input type="text" id="commentInput">

<div class="modal-buttons">

<button class="delete-btn" id="deleteBtn">Delete</button>

<button class="close-btn" id="closeBtn">Cancel</button>

<button class="save-btn" id="saveBtn">Save</button>

</div>

</div>
</div>

<script type="module">

import { createClient }
from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabaseUrl =
'https://elmxwpwhyewgjlvoadtb.supabase.co';

const supabaseKey =
'sb_publishable_yUCov2V1dKGEc-rBwt6v2A_dBkHEiYd';

const supabase =
createClient(supabaseUrl, supabaseKey);

const LAB_ROOMS = [
"08 лаб.","09 лаб.","10 лаб.",
"11 лаб.","12 лаб.","14 лаб.","НФИЦ"
];
const DAY_ROOMS = [
"01 пред.","02 пред.","03 пред.","04 пред.",
"08 лаб.","09 лаб.","10 лаб.","11 лаб.","12 лаб.","14 лаб.",
"НФИЦ",
"Инст. за Физиологија",
"Инст. за Микробиологија",
"Инст. за Анатомија",
"ПМФ",
"Фак. за физичко образование",
"Кат. за Медицинска физика"
];
const TIMES = [];

for(let h=8; h<=20; h++){
    TIMES.push(
        String(h).padStart(2,"0")+":00"
    );
}

let events = [];
let programs = [];
let subjects = [];
let professors = [];
let rooms = [];
let lessonTypes = [];
    
let currentDate = "";
let currentTime = "";
let editingId = null;

function todayISO(){

    const t = new Date();

    return `${t.getFullYear()}-${
        String(t.getMonth()+1).padStart(2,"0")
    }-${
        String(t.getDate()).padStart(2,"0")
    }`;
}

function fillRooms(){

    const sel =
        document.getElementById("roomSelect");

    sel.innerHTML = "";

    rooms.forEach(r=>{

        sel.innerHTML += `
        <option value="${r.id}">
            ${r.name}
        </option>`;
    });
}

function fillProfessors(){

    const sel =
        document.getElementById("professorSelect");

    sel.innerHTML =
        `<option value="">--</option>`;

    professors.forEach(p=>{

        sel.innerHTML += `
        <option value="${p.id}">
            ${p.name}
        </option>`;
    });
}

function fillPrograms(){

    const sel =
        document.getElementById("programSelect");

    sel.innerHTML = "";

    programs.forEach(p=>{

        sel.innerHTML += `
        <option value="${p.id}">
            ${p.name}
        </option>`;
    });

    updateSubjects();

    sel.onchange = updateSubjects;
}

function updateSubjects(){

    const programId =
        document.getElementById("programSelect").value;

    const semesterSel =
        document.getElementById("semesterSelect");

    const subjectSel =
        document.getElementById("subjectSelect");

    const filtered =
        subjects.filter(s =>
            String(s.program_id) === String(programId)
        );

    const semesters =
        [...new Set(
            filtered.map(s=>s.semester)
        )];

    semesterSel.innerHTML = "";

    semesters.forEach(s=>{

        semesterSel.innerHTML += `
        <option value="${s}">
            ${s}
        </option>`;
    });

    function refreshSubjects(){

        const sem = semesterSel.value;

        const list =
            filtered.filter(s =>
                String(s.semester) === String(sem)
            );

        subjectSel.innerHTML = "";

        list.forEach(s=>{

            subjectSel.innerHTML += `
            <option value="${s.id}">
                ${s.name}
            </option>`;
        });
    }

    refreshSubjects();

    semesterSel.onchange = refreshSubjects;
}
async function addLog(action, payload){

    const room =
        rooms.find(r =>
            Number(r.id) === Number(payload.room_id)
        );

    const subject =
        subjects.find(s =>
            Number(s.id) === Number(payload.subject_id)
        );

    const professor =
        professors.find(p =>
            Number(p.id) === Number(payload.professor_id)
        );

    const logData = {

        action,

        event_id:
            payload.event_id || null,

        event_date:
            payload.event_date,

        event_time:
            payload.event_time,

        room_id:
            payload.room_id || "",

        room_name:
            room?.name || "",

        subject_id:
            payload.subject_id || "",

        subject_name:
            subject?.name || "",

        professor_id:
            payload.professor_id || null,

        professor_name:
            professor?.name || "",

        type:
            payload.type || "",

        groups_text:
            payload.groups_text || "",

        comment:
            payload.comment || ""
    };

    const { error } =
        await supabase
        .from('logs')
        .insert([logData]);

    console.log("LOG:", error);
}

    function fillLessonTypes(){

    const sel =
        document.getElementById("typeSelect");

    sel.innerHTML = "";

    lessonTypes.forEach(t => {

        sel.innerHTML += `
        <option value="${t.name}">
            ${t.name}
        </option>`;
    });
}
    
async function loadAll(){

    const { data: p1 } =
        await supabase
        .from('programs')
        .select('*')
        .order('id', { ascending: true });

    programs = p1 || [];

    const { data: p2 } =
        await supabase
        .from('subjects')
        .select('*')
        .order('semester');

    subjects = p2 || [];

    const { data: p3 } =
        await supabase
        .from('professors')
        .select('*')
        .order('id', { ascending: true });

    professors = p3 || [];
    
const { data: lt } =
    await supabase
    .from('lesson_types')
    .select('*')
    .order('id');

lessonTypes = lt || [];
    const { data: p4 } =
        await supabase
        .from('rooms')
        .select('*')
        .order('name');

    rooms = p4 || [];

    fillRooms();
    fillProfessors();
    fillPrograms();
    fillLessonTypes();

    const selectedDate =
    document.getElementById("datePicker").value;

const { data: p5, error } =
    await supabase
    .from('events')
    .select(`
        *,
        subjects (
            id,
            name,
            semester,
            program_id
        ),
        professors (
            id,
            name
        ),
        rooms (
            id,
            name
        )
    `)
    .eq('event_date', selectedDate)
    .order('event_time', { ascending: true });

    
console.log("ROOMS:", rooms);
console.log("EVENTS:", p5);
    console.log(error);

    events = (p5 || []).map(e=>({

        id: e.id,

        date: e.event_date,

        time:
            e.event_time?.substring(0,5),

        room_id: e.room_id,

        room:
            e.rooms?.name || "",

        subjectId:
            e.subject_id,

        semester:
            e.subjects?.semester || "",

        programId:
            e.subjects?.program_id || "",

        type:
            e.type || "",

        professor_id:
            e.professor_id || null,

        professor:
            e.professors?.name || "",

        groups:
            e.groups_text || "",

        comment:
            e.comment || ""
    }));

    render();
}

function render(){

    const tbody =
        document.getElementById("tbody");

    tbody.innerHTML = "";

    const selectedDate =
        document.getElementById("datePicker").value;

    TIMES.forEach(time=>{

        let row = `
        <tr>
        <td class="time-col">${time}</td>
        `;

        DAY_ROOMS.forEach(roomName => {

    const room =
        rooms.find(r => r.name === roomName);

    if(!room){

        row += `<td></td>`;
        return;
    }

            const event =
                events.find(e=>

                    e.date === selectedDate &&
                    e.time === time &&
                    Number(e.room_id) === Number(room.id)
                );

            let content = "";

            if(event){

                const subject =
                    subjects.find(s=>
                        s.id == event.subjectId
                    );

                const program =
                    programs.find(p=>
                        p.id == event.programId
                    );

                content = `
                <div class="event">
                    <b>${subject?.name || ""}</b><br>
                    ${program?.name || ""}<br>
                    Сем. ${event.semester}<br>
                    ${event.type}<br>
                    ${event.professor}
                </div>`;
            }

            row += `
            <td class="slot"
                data-room="${room.id}"
                data-time="${time}"
                onclick="openSlot(this)">
                ${content}
            </td>`;
        });

        row += "</tr>";

        tbody.innerHTML += row;
    });
}

window.openSlot = function(cell){

    currentDate =
        document.getElementById("datePicker").value;

    currentTime =
        cell.dataset.time;

    const roomId =
        Number(cell.dataset.room);

    const existing =
        events.find(e=>

            e.date === currentDate &&
            e.time === currentTime &&
            Number(e.room_id) === roomId
        );

    editingId = existing?.id || null;

    document.getElementById("roomSelect").value =
        roomId;

    if(existing){

        document.getElementById("programSelect").value =
            existing.programId;

        updateSubjects();

        document.getElementById("semesterSelect").value =
            existing.semester;

        updateSubjects();

        document.getElementById("subjectSelect").value =
            existing.subjectId;

        document.getElementById("typeSelect").value =
            existing.type;

        document.getElementById("professorSelect").value =
            existing.professor_id || "";

        document.getElementById("groupsInput").value =
            existing.groups;

        document.getElementById("commentInput").value =
            existing.comment;
    }
    else{

        document.getElementById("typeSelect").value =
            "Предавање";

        document.getElementById("professorSelect").value =
            "";

        document.getElementById("groupsInput").value =
            "";

        document.getElementById("commentInput").value =
            "";
    }

    document.getElementById("modal").style.display =
        "flex";
};

document.getElementById("closeBtn")
.onclick = ()=>{

    document.getElementById("modal").style.display =
        "none";
};

document.getElementById("saveBtn")
.onclick = async ()=>{

    const selectedRoomId =
        Number(
            document.getElementById("roomSelect").value
        );

    const subjectId =
        Number(
            document.getElementById("subjectSelect").value
        );

    const type =
        document.getElementById("typeSelect").value;

    const professor_id =
        document.getElementById("professorSelect").value || null;

    const groups =
        document.getElementById("groupsInput").value;

    const comment =
        document.getElementById("commentInput").value;

    const selectedSubject =
    subjects.find(s =>
        Number(s.id) === subjectId
    );

const selectedProgramId =
    selectedSubject?.program_id;

const selectedSemester =
    selectedSubject?.semester;

const sameGroupConflict =
    events.find(e => {

        if(
            e.date !== currentDate ||
            e.time !== currentTime
        ){
            return false;
        }

        if(
            String(e.id) === String(editingId)
        ){
            return false;
        }

        const sameProgram =
            String(e.programId) ===
            String(selectedProgramId);

        const sameSemester =
            String(e.semester) ===
            String(selectedSemester);

        if(!sameProgram || !sameSemester){
            return false;
        }

        // allow only Вежби + Вежби
        const parallelAllowed = [
    "Вежби",
    "Испит",
    "Практичен испит"
];

if(
    parallelAllowed.includes(e.type) &&
    parallelAllowed.includes(type) &&
    e.type === type
){
    return false;
}


if(sameGroupConflict){

    alert(
        "Оваа програма и семестар веќе имаат настава во истиот термин."
    );

    return;
}
}
    
    const roomConflict =
        events.find(e=>

            e.date === currentDate &&
            e.time === currentTime &&
            Number(e.room_id) === selectedRoomId &&
            String(e.id) !== String(editingId)
        );

    if(roomConflict){

        alert("Просторијата е зафатена.");

        return;
    }

    const payload = {

        event_date: currentDate,

        event_time: currentTime,

        room_id: selectedRoomId,

        subject_id: subjectId,

        type,

        professor_id,

        groups_text: groups,

        comment
    };

    let error;

    if(editingId){

    ({ error } =
        await supabase
        .from('events')
        .update(payload)
        .eq('id', editingId)
    );

    if(!error){

        await addLog(
            "UPDATE",
            payload
        );
    }
}
    else{

    ({ error } =
        await supabase
        .from('events')
        .insert([payload])
    );

    if(!error){

        await addLog(
            "ADD",
            payload
        );
    }
}

    console.log(error);

    if(error){

        alert(error.message);

        return;
    }

    document.getElementById("modal").style.display =
        "none";

    await loadAll();
};

document.getElementById("deleteBtn")
.onclick = async ()=>{

    if(!editingId) return;

    if(!confirm("Delete?")) return;
const existing =
    events.find(e =>
        e.id === editingId
    );

if(existing){

    await addLog(
        "DELETE",
        {

            event_date:
                existing.date,

            event_time:
                existing.time,

            room_id:
                existing.room_id,

            subject_id:
                existing.subjectId,

            type:
                existing.type,

            professor_id:
                existing.professor_id,

            groups_text:
                existing.groups,

            comment:
                existing.comment
        }
    );
}
    const { error } =
        await supabase
        .from('events')
        .delete()
        .eq('id', editingId);

    console.log(error);

    document.getElementById("modal").style.display =
        "none";

    await loadAll();
};

document.getElementById("datePicker").value =
    todayISO();

document.getElementById("datePicker")
.addEventListener("change", loadAll);

document.getElementById("todayBtn")
.addEventListener("click",()=>{

    document.getElementById("datePicker").value =
        todayISO();

    loadAll();
});

loadAll();

</script>

</body>
</html>
