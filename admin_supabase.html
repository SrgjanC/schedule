<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>Admin Распоред 2.2</title>

<style>

body{
    font-family:Arial;
    padding:20px;
    margin:0;
}

h2{
    margin-bottom:15px;
}

.controls{
    margin-bottom:15px;
}

select,
button,
input{
    padding:6px 8px;
    margin-right:8px;
    font-size:14px;
}

table{
    border-collapse:collapse;
    width:100%;
    table-layout:fixed;
}

th,td{
    border:1px solid #333;
    padding:4px;
    vertical-align:top;
    font-size:12px;
}

th{
    background:#3f69b1;
    color:white;
    text-align:center;
}

.time-col{
    width:70px;
    background:#f5f5f5;
    font-weight:bold;
    text-align:center;
}

.slot{
    min-height:70px;
    cursor:pointer;
    transition:0.15s;
}

.slot:hover{
    background:#eef4ff;
}

.event{
    background:#d9e8ff;
    border:1px solid #6f9be8;
    border-radius:4px;
    padding:4px;
    font-size:11px;
    line-height:1.3;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal-content{
    background:white;
    padding:20px;
    width:420px;
    border-radius:8px;
}

.modal-content h3{
    margin-top:0;
}

.modal-content label{
    display:block;
    margin-top:10px;
    margin-bottom:4px;
    font-size:13px;
}

.modal-content select,
.modal-content input{
    width:100%;
    box-sizing:border-box;
}

.modal-buttons{
    margin-top:15px;
    text-align:right;
}

.delete-btn{
    background:#c0392b;
    color:white;
    border:none;
}

.save-btn{
    background:#2e7d32;
    color:white;
    border:none;
}

.close-btn{
    background:#777;
    color:white;
    border:none;
}

.info{
    margin:10px 0;
    color:#444;
}

</style>
</head>

<body>

<h2>Admin Распоред</h2>

<div class="controls">

<label>Датум:</label>
<input type="date" id="datePicker">

<button id="todayBtn">Денес</button>

</div>

<div class="info" id="info"></div>

<table id="scheduleTable">

<thead>
<tr>
<th class="time-col">Час</th>

<th>01 пред.</th>
<th>02 пред.</th>
<th>03 пред.</th>
<th>04 пред.</th>

<th>08 лаб.</th>
<th>09 лаб.</th>
<th>10 лаб.</th>
<th>11 лаб.</th>
<th>12 лаб.</th>
<th>14 лаб.</th>

<th>НФИЦ</th>

</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

<div class="modal" id="modal">

<div class="modal-content">

<h3>Распоред</h3>

<label>Програма</label>
<select id="programSelect"></select>

<label>Семестар</label>
<select id="semesterSelect"></select>

<label>Предмет</label>
<select id="subjectSelect"></select>

<label>Тип</label>
<select id="typeSelect">
<option value="Предавање">Предавање</option>
<option value="Вежби">Вежби</option>
<option value="Колоквиум">Колоквиум</option>
<option value="Испит">Испит</option>
</select>

<label>Професор</label>
<select id="professorSelect"></select>

<label>Групи</label>
<input type="text" id="groupsInput">

<label>Коментар</label>
<input type="text" id="commentInput">

<div class="modal-buttons">

<button class="delete-btn" id="deleteBtn">Delete</button>

<button class="close-btn" id="closeBtn">Cancel</button>

<button class="save-btn" id="saveBtn">Save</button>

</div>

</div>
</div>

<script type="module">

import { createClient }
from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabaseUrl =
'https://elmxwpwhyewgjlvoadtb.supabase.co';

const supabaseKey =
'sb_publishable_yUCov2V1dKGEc-rBwt6v2A_dBkHEiYd';

const supabase =
    createClient(
        supabaseUrl,
        supabaseKey
    );



const ROOMS = [
"01 пред.","02 пред.","03 пред.","04 пред.",
"08 лаб.","09 лаб.","10 лаб.","11 лаб.",
"12 лаб.","14 лаб.","НФИЦ"
];

const LAB_ROOMS = [
"08 лаб.","09 лаб.","10 лаб.","11 лаб.",
"12 лаб.","14 лаб.","НФИЦ"
];

const TIMES = [];

for(let h=8; h<=20; h++){
    TIMES.push(String(h).padStart(2,"0")+":00");
}

let events = [];
let programs = [];
let subjects = [];
    let professors = [];

let currentDate = "";
let currentRoom = "";
let currentTime = "";
let editingId = null;

function todayISO(){

    const t = new Date();

    return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,"0")}-${String(t.getDate()).padStart(2,"0")}`;
}
    function fillProfessors(){

    const sel =
        document.getElementById("professorSelect");

    sel.innerHTML = `<option value="">--</option>`;

    professors.forEach(p => {

        sel.innerHTML += `
        <option value="${p.id}">
            ${p.name}
        </option>`;
    });
}

async function loadAll(){

    // PROGRAMS

    const {
        data: programsData,
        error: programsError
    } =
        await supabase
            .from('programs')
            .select('*')
            .order('name');

    console.log(programsError);

    programs = programsData || [];

    // SUBJECTS

    const {
        data: subjectsData,
        error: subjectsError
    } =
        await supabase
            .from('subjects')
            .select('*')
            .order('semester');

    console.log(subjectsError);

    subjects = subjectsData || [];

    // PROFESSORS
const { data: professorsData, error: professorsError } =
    await supabase
        .from('professors')
        .select('*')
        .order('name');

console.log(professorsError);

professors = professorsData || [];
    
    // EVENTS WITH RELATIONS

    const {
        data: eventsData,
        error: eventsError
    } =
        await supabase
            .from('events')
            .select(`
                *,
                subjects (
                    id,
                    name,
                    semester,
                    program_id
                )
            `);

    console.log(eventsError);
fillProfessors();
    events = (eventsData || []).map(e => ({

        id: e.id,

        date: e.event_date,
        time: e.event_time?.substring(0,5),

        room: e.room,

        subjectId: e.subject_id,

        semester:
            e.subjects?.semester || "",

        programId:
            e.subjects?.program_id || "",

        type: e.type,
        professor_id: e.professor_id,
        groups: e.groups_text,
        comment: e.comment
    }));

    initFilters();

    render();
}



function initFilters(){

    const datePicker =
        document.getElementById("datePicker");

    datePicker.value = todayISO();

    datePicker.addEventListener("change",render);

    document.getElementById("todayBtn")
        .addEventListener("click",()=>{

            datePicker.value = todayISO();

            render();
        });

    fillPrograms();
}

function fillPrograms(){

    const sel =
        document.getElementById("programSelect");

    sel.innerHTML = "";

    programs.forEach(p=>{

        sel.innerHTML += `
        <option value="${p.id}">
            ${p.name}
        </option>`;
    });

    updateSubjects();

    sel.addEventListener("change",updateSubjects);
}

function updateSubjects(){

    const programId =
        document.getElementById("programSelect").value;

    const semesterSel =
        document.getElementById("semesterSelect");

    const subjectSel =
        document.getElementById("subjectSelect");

    const filtered =
    subjects.filter(s =>
    String(s.program_id ?? "") === String(programId ?? "")
);

    const semesters =
    [...new Set(filtered
        .map(s => s.semester)
        .filter(s => s !== null && s !== undefined && s !== "")
    )]
    .sort((a,b)=>Number(a)-Number(b));

    semesterSel.innerHTML = "";

    semesters.forEach(s=>{

        semesterSel.innerHTML += `
        <option value="${s}">
            ${s}
        </option>`;
    });

    function refreshSubjects(){

        const sem =
            semesterSel.value;

        const list =
    filtered.filter(s =>
        String(s.semester ?? "") === String(sem ?? "")
    );

        subjectSel.innerHTML = "";

        list.forEach(s=>{

            subjectSel.innerHTML += `
            <option value="${s.id}">
                ${s.name}
            </option>`;
        });
    }

    refreshSubjects();

    semesterSel.onchange = refreshSubjects;
}

function render(){

    const tbody =
        document.getElementById("tbody");

    tbody.innerHTML = "";

    const selectedDate =
        document.getElementById("datePicker").value;

    document.getElementById("info").textContent =
        `Приказ за ${selectedDate}`;

    TIMES.forEach(time=>{

        let row = `
        <tr>
            <td class="time-col">${time}</td>
        `;

        ROOMS.forEach(room=>{

            const event =
                events.find(e=>
                    e.date===selectedDate &&
                    e.time===time &&
                    e.room===room
                );

            let content = "";

            if(event){

                const program =
                    programs.find(p=>p.id===event.programId);

                const subject =
    subjects.find(s=>String(s.id)===String(event.subjectId));

                content = `
                <div class="event">
                    <b>${subject?.name || ""}</b><br>
                    ${program?.name || ""}<br>
                    Сем. ${event.semester || subject?.semester || ""}<br>
                    ${event.type || ""}<br>
                    ${professors.find(p => p.id === event.professor_id)?.name || ""}
                </div>`;
            }

            row += `
            <td class="slot"
                data-room="${room}"
                data-time="${time}"
                onclick="openSlot(this)">
                ${content}
            </td>`;
        });

        row += "</tr>";

        tbody.innerHTML += row;
    });
}

window.openSlot = function(cell){

    currentRoom =
        cell.dataset.room;

    currentTime =
        cell.dataset.time;

    currentDate =
        document.getElementById("datePicker").value;

    const existing =
        events.find(e=>
            e.date===currentDate &&
            e.time===currentTime &&
            e.room===currentRoom
        );

    editingId = existing?.id || null;

    if(existing){

        document.getElementById("programSelect").value =
            existing.programId || "";

        updateSubjects();

        document.getElementById("semesterSelect").value =
            existing.semester || "";

        updateSubjects();

        document.getElementById("subjectSelect").value =
            existing.subjectId || "";

        document.getElementById("typeSelect").value =
            existing.type || "Предавање";

        document.getElementById("professorSelect").value =
    existing.professor_id || "";

        document.getElementById("groupsInput").value =
            existing.groups || "";

        document.getElementById("commentInput").value =
            existing.comment || "";
    }
    else{

        editingId = null;

        document.getElementById("typeSelect").value =
            "Предавање";

        document.getElementById("professorSelect").value = "";

        document.getElementById("groupsInput").value =
            "";

        document.getElementById("commentInput").value =
            "";
    }

    document.getElementById("modal").style.display =
        "flex";
};

document.getElementById("closeBtn")
.addEventListener("click",()=>{

    document.getElementById("modal").style.display =
        "none";
});

document.getElementById("saveBtn")
.addEventListener("click", async ()=>{

    const subjectId =
        document.getElementById("subjectSelect").value;

    const programId =
        document.getElementById("programSelect").value;

    const semester =
        document.getElementById("semesterSelect").value;

    const type =
        document.getElementById("typeSelect").value;

    const professor_id =
    document.getElementById("professorSelect").value;

    const groups =
        document.getElementById("groupsInput").value.trim();

    const comment =
        document.getElementById("commentInput").value.trim();

    const roomConflict =
    events.find(e =>
        e.date === currentDate &&
        e.time === currentTime &&
        e.room === currentRoom &&
        String(e.id) !== String(editingId)
    );

if (roomConflict) {
    alert("Просторијата е зафатена.");
    return;
}

    const semesterConflict =
        events.find(e=>
            e.date===currentDate &&
            e.time===currentTime &&
            e.programId===programId &&
            String(e.semester)===String(semester) &&
            e.id!==editingId
        );

    if(semesterConflict){

        alert("Овој семестар веќе има час во истиот термин.");

        return;
    }

if(professor_id){

    const profConflict =
        events.find(e=>
            e.date===currentDate &&
            e.time===currentTime &&
            e.professor_id===professor_id &&
            e.id!==editingId
        );

    if(profConflict){

        alert("Професорот веќе има час.");

        return;
    }
}

    if(type==="Предавање"){

        const lectureConflict =
            events.find(e=>
                e.date===currentDate &&
                e.time===currentTime &&
                e.subjectId===subjectId &&
                e.type==="Предавање" &&
                e.id!==editingId
            );

        if(lectureConflict){

            alert("Предавањето веќе постои.");

            return;
        }
    }

    if(type==="Вежби"){

        const sameExercise =
            events.filter(e=>
                e.date===currentDate &&
                e.time===currentTime &&
                e.subjectId===subjectId &&
                e.type==="Вежби" &&
                e.id!==editingId
            );

        if(sameExercise.length){

            if(!LAB_ROOMS.includes(currentRoom)){

                alert("Паралелни вежби се дозволени само во лаборатории.");

                return;
            }
        }
    }

    const data = {

        date: currentDate,
        time: currentTime,
        room: currentRoom,

        subjectId,
        programId,
        semester,

        type,
        professor_id,
        groups,
        comment
    };

    if(editingId){

        const { error } =
    await supabase
        .from('events')
        .update({

            event_date: currentDate,
            event_time: currentTime,
            room: currentRoom,

            subject_id: Number(subjectId),

            type,
            professor_id,
            groups_text: groups,
            comment

        })
        .eq('id', editingId);

if (error) console.error(error);

        const program =
    programs.find(p=>p.id===programId);

const subject =
    subjects.find(s=>String(s.id)===String(subjectId));

await supabase
    .from('logs')
    .insert([{
        action:"UPDATE",
        timestamp:new Date().toISOString(),

        date: currentDate,
        time: currentTime,
        room: currentRoom,

        programId,
        programName: program?.name || "",

        semester,

        subjectId,
        subjectName: subject?.name || "",

        type,
        professor_id,
        groups,

        comment
    }]);

    }
    else{

        const { data: inserted, error } =
    await supabase
        .from('events')
        .insert([{

            event_date: currentDate,
            event_time: currentTime,
            room: currentRoom,

            subject_id: Number(subjectId),

            type,
            professor_id,
            groups_text: groups,
            comment

        }])
        .select();

console.log(error);

        const program =
    programs.find(p=>p.id===programId);

const subject =
    subjects.find(s=>String(s.id)===String(subjectId));

await supabase
    .from('logs')
    .insert([{

        action:"ADD",
        timestamp:new Date().toISOString(),

        date: currentDate,
        time: currentTime,
        room: currentRoom,

        programId,
        programName: program?.name || "",

        semester,

        subjectId,
        subjectName: subject?.name || "",

        type,
        professor_id,
        groups,

        comment
}]);
      
    }

    await loadAll();

    render();

    document.getElementById("modal").style.display =
        "none";
});

document.getElementById("deleteBtn")
.addEventListener("click", async ()=>{

    if(!editingId) return;

    if(!confirm("Delete event?"))
        return;

    const comment =
        document.getElementById("commentInput").value.trim();

    const existing =
    events.find(e=>e.id===editingId);

const program =
    programs.find(p=>p.id===existing?.programId);

const subject =
    subjects.find(s=>s.id===existing?.subjectId);

await supabase
    .from('logs')
    .insert([{
        action:"DELETE",
        timestamp:new Date().toISOString(),

        date: existing?.date || "",
        time: existing?.time || "",
        room: existing?.room || "",

        programId: existing?.programId || "",
        programName: program?.name || "",

        semester: existing?.semester || "",

        subjectId: existing?.subjectId || "",
        subjectName: subject?.name || "",

        type: existing?.type || "",
        professor: existing?.professor || "",
        groups: existing?.groups || "",

        comment
}]);

    const { error } =
    await supabase
        .from('events')
        .delete()
        .eq('id', editingId);

console.log(error);

    await loadAll();

    render();

    document.getElementById("modal").style.display =
        "none";
});

loadAll();

</script>

</body>
</html>
