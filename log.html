<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>Лог на промени</title>

<style>

body{
    font-family:Arial;
    padding:20px;
    margin:0;
    background:#f5f7fb;
}

h2{
    margin-bottom:15px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th,td{
    border:1px solid #ccc;
    padding:8px;
    font-size:13px;
    text-align:left;
    vertical-align:top;
}

th{
    background:#3f69b1;
    color:white;
}

tr:nth-child(even){
    background:#f8f9fc;
}

.add{
    background:#e8f7e8;
}

.update{
    background:#fff6d9;
}

.delete{
    background:#ffe3e3;
}

.small{
    color:#666;
    font-size:12px;
}

.comment{
    margin-top:4px;
    padding:4px 6px;
    background:#eef3ff;
    border-left:3px solid #3f69b1;
    font-style:italic;
}

</style>
</head>

<body>

<h2>Лог на промени</h2>

<table>

<thead>
<tr>
<th>Време</th>
<th>Акција</th>
<th>Датум</th>
<th>Час</th>
<th>Просторија</th>
<th>Програма</th>
<th>Семестар</th>
<th>Предмет</th>
<th>Тип</th>
<th>Професор</th>
<th>Коментар</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
    getFirestore,
    collection,
    getDocs,
    query,
    orderBy
}
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC0PZyTfo2t3ON7emYUS8NRMPgfMYvTJ2w",
  authDomain: "schedule-app-63c5e.firebaseapp.com",
  projectId: "schedule-app-63c5e",
  storageBucket: "schedule-app-63c5e.firebasestorage.app",
  messagingSenderId: "32553140850",
  appId: "1:32553140850:web:a2449581c3d4ae194c78eb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let programs = [];
let subjects = [];

async function loadData(){

    // PROGRAMS
    const progSnap =
        await getDocs(collection(db,"programs_new"));

    programs =
        progSnap.docs.map(d=>({
            id:d.id,
            ...d.data()
        }));

    // SUBJECTS
    const subjSnap =
        await getDocs(collection(db,"subjects_new"));

    subjects =
        subjSnap.docs.map(d=>({
            id:d.id,
            ...d.data()
        }));

    // LOGS
    const q =
        query(
            collection(db,"event_logs"),
            orderBy("createdAt","desc")
        );

    const snap =
        await getDocs(q);

    render(
        snap.docs.map(d=>({
            id:d.id,
            ...d.data()
        }))
    );
}

function getProgramName(programId){

    if(!programId) return "";

    const p =
        programs.find(x=>x.id===programId);

    return p?.name || "";
}

function getSubjectName(subjectId){

    if(!subjectId) return "";

    const s =
        subjects.find(x=>x.id===subjectId);

    return s?.name || "";
}

function formatTimestamp(ts){

    if(!ts?.seconds) return "";

    const d =
        new Date(ts.seconds * 1000);

    return d.toLocaleString("mk-MK");
}

function render(logs){

    const tbody =
        document.getElementById("tbody");

    tbody.innerHTML = "";

    logs.forEach(log=>{

        const cls =
            log.action || "";

        const event =
            log.event || {};

        const actionText =
            log.action === "add"
            ? "Додадено"
            : log.action === "update"
            ? "Изменето"
            : log.action === "delete"
            ? "Избришано"
            : log.action;

        const row = `
        <tr class="${cls}">

            <td>
                ${formatTimestamp(log.createdAt)}
            </td>

            <td>
                <b>${actionText}</b>
            </td>

            <td>
                ${event.date || ""}
            </td>

            <td>
                ${event.time || ""}
            </td>

            <td>
                ${event.room || ""}
            </td>

            <td>
                ${getProgramName(event.programId)}
            </td>

            <td>
                ${event.semester || ""}
            </td>

            <td>
                ${getSubjectName(event.subjectId)}
            </td>

            <td>
                ${event.type || ""}
            </td>

            <td>
                ${event.professor || ""}
            </td>

            <td>
                ${
                    log.comment
                    ? `<div class="comment">${log.comment}</div>`
                    : ""
                }
            </td>

        </tr>
        `;

        tbody.innerHTML += row;
    });
}

loadData();

</script>

</body>
</html>
