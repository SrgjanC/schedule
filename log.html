<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>Лог на промени</title>

<style>

body{
    font-family:Arial;
    padding:20px;
    background:#f5f7fb;
}

h2{
    margin-bottom:15px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th,td{
    border:1px solid #ccc;
    padding:8px;
    font-size:13px;
    vertical-align:top;
}

th{
    background:#3f69b1;
    color:white;
}

tr:nth-child(even){
    background:#f8f9fc;
}

.comment{
    margin-top:4px;
    padding:4px 6px;
    background:#eef3ff;
    border-left:3px solid #3f69b1;
    font-style:italic;
    font-size:12px;
}

.muted{
    color:#777;
    font-size:12px;
}

</style>
</head>

<body>

<h2>Лог на промени</h2>

<table>
<thead>
<tr>
<th>Време</th>
<th>Акција</th>
<th>Датум</th>
<th>Час</th>
<th>Просторија</th>
<th>Програма</th>
<th>Семестар</th>
<th>Предмет</th>
<th>Тип</th>
<th>Професор</th>
<th>Коментар</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC0PZyTfo2t3ON7emYUS8NRMPgfMYvTJ2w",
  authDomain: "schedule-app-63c5e.firebaseapp.com",
  projectId: "schedule-app-63c5e",
  storageBucket: "schedule-app-63c5e.firebasestorage.app",
  messagingSenderId: "32553140850",
  appId: "1:32553140850:web:a2449581c3d4ae194c78eb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function formatTime(ts){
    if(!ts?.seconds) return "";
    return new Date(ts.seconds * 1000).toLocaleString("mk-MK");
}

async function load(){

    const q = query(
        collection(db,"event_logs"),
        orderBy("createdAt","desc")
    );

    const snap = await getDocs(q);

    const logs = snap.docs.map(d => d.data());

    render(logs);
}

function safe(v){
    return v || "";
}

function render(logs){

    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    logs.forEach(log => {

        const e = log.event || {};

        const action =
            log.action === "add" ? "Додадено" :
            log.action === "update" ? "Изменето" :
            log.action === "delete" ? "Избришано" :
            log.action;

        const row = `
        <tr>

            <td>${formatTime(log.createdAt)}</td>
            <td><b>${action}</b></td>

            <td>${safe(e.date)}</td>
            <td>${safe(e.time)}</td>
            <td>${safe(e.room)}</td>

            <td>${safe(e.programName || e.programId)}</td>
            <td>${safe(e.semester)}</td>
            <td>${safe(e.subjectName || e.subjectId)}</td>

            <td>${safe(e.type)}</td>
            <td>${safe(e.professor)}</td>

            <td>
                ${log.comment ? `<div class="comment">${log.comment}</div>` : ""}
            </td>

        </tr>
        `;

        tbody.innerHTML += row;
    });
}

load();

</script>

</body>
</html>
