<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>Лог на промени</title>

<style>

body{
    font-family:Arial;
    padding:20px;
    margin:0;
}

h2{
    margin-bottom:15px;
}

table{
    border-collapse:collapse;
    width:100%;
}

th,td{
    border:1px solid #333;
    padding:6px 8px;
    font-size:13px;
    text-align:left;
    vertical-align:top;
}

th{
    background:#3f69b1;
    color:white;
}

.add{
    background:#e7f7e7;
}

.update{
    background:#fff7d6;
}

.delete{
    background:#ffe3e3;
}

</style>
</head>

<body>

<h2>Лог на промени</h2>

<table>

<thead>
<tr>
<th>Време</th>
<th>Акција</th>
<th>Датум</th>
<th>Час</th>
<th>Просторија</th>
<th>Програма</th>
<th>Семестар</th>
<th>Предмет</th>
<th>Тип</th>
<th>Професор</th>
<th>Коментар</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
    getFirestore,
    collection,
    getDocs
}
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC0PZyTfo2t3ON7emYUS8NRMPgfMYvTJ2w",
  authDomain: "schedule-app-63c5e.firebaseapp.com",
  projectId: "schedule-app-63c5e",
  storageBucket: "schedule-app-63c5e.firebasestorage.app",
  messagingSenderId: "32553140850",
  appId: "1:32553140850:web:a2449581c3d4ae194c78eb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let logs = [];
let events = [];
let programs = [];
let subjects = [];

async function loadData(){

    // LOGS

    const logSnap =
        await getDocs(collection(db,"logs"));

    logs =
        logSnap.docs.map(d=>({
            id:d.id,
            ...d.data()
        }));

    // EVENTS

    const eventSnap =
        await getDocs(collection(db,"events_new"));

    events =
        eventSnap.docs.map(d=>({
            id:d.id,
            ...d.data()
        }));

    // PROGRAMS

    const progSnap =
        await getDocs(collection(db,"programs_new"));

    programs =
        progSnap.docs.map(d=>({
            id:d.id,
            ...d.data()
        }));

    // SUBJECTS

    const subjSnap =
        await getDocs(collection(db,"subjects_new"));

    subjects =
        subjSnap.docs.map(d=>({
            id:d.id,
            ...d.data()
        }));

    render();
}

function getEvent(log){

    return events.find(e=>
        e.id===log.eventId
    );
}

function getProgramName(event){

    if(!event) return "";

    const p =
        programs.find(x=>
            x.id===event.programId
        );

    return p?.name || "";
}

function getSubjectName(event){

    if(!event) return "";

    const s =
        subjects.find(x=>
            x.id===event.subjectId
        );

    return s?.name || "";
}

function render(){

    const tbody =
        document.getElementById("tbody");

    tbody.innerHTML = "";

    logs.sort((a,b)=>
        new Date(b.timestamp || 0) -
        new Date(a.timestamp || 0)
    );

    logs.forEach(log=>{

        const event =
            getEvent(log);

        let cls = "";

        if(log.action==="ADD")
            cls = "add";

        if(log.action==="UPDATE")
            cls = "update";

        if(log.action==="DELETE")
            cls = "delete";

        tbody.innerHTML += `
        <tr class="${cls}">

            <td>
                ${log.timestamp || ""}
            </td>

            <td>
                ${log.action || ""}
            </td>

            <td>
                ${log.date || ""}
            </td>

            <td>
                ${log.time || ""}
            </td>

            <td>
                ${log.room || ""}
            </td>

            <td>
                ${getProgramName(event)}
            </td>

            <td>
                ${event?.semester || ""}
            </td>

            <td>
                ${getSubjectName(event)}
            </td>

            <td>
                ${event?.type || ""}
            </td>

            <td>
                ${event?.professor || ""}
            </td>

            <td>
                ${log.comment || ""}
            </td>

        </tr>
        `;
    });
}

loadData();

</script>

</body>
</html>
