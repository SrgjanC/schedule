<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>Логови на промени</title>

<style>

body{
    font-family:Arial;
    padding:20px;
    margin:0;
}

h2{
    margin-bottom:15px;
}

table{
    border-collapse:collapse;
    width:100%;
}

th,td{
    border:1px solid #333;
    padding:6px 8px;
    font-size:13px;
    text-align:left;
}

th{
    background:#3f69b1;
    color:white;
}

tr:nth-child(even){
    background:#f5f5f5;
}

.add{
    background:#dff0d8;
}

.update{
    background:#fcf8e3;
}

.delete{
    background:#f2dede;
}

.controls{
    margin-bottom:15px;
}

select{
    padding:6px 8px;
    font-size:14px;
}

</style>
</head>

<body>

<h2>Логови на промени</h2>

<div class="controls">

<label>Акција:</label>

<select id="actionFilter">
<option value="">Сите</option>
<option value="ADD">ADD</option>
<option value="UPDATE">UPDATE</option>
<option value="DELETE">DELETE</option>
</select>

</div>

<table>

<thead>
<tr>
<th>Време</th>
<th>Акција</th>
<th>Датум</th>
<th>Час</th>
<th>Просторија</th>
<th>Коментар</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
    getFirestore,
    collection,
    getDocs
}
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC0PZyTfo2t3ON7emYUS8NRMPgfMYvTJ2w",
  authDomain: "schedule-app-63c5e.firebaseapp.com",
  projectId: "schedule-app-63c5e",
  storageBucket: "schedule-app-63c5e.firebasestorage.app",
  messagingSenderId: "32553140850",
  appId: "1:32553140850:web:a2449581c3d4ae194c78eb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let logs = [];

async function loadLogs(){

    const snap =
        await getDocs(collection(db,"logs"));

    logs =
        snap.docs.map(d=>({
            id:d.id,
            ...d.data()
        }));

    render();
}

function formatTimestamp(ts){

    if(!ts) return "";

    const d = new Date(ts);

    if(Number.isNaN(d.getTime()))
        return ts;

    return d.toLocaleString("mk-MK");
}

function render(){

    const tbody =
        document.getElementById("tbody");

    tbody.innerHTML = "";

    const actionFilter =
        document.getElementById("actionFilter").value;

    const sorted =
        [...logs].sort((a,b)=>
            (b.timestamp || "").localeCompare(a.timestamp || "")
        );

    sorted.forEach(log=>{

        if(actionFilter && log.action !== actionFilter)
            return;

        let cls = "";

        if(log.action==="ADD")
            cls = "add";

        if(log.action==="UPDATE")
            cls = "update";

        if(log.action==="DELETE")
            cls = "delete";

        tbody.innerHTML += `
        <tr class="${cls}">
            <td>${formatTimestamp(log.timestamp)}</td>
            <td>${log.action || ""}</td>
            <td>${log.date || ""}</td>
            <td>${log.time || ""}</td>
            <td>${log.room || ""}</td>
            <td>${log.comment || ""}</td>
        </tr>`;
    });
}

document.getElementById("actionFilter")
.addEventListener("change",render);

loadLogs();

</script>

</body>
</html>
