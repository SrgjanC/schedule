<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>Event Logs</title>

<style>
body{
    font-family:Arial;
    padding:20px;
}

h2{
    margin-bottom:10px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #333;
    padding:6px;
    font-size:12px;
    vertical-align:top;
}

th{
    background:#3f69b1;
    color:white;
}

.small{
    font-size:11px;
    color:#666;
}

.badge{
    padding:2px 6px;
    border-radius:4px;
    color:white;
    font-size:11px;
}

.add{background:#2e7d32;}
.update{background:#f39c12;}
.delete{background:#c0392b;}
</style>
</head>

<body>

<h2>Log на промени</h2>

<table>
<thead>
<tr>
<th>Тип</th>
<th>Време</th>
<th>Програма</th>
<th>Предмет</th>
<th>Семестар</th>
<th>Соба</th>
<th>Час</th>
<th>Коментар</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyC0PZyTfo2t3ON7emYUS8NRMPgfMYvTJ2w",
authDomain: "schedule-app-63c5e.firebaseapp.com",
projectId: "schedule-app-63c5e",
storageBucket: "schedule-app-63c5e.firebasestorage.app",
messagingSenderId: "32553140850",
appId: "1:32553140850:web:a2449581c3d4ae194c78eb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadLogs(){

const snap = await getDocs(collection(db,"event_logs"));

const logs = snap.docs.map(d=>d.data());

// newest first
logs.sort((a,b)=> (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0));

const tbody = document.getElementById("tbody");
tbody.innerHTML = "";

logs.forEach(l=>{

const e = l.event || {};

let cls = "update";
if(l.action==="add") cls="add";
if(l.action==="delete") cls="delete";

const time = l.createdAt?.toDate
? l.createdAt.toDate().toLocaleString()
: "";

tbody.innerHTML += `
<tr>
<td><span class="badge ${cls}">${l.action||""}</span></td>
<td>${time}</td>

<td>${e.programName || e.programId || ""}</td>
<td>${e.subjectName || e.subjectId || ""}</td>
<td>${e.semester || ""}</td>
<td>${e.room || ""}</td>
<td>${e.time || ""}</td>

<td>${l.comment || ""}</td>
</tr>
`;
});

}

loadLogs();

</script>

</body>
</html>
