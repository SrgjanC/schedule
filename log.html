<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>Schedule Log</title>

<style>

body{
    font-family:Arial;
    padding:20px;
}

table{
    border-collapse:collapse;
    width:100%;
}

th,td{
    border:1px solid #333;
    padding:6px;
    font-size:13px;
    text-align:left;
}

th{
    background:#3f69b1;
    color:white;
}

.add{
    background:#e8f5e9;
}

.update{
    background:#fff8e1;
}

.delete{
    background:#ffebee;
}

</style>
</head>

<body>

<h2>Лог на промени</h2>

<table>

<thead>
<tr>

<th>Време</th>
<th>Тип</th>
<th>Датум</th>
<th>Час</th>
<th>Просторија</th>
<th>Програма</th>
<th>Сем.</th>
<th>Предмет</th>
<th>Тип</th>
<th>Професор</th>
<th>Коментар</th>

</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
    getFirestore,
    collection,
    getDocs,
    query,
    orderBy
}
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC0PZyTfo2t3ON7emYUS8NRMPgfMYvTJ2w",
  authDomain: "schedule-app-63c5e.firebaseapp.com",
  projectId: "schedule-app-63c5e",
  storageBucket: "schedule-app-63c5e.firebasestorage.app",
  messagingSenderId: "32553140850",
  appId: "1:32553140850:web:a2449581c3d4ae194c78eb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let logs = [];
let programs = [];
let subjects = [];

async function loadData(){

    const progSnap =
        await getDocs(collection(db,"programs_new"));

    programs =
        progSnap.docs.map(d=>({
            id:d.id,
            ...d.data()
        }));

    const subjSnap =
        await getDocs(collection(db,"subjects_new"));

    subjects =
        subjSnap.docs.map(d=>({
            id:d.id,
            ...d.data()
        }));

    const q =
        query(
            collection(db,"events_log"),
            orderBy("createdAt","desc")
        );

    const snap =
        await getDocs(q);

    logs =
        snap.docs.map(d=>({
            id:d.id,
            ...d.data()
        }));

    render();
}

function getProgramName(id){

    return programs.find(p=>p.id===id)?.name || "";
}

function getSubjectName(id){

    return subjects.find(s=>s.id===id)?.name || "";
}

function formatTS(ts){

    if(!ts?.seconds) return "";

    return new Date(ts.seconds*1000)
        .toLocaleString("mk-MK");
}

function render(){

    const tbody =
        document.getElementById("tbody");

    tbody.innerHTML = "";

    logs.forEach(log=>{

        const e = log.data || {};

        const tr =
            document.createElement("tr");

        tr.className =
            log.action.toLowerCase();

        tr.innerHTML = `
        <td>${formatTS(log.createdAt)}</td>
        <td>${log.action || ""}</td>
        <td>${e.date || ""}</td>
        <td>${e.time || ""}</td>
        <td>${e.room || ""}</td>
        <td>${getProgramName(e.programId)}</td>
        <td>${e.semester || ""}</td>
        <td>${getSubjectName(e.subjectId)}</td>
        <td>${e.type || ""}</td>
        <td>${e.professor || ""}</td>
        <td>${log.comment || ""}</td>
        `;

        tbody.appendChild(tr);
    });
}

loadData();

</script>

</body>
</html>
