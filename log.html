<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>RAW Logs</title>

<style>

body{
    font-family:Arial;
    padding:20px;
}

table{
    border-collapse:collapse;
    width:100%;
}

th,td{
    border:1px solid #333;
    padding:6px;
    font-size:12px;
    vertical-align:top;
    text-align:left;
}

th{
    background:#3f69b1;
    color:white;
}

pre{
    margin:0;
    white-space:pre-wrap;
    word-break:break-word;
}

</style>
</head>

<body>

<h2>RAW Firebase Logs</h2>

<table>

<thead>
<tr>
<th>ID</th>
<th>DATA</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
    getFirestore,
    collection,
    getDocs
}
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC0PZyTfo2t3ON7emYUS8NRMPgfMYvTJ2w",
  authDomain: "schedule-app-63c5e.firebaseapp.com",
  projectId: "schedule-app-63c5e",
  storageBucket: "schedule-app-63c5e.firebasestorage.app",
  messagingSenderId: "32553140850",
  appId: "1:32553140850:web:a2449581c3d4ae194c78eb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadLogs(){

    const tbody =
        document.getElementById("tbody");

    tbody.innerHTML = "";

    const snap =
        await getDocs(collection(db,"logs"));

    snap.forEach(docSnap=>{

        const data =
            docSnap.data();

        tbody.innerHTML += `
        <tr>
            <td>${docSnap.id}</td>
            <td>
                <pre>${JSON.stringify(data,null,2)}</pre>
            </td>
        </tr>
        `;
    });
}

loadLogs();

</script>

</body>
</html>
