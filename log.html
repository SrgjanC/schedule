<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>Логови</title>

<style>

body{
    font-family:Arial;
    padding:20px;
    margin:0;
}

h2{
    margin-bottom:15px;
}

table{
    border-collapse:collapse;
    width:100%;
}

th,td{
    border:1px solid #333;
    padding:6px 8px;
    font-size:13px;
    text-align:left;
    vertical-align:top;
}

th{
    background:#3f69b1;
    color:white;
}

.add{
    background:#e8f7e8;
}

.update{
    background:#fff8d9;
}

.delete{
    background:#ffe3e3;
}

.small{
    color:#666;
    font-size:11px;
}

</style>
</head>

<body>

<h2>Логови на промени</h2>

<table>

<thead>
<tr>
<th>Време</th>
<th>Акција</th>
<th>Датум</th>
<th>Час</th>
<th>Просторија</th>
<th>Програма</th>
<th>Семестар</th>
<th>Предмет</th>
<th>Тип</th>
<th>Професор</th>
<th>Коментар</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
    getFirestore,
    collection,
    getDocs
}
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC0PZyTfo2t3ON7emYUS8NRMPgfMYvTJ2w",
  authDomain: "schedule-app-63c5e.firebaseapp.com",
  projectId: "schedule-app-63c5e",
  storageBucket: "schedule-app-63c5e.firebasestorage.app",
  messagingSenderId: "32553140850",
  appId: "1:32553140850:web:a2449581c3d4ae194c78eb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let logs = [];
let programs = [];
let subjects = [];

async function loadAll(){

    // ================= PROGRAMS =================

    const progSnap =
        await getDocs(collection(db,"programs_new"));

    programs =
        progSnap.docs.map(d=>({
            id:d.id,
            ...d.data()
        }));

    // ================= SUBJECTS =================

    const subjSnap =
        await getDocs(collection(db,"subjects_new"));

    subjects =
        subjSnap.docs.map(d=>({
            id:d.id,
            ...d.data()
        }));

    // ================= LOGS =================

    const logsSnap =
        await getDocs(collection(db,"logs"));

    logs =
        logsSnap.docs.map(d=>({
            id:d.id,
            ...d.data()
        }));

    render();
}

function render(){

    const tbody =
        document.getElementById("tbody");

    tbody.innerHTML = "";

    logs.sort((a,b)=>
        new Date(b.timestamp) - new Date(a.timestamp)
    );

    logs.forEach(log=>{

        const cls =
            log.action === "ADD"
                ? "add"
                : log.action === "UPDATE"
                    ? "update"
                    : "delete";

        // ================= PROGRAM =================

        let programName = "";

        if(log.programName){

            programName = log.programName;
        }
        else if(log.programId){

            const p =
                programs.find(x=>x.id===log.programId);

            programName = p?.name || "";
        }

        // ================= SUBJECT =================

        let subjectName = "";

        if(log.subjectName){

            subjectName = log.subjectName;
        }
        else if(log.subjectId){

            const s =
                subjects.find(x=>x.id===log.subjectId);

            subjectName = s?.name || "";
        }

        tbody.innerHTML += `
        <tr class="${cls}">

            <td>
                ${log.timestamp || ""}
            </td>

            <td>
                <b>${log.action || ""}</b>
            </td>

            <td>
                ${log.date || ""}
            </td>

            <td>
                ${log.time || ""}
            </td>

            <td>
                ${log.room || ""}
            </td>

            <td>
                ${programName}
            </td>

            <td>
                ${log.semester || ""}
            </td>

            <td>
                ${subjectName}
            </td>

            <td>
                ${log.type || ""}
            </td>

            <td>
                ${log.professor || ""}
            </td>

            <td>
                ${log.comment || ""}
            </td>

        </tr>
        `;
    });
}

loadAll();

</script>

</body>
</html>
