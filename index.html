<!DOCTYPE html>
 <html lang="mk">
 <head>
 <meta charset="UTF-8">
 <title>Распоред</title>
 
 <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
 
 <style>

body { font-family: Arial; padding: 20px; }
h2 { margin-bottom: 10px; }
.controls { margin-bottom: 15px; }
select { padding: 5px; margin-right: 10px; }

table { border-collapse: collapse; width: 100%; }
th, td {
    border: 1px solid #222;
    padding: 4px 6px;
    text-align: left;
    font-size: 13px;
}
th { background: #3f69b1; color: #fff; }

.empty { background: #fafafa; }
</style>
 </head>
 
 <body>
 
 <h2>Академски Распоред</h2>
 

<div class="controls">
    <label>Преглед:</label>
    <select id="viewMode">
        <option value="day">Day</option>
        <option value="week">Week</option>
        <option value="month">Month</option>
        <option value="year">Year</option>
    </select>

    <label id="dateFilterLabel" for="dateFilter">Датум:</label>
    <input id="dateFilter" type="date" />

    <label>Програма:</label>
    <select id="programFilter"></select>

    <label>Семестар:</label>
    <select id="semesterFilter"></select>

    <label>Просторија:</label>
    <select id="roomFilter"></select>
</div>
<div id="viewInfo" style="margin: 8px 0 14px; font-size: 14px; color: #444;"></div>

<table id="schedule">
    <thead>
        <tr>
            <th>Недела</th>
            <th>Ден</th>
            <th>Датум</th>
            <th>Час</th>
            <th>Просторија</th>
            <th>Студиска програма</th>
            <th>Семестар</th>
            <th>Предмет</th>
            <th>Тип на настава</th>
            <th>Проф/асс</th>
            <th>Групи</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>
 
 <script>
 

let slots = [];
let events = [];
const roomColorCache = {};
let currentAnchorDate = "";

function getClosestAvailableDate(preferredIsoDate) {
    const dates = [...new Set(slots.map(s => s.date).filter(Boolean))].sort();
    if (!dates.length) return preferredIsoDate || "";
    if (dates.includes(preferredIsoDate)) return preferredIsoDate;

    const preferredTs = new Date(preferredIsoDate).getTime();
    if (Number.isNaN(preferredTs)) return dates[0];

    let closest = dates[0];
    let minDiff = Math.abs(new Date(closest).getTime() - preferredTs);
    dates.forEach(d => {
        const diff = Math.abs(new Date(d).getTime() - preferredTs);
        if (diff < minDiff) {
            minDiff = diff;
            closest = d;
        }
    });
    return closest;
}

function getRoomColor(room) {
    if (!room) return "#ffffff";
    if (roomColorCache[room]) return roomColorCache[room];

    const palette = ["#f1dfd3", "#dde3ef", "#cfe7b4", "#f7e6b8", "#e3d9f6", "#d7eee8"];
    let hash = 0;
    for (let i = 0; i < room.length; i++) hash = room.charCodeAt(i) + ((hash << 5) - hash);
    const color = palette[Math.abs(hash) % palette.length];
    roomColorCache[room] = color;
    return color;
}

function formatDate(dateStr) {
    if (!dateStr) return "";
    const d = new Date(dateStr);
    if (Number.isNaN(d.getTime())) return dateStr;
    const months = ["Јан", "Фев", "Мар", "Апр", "Мај", "Јун", "Јул", "Авг", "Сеп", "Окт", "Ное", "Дек"];
    return `${d.getDate()}-${months[d.getMonth()]}`;
}

function toIsoDate(dateObj) {
    if (!(dateObj instanceof Date) || Number.isNaN(dateObj.getTime())) return "";
    const yyyy = dateObj.getFullYear();
    const mm = String(dateObj.getMonth() + 1).padStart(2, "0");
    const dd = String(dateObj.getDate()).padStart(2, "0");
    return `${yyyy}-${mm}-${dd}`;
}

function getIsoWeekId(dateStr) {
    const date = new Date(dateStr);
    if (Number.isNaN(date.getTime())) return "";
    const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    const dayNum = d.getUTCDay() || 7;
    d.setUTCDate(d.getUTCDate() + 4 - dayNum);
    const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
    const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    return `${d.getUTCFullYear()}-W${String(weekNo).padStart(2, "0")}`;
}

function weekInputToIsoDate(weekValue) {
    const match = /^(\d{4})-W(\d{2})$/.exec(weekValue || "");
    if (!match) return "";
    const year = Number(match[1]);
    const week = Number(match[2]);
    const jan4 = new Date(Date.UTC(year, 0, 4));
    const jan4Day = jan4.getUTCDay() || 7;
    const monday = new Date(jan4);
    monday.setUTCDate(jan4.getUTCDate() - jan4Day + 1 + (week - 1) * 7);
    return toIsoDate(new Date(monday.getUTCFullYear(), monday.getUTCMonth(), monday.getUTCDate()));
}

function monthInputToIsoDate(monthValue) {
    if (!/^\d{4}-\d{2}$/.test(monthValue || "")) return "";
    return `${monthValue}-01`;
}

function yearInputToIsoDate(yearValue) {
    if (!/^\d{4}$/.test(yearValue || "")) return "";
    return `${yearValue}-01-01`;
}

function updateDateInputForView(viewMode) {
    const input = document.getElementById("dateFilter");
    const label = document.getElementById("dateFilterLabel");
    const base = currentAnchorDate || toIsoDate(new Date());

    if (viewMode === "day") {
        input.type = "date";
        label.textContent = "Датум:";
        input.value = base;
    } else if (viewMode === "week") {
        input.type = "week";
        label.textContent = "Недела:";
        input.value = getIsoWeekId(base);
    } else if (viewMode === "month") {
        input.type = "month";
        label.textContent = "Месец:";
        input.value = base.slice(0, 7);
    } else {
        input.type = "number";
        input.min = "2000";
        input.max = "2100";
        label.textContent = "Година:";
        input.value = base.slice(0, 4);
    }
}

function getSelectedDateForFiltering(viewMode) {
    const value = document.getElementById("dateFilter").value;
    if (!value) return "";
    if (viewMode === "week") return weekInputToIsoDate(value);
    if (viewMode === "month") return monthInputToIsoDate(value);
    if (viewMode === "year") return yearInputToIsoDate(value);
    return value;
}

function isInSelectedRange(item, selectedDate, viewMode) {
    if (!selectedDate) return true;
    if (!item?.date) return false;

    if (viewMode === "day") return item.date === selectedDate;

    const selected = new Date(selectedDate);
    const current = new Date(item.date);
    if (Number.isNaN(selected.getTime()) || Number.isNaN(current.getTime())) return false;

    if (viewMode === "week") return getIsoWeekId(item.date) === getIsoWeekId(selectedDate);
    if (viewMode === "month") {
        return selected.getFullYear() === current.getFullYear() &&
               selected.getMonth() === current.getMonth();
    }
    if (viewMode === "year") {
        return selected.getFullYear() === current.getFullYear();
    }
    return item.date === selectedDate;
}
 
 function normalize(e) {
     const dayMap = {
         "Monday": "понеделник",
         "Tuesday": "вторник",
         "Wednesday": "среда",
         "Thursday": "четврток",
         "Friday": "петок"
     };
 
     let day = e["Ден"] || e["Day"];
     if (dayMap[day]) day = dayMap[day];
 
     let time = (e["Час"] || e["Time"] || "").toString().trim();
     if (time.length === 4) time = "0" + time; // 9:00 → 09:00
 
     return {
         week: e["Недела"] || e["Week"],
         day: day,
         date: e["Датум"] || e["Date"],
         time: time,

        room: (e["Просторија"] || "").trim(),
        program: e["Студиска програма"] || "",
        semester: e["Семестар"] || "",
        subject: e["предмет"] || "",
        type: e["тип на настава"] || "",
        professor: e["проф/асс"] || "",
        groups: e["Групи"] || ""
    };
}
 
 function loadData() {
     Promise.all([
         fetch("slots.csv").then(r => r.text()),
         fetch("events.csv").then(r => r.text())
     ]).then(([slotsText, eventsText]) => {
 
         slots = Papa.parse(slotsText, {header: true, delimiter: ";"}).data.map(normalize);
         events = Papa.parse(eventsText, {header: true, delimiter: ";"}).data.map(normalize);
 
         initFilters();
         render();
     });
 }
 

function initFilters() {
    const programs = [...new Set(events.map(e => e.program))];
    const semesters = [...new Set(events.map(e => e.semester).filter(Boolean))];
    const rooms = [...new Set(slots.map(s => s.room))];

    fillSelect("programFilter", programs);
    fillSelect("semesterFilter", semesters);
    fillSelect("roomFilter", rooms);

    currentAnchorDate = getClosestAvailableDate(toIsoDate(new Date()));
    updateDateInputForView(document.getElementById("viewMode").value);

    document.querySelectorAll("select").forEach(s => s.addEventListener("change", () => {
        if (s.id === "viewMode") updateDateInputForView(s.value);
        render();
    }));
    document.getElementById("dateFilter").addEventListener("change", () => {
        const selectedDate = getSelectedDateForFiltering(document.getElementById("viewMode").value);
        if (selectedDate) currentAnchorDate = selectedDate;
        render();
    });
 }
 

function fillSelect(id, values, options = {}) {
    const { includeAll = true, labelFormatter = v => v } = options;
    const select = document.getElementById(id);
    select.innerHTML = includeAll ? "<option value=''>Сите</option>" : "";
    values.forEach(v => {
        if (v) select.innerHTML += `<option value="${v}">${labelFormatter(v)}</option>`;
    });
}

function render() {

    const viewMode = document.getElementById("viewMode").value;
    const dateFilter = getSelectedDateForFiltering(viewMode);
    const programFilter = document.getElementById("programFilter").value;
    const semesterFilter = document.getElementById("semesterFilter").value;
    const roomFilter = document.getElementById("roomFilter").value;

    if (dateFilter) currentAnchorDate = dateFilter;

    const filteredSlots = slots.filter(s =>
        isInSelectedRange(s, dateFilter, viewMode) &&
        (!roomFilter || s.room === roomFilter)
    );

    const table = document.getElementById("schedule");
    const tbody = table.querySelector("tbody");
    tbody.innerHTML = "";

    const selectedDateSlot = slots.find(s => s.date === dateFilter);
    document.getElementById("viewInfo").textContent = dateFilter
        ? `Приказ (${viewMode}): ${selectedDateSlot?.day || ""} ${dateFilter}`.trim()
        : "Приказ за сите датуми (комбинирано).";

    // Keep all events per slot so overlapping groups/programs are not lost.
    const eventMap = {};
    events.forEach(e => {
        if (programFilter && e.program !== programFilter) return;
        if (semesterFilter && e.semester !== semesterFilter) return;
        if (!isInSelectedRange(e, dateFilter, viewMode)) return;

        const key = `${e.date}_${e.time}_${e.room}`;
        if (!eventMap[key]) eventMap[key] = [];
        eventMap[key].push(e);
    });

    const slotsToRender = filteredSlots.filter(slot => {
        if (viewMode === "week" || viewMode === "month" || viewMode === "year") {
            const key = `${slot.date}_${slot.time}_${slot.room}`;
            return Boolean(eventMap[key]?.length);
        }
        return true;
    });

    const sortedSlots = [...slotsToRender].sort((a, b) =>
        a.date.localeCompare(b.date) ||
        a.room.localeCompare(b.room, "mk") ||
        a.time.localeCompare(b.time)
    );

    sortedSlots.forEach(slot => {
        const key = `${slot.date}_${slot.time}_${slot.room}`;
        const cellEvents = eventMap[key] || [null];
        const rowColor = getRoomColor(slot.room);

        cellEvents.forEach(e => {
            const row = `<tr style="background:${rowColor};">
                <td>${slot.week || ""}</td>
                <td>${slot.day || ""}</td>
                <td>${formatDate(slot.date)}</td>
                <td>${slot.time || ""}</td>
                <td>${slot.room || ""}</td>
                <td>${e?.program || ""}</td>
                <td>${e?.semester || ""}</td>
                <td>${e?.subject || ""}</td>
                <td>${e?.type || ""}</td>
                <td>${e?.professor || ""}</td>
                <td>${e?.groups || ""}</td>
            </tr>`;
            tbody.innerHTML += row;
        });
    });
}
 
 loadData();
 
 </script>
 
 </body>
 </html>
