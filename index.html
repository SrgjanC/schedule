<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>Распоред</title>

<style>
body { font-family: Arial; padding: 20px; }
select { margin: 5px; padding: 5px; }
table { border-collapse: collapse; width: 100%; }
th, td { border: 1px solid #333; padding: 5px; font-size: 13px; }
th { background: #3f69b1; color: white; }
.empty { background: #f5f5f5; }
</style>
</head>

<body>

<h2>Академски Распоред</h2>

<select id="dateFilter"></select>
<select id="roomFilter"></select>
<select id="programFilter"></select>

<table id="schedule">
<thead>
<tr>
<th>Датум</th>
<th>Час</th>
<th>Просторија</th>
<th>Предмет</th>
<th>Професор</th>
</tr>
</thead>
<tbody></tbody>
</table>

<!-- MAIN LOGIC -->
<script>
let events = [];

// 🔧 SETTINGS (you control these)
const rooms = ["01 пред.", "02 пред.", "03 пред."];
const startHour = 8;
const endHour = 19;

// 🧠 Generate time slots
function generateSlots(dates) {
    let slots = [];

    dates.forEach(date => {
        rooms.forEach(room => {
            for (let h = startHour; h <= endHour; h++) {
                let time = String(h).padStart(2, "0") + ":00";

                slots.push({
                    date,
                    time,
                    room
                });
            }
        });
    });

    return slots;
}

// 🎛 filters
function initFilters(dates) {
    fill("dateFilter", dates);
    fill("roomFilter", rooms);
    fill("programFilter", [...new Set(events.map(e => e.program))]);

    document.querySelectorAll("select").forEach(s =>
        s.addEventListener("change", render)
    );
}

function fill(id, arr) {
    const el = document.getElementById(id);
    el.innerHTML = "<option value=''>Сите</option>";
    arr.forEach(v => el.innerHTML += `<option>${v}</option>`);
}

// 🎨 render
function render() {
    const date = document.getElementById("dateFilter").value;
    const roomFilter = document.getElementById("roomFilter").value;
    const program = document.getElementById("programFilter").value;

    const tbody = document.querySelector("#schedule tbody");
    tbody.innerHTML = "";

    const dates = [...new Set(events.map(e => e.date))];
    const slots = generateSlots(dates);

    const map = {};
    events.forEach(e => {
        if (program && e.program !== program) return;
        const key = `${e.date}_${e.time}_${e.room}`;
        map[key] = e;
    });

    slots.forEach(s => {
        if (date && s.date !== date) return;
        if (roomFilter && s.room !== roomFilter) return;

        const key = `${s.date}_${s.time}_${s.room}`;
        const e = map[key];

        const row = `<tr class="${e ? "" : "empty"}">
            <td>${s.date}</td>
            <td>${s.time}</td>
            <td>${s.room}</td>
            <td>${e?.subject || ""}</td>
            <td>${e?.professor || ""}</td>
        </tr>`;

        tbody.innerHTML += row;
    });
}
</script>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "schedule-a6667.firebaseapp.com",
  projectId: "schedule-a6667"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 🔄 live data
onSnapshot(collection(db, "events"), (snap) => {
    events = [];
    snap.forEach(d => events.push(d.data()));

    const dates = [...new Set(events.map(e => e.date))];

    initFilters(dates);
    render();
});
</script>

</body>
</html>
