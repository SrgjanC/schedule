<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>Распоред</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body { font-family: Arial; padding: 20px; }
h2 { margin-bottom: 10px; }
.controls { margin-bottom: 15px; }
select { padding: 5px; margin-right: 10px; }

table { border-collapse: collapse; width: 100%; }
th, td {
    border: 1px solid #ccc;
    padding: 6px;
    text-align: center;
    font-size: 13px;
}
th { background: #f2f2f2; }

.empty { background: #fafafa; }
</style>
</head>

<body>

<h2>Академски Распоред</h2>

<div class="controls">
    <label>Датум:</label>
    <select id="dateFilter"></select>

    <label>Програма:</label>
    <select id="programFilter"></select>

    <label>Просторија:</label>
    <select id="roomFilter"></select>
</div>
<div id="viewInfo" style="margin: 8px 0 14px; font-size: 14px; color: #444;"></div>

<table id="schedule">
    <thead>
        <tr>
            <th>Час</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>

let slots = [];
let events = [];
const programColorCache = {};

function getProgramColor(program) {
    if (!program) return "#dbe4ee";
    if (programColorCache[program]) return programColorCache[program];

    let hash = 0;
    for (let i = 0; i < program.length; i++) {
        hash = program.charCodeAt(i) + ((hash << 5) - hash);
    }
    const hue = Math.abs(hash) % 360;
    const color = `hsl(${hue}, 80%, 78%)`;
    programColorCache[program] = color;
    return color;
}

function normalize(e) {
    const dayMap = {
        "Monday": "понеделник",
        "Tuesday": "вторник",
        "Wednesday": "среда",
        "Thursday": "четврток",
        "Friday": "петок"
    };

    let day = e["Ден"] || e["Day"];
    if (dayMap[day]) day = dayMap[day];

    let time = (e["Час"] || e["Time"] || "").toString().trim();
    if (time.length === 4) time = "0" + time; // 9:00 → 09:00

    return {
        week: e["Недела"] || e["Week"],
        day: day,
        date: e["Датум"] || e["Date"],
        time: time,
        room: (e["Просторија"] || "").trim(),
        program: e["Студиска програма"] || "",
        semester: e["Семестар"] || "",
        subject: e["предмет"] || "",
        type: e["тип на настава"] || "",
        professor: e["проф/асс"] || ""
    };
}

function loadData() {
    Promise.all([
        fetch("slots.csv").then(r => r.text()),
        fetch("events.csv").then(r => r.text())
    ]).then(([slotsText, eventsText]) => {

        slots = Papa.parse(slotsText, {header: true, delimiter: ";"}).data.map(normalize);
        events = Papa.parse(eventsText, {header: true, delimiter: ";"}).data.map(normalize);

        initFilters();
        render();
    });
}

function initFilters() {
    const dates = [...new Set(slots.map(s => s.date).filter(Boolean))].sort();
    const programs = [...new Set(events.map(e => e.program))];
    const rooms = [...new Set(slots.map(s => s.room))];

    fillSelect("dateFilter", dates, { includeAll: false, labelFormatter: d => {
        const slot = slots.find(s => s.date === d);
        const dayText = slot?.day ? `${slot.day}, ` : "";
        return `${dayText}${d}`;
    }});
    fillSelect("programFilter", programs);
    fillSelect("roomFilter", rooms);

    document.querySelectorAll("select").forEach(s =>
        s.addEventListener("change", render)
    );
}

function fillSelect(id, values, options = {}) {
    const { includeAll = true, labelFormatter = v => v } = options;
    const select = document.getElementById(id);
    select.innerHTML = includeAll ? "<option value=''>Сите</option>" : "";
    values.forEach(v => {
        if (v) select.innerHTML += `<option value="${v}">${labelFormatter(v)}</option>`;
    });
}

function render() {

    const dateFilter = document.getElementById("dateFilter").value;
    const programFilter = document.getElementById("programFilter").value;
    const roomFilter = document.getElementById("roomFilter").value;

    const filteredSlots = slots.filter(s =>
        (!dateFilter || s.date === dateFilter) &&
        (!roomFilter || s.room === roomFilter)
    );

    const times = [...new Set(filteredSlots.map(s => s.time))].sort();
    const rooms = [...new Set(filteredSlots.map(s => s.room))];

    const table = document.getElementById("schedule");
    const thead = table.querySelector("thead tr");
    const tbody = table.querySelector("tbody");

    thead.innerHTML = "<th>Час</th>" + rooms.map(r => `<th>${r}</th>`).join("");
    tbody.innerHTML = "";

    const selectedDateSlot = slots.find(s => s.date === dateFilter);
    document.getElementById("viewInfo").textContent = dateFilter
        ? `Приказ за: ${selectedDateSlot?.day || ""} ${dateFilter}`.trim()
        : "Приказ за сите датуми (комбинирано).";

    // Keep all events per slot so overlapping groups/programs are not lost.
    const eventMap = {};
    events.forEach(e => {
        if (programFilter && e.program !== programFilter) return;
        if (dateFilter && e.date !== dateFilter) return;

        const key = `${e.date}_${e.time}_${e.room}`;
        if (!eventMap[key]) eventMap[key] = [];
        eventMap[key].push(e);
    });

    times.forEach(time => {
        let row = `<tr><td>${time}</td>`;

        rooms.forEach(room => {
            // 🔥 FIXED KEY (this is the important part)
            const slot = filteredSlots.find(s => s.time === time && s.room === room);
            const key = slot ? `${slot.date}_${slot.time}_${slot.room}` : "";

            const cellEvents = eventMap[key] || [];

            if (cellEvents.length) {
                const entries = cellEvents.map(e => {
                    const bg = getProgramColor(e.program);

                    return `<div style="margin:2px 0; padding:4px; border-radius:4px; background:${bg}; border-left:4px solid rgba(0,0,0,0.25);">
                        <b>${e.subject}</b><br>
                        ${e.professor || ""}<br>
                        ${e.program}${e.semester ? ` • Семестар ${e.semester}` : ""}
                    </div>`;
                }).join("");

                row += `<td>${entries}</td>`;
            } else {
                row += `<td class="empty"></td>`;
            }
        });

        row += "</tr>";
        tbody.innerHTML += row;
    });
}

loadData();

</script>

</body>
</html>
