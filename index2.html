<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>Распоред</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body { font-family: Arial; padding: 20px; }
h2 { margin-bottom: 10px; }
.controls { margin-bottom: 15px; }
select { padding: 5px; margin-right: 10px; }

table { border-collapse: collapse; width: 100%; }
th, td {
    border: 1px solid #222;
    padding: 4px 6px;
    text-align: left;
    font-size: 13px;
}
th { background: #3f69b1; color: #fff; }

.spinner-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 25px;
}

.spinner {
    width: 34px;
    height: 34px;
    border: 4px solid #ddd;
    border-top: 4px solid #3f69b1;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.empty {
    background: #fafafa;
}
</style>
</head>

<body>

<h2>Академски Распоред</h2>

<div class="controls">

<label>Преглед:</label>
<select id="viewMode">
    <option value="day">Day</option>
    <option value="week">Week</option>
    <option value="month">Month</option>
</select>

<label>Датум:</label>
<select id="dateFilter"></select>

<label>Програма:</label>
<select id="programFilter"></select>

<label>Семестар:</label>
<select id="semesterFilter"></select>

<label>Просторија:</label>
<select id="roomFilter"></select>

</div>

<div id="viewInfo" style="margin: 8px 0 14px; font-size: 14px; color:#444;"></div>

<table id="schedule">
<thead>
<tr>
<th>Недела</th>
<th>Ден</th>
<th>Датум</th>
<th>Час</th>
<th>Просторија</th>
<th>Студиска програма</th>
<th>Семестар</th>
<th>Предмет</th>
<th>Тип на настава</th>
<th>Проф/асс</th>
<th>Групи</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC0PZyTfo2t3ON7emYUS8NRMPgfMYvTJ2w",
  authDomain: "schedule-app-63c5e.firebaseapp.com",
  projectId: "schedule-app-63c5e",
  storageBucket: "schedule-app-63c5e.firebasestorage.app",
  messagingSenderId: "32553140850",
  appId: "1:32553140850:web:a2449581c3d4ae194c78eb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let events = [];
let isLoading = true;

// FIXED ROOM LIST (for empty rows)
const dayRooms = [
"01 пред.",
"02 пред.",
"03 пред.",
"04 пред.",
"05 online",
"08 лаб.",
"09 лаб.",
"10 лаб.",
"11 лаб.",
"12 лаб.",
"14 лаб.",
"НФИЦ"
];

const roomColorCache = {};

function getRoomColor(room) {
    if (!room) return "#ffffff";
    if (roomColorCache[room]) return roomColorCache[room];

    const palette = ["#f1dfd3","#dde3ef","#cfe7b4","#f7e6b8","#e3d9f6","#d7eee8"];
    let hash = 0;
    for (let i=0;i<room.length;i++) hash = room.charCodeAt(i) + ((hash<<5)-hash);

    const color = palette[Math.abs(hash) % palette.length];
    roomColorCache[room] = color;
    return color;
}

function formatDate(dateStr){
    if(!dateStr) return "";
    const d = new Date(dateStr);
    if(Number.isNaN(d.getTime())) return dateStr;

    const m = ["Јан","Фев","Мар","Апр","Мај","Јун","Јул","Авг","Сеп","Окт","Ное","Дек"];
    return `${d.getDate()}-${m[d.getMonth()]}`;
}

function todayISO(){
    const t = new Date();
    return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,"0")}-${String(t.getDate()).padStart(2,"0")}`;
}

function fillSelect(id, values){
    const el=document.getElementById(id);
    el.innerHTML="<option value=''>Сите</option>";
    values.forEach(v=>{
        if(v) el.innerHTML+=`<option value="${v}">${v}</option>`;
    });
}

async function loadData(){

    const snap = await getDocs(collection(db,"events"));
    events = snap.docs.map(d=>d.data());

    isLoading=false;

    initFilters();
    render();
}

function initFilters(){

    const dates=[...new Set(events.map(e=>e.date))].sort();
    const progs=[...new Set(events.map(e=>e.program))];
    const sems=[...new Set(events.map(e=>Number(e.semester)))].sort((a,b)=>a-b);

    const rooms=[...new Set(events.map(e=>e.room))].sort();

    fillSelect("dateFilter",dates);
    fillSelect("programFilter",progs);
    fillSelect("semesterFilter",sems);
    fillSelect("roomFilter",rooms);

    const today=todayISO();
    if(dates.includes(today)) document.getElementById("dateFilter").value=today;

    document.querySelectorAll("select").forEach(s=>s.addEventListener("change",render));
}

// helper: build empty rows per room for DAY view
function buildEmptyRows(selectedDate){

    const tbody=document.getElementById("tbody");

    dayRooms.forEach(room=>{

        const match = events.find(e=>e.date===selectedDate && e.room===room);

        if(!match){
            tbody.innerHTML+=`
            <tr class="empty">
                <td></td>
                <td></td>
                <td>${formatDate(selectedDate)}</td>
                <td></td>
                <td>${room}</td>
                <td colspan="6"></td>
            </tr>`;
        }
    });
}

function render(){

const tbody=document.getElementById("tbody");

if(isLoading){
    tbody.innerHTML=`
    <tr>
        <td colspan="11">
            <div class="spinner-wrap"><div class="spinner"></div></div>
        </td>
    </tr>`;
    return;
}

tbody.innerHTML="";

const view=document.getElementById("viewMode").value;
const dateF=document.getElementById("dateFilter").value;
const progF=document.getElementById("programFilter").value;
const semF=document.getElementById("semesterFilter").value;
const roomF=document.getElementById("roomFilter").value;

const selectedDate=dateF||todayISO();

document.getElementById("viewInfo").textContent=
dateF?`Приказ: ${dateF}`:"Приказ: денес";

const sorted=[...events].sort((a,b)=>
(a.date||"").localeCompare(b.date||"")||
(a.room||"").localeCompare(b.room||"")||
(a.time||"").localeCompare(b.time||"")
);

// MAIN ROWS
sorted.forEach(e=>{

    if(view==="day" && e.date!==selectedDate) return;
    if(view==="week" && e.date!==selectedDate) return;
    if(view==="month" && e.date.substring(0,7)!==selectedDate.substring(0,7)) return;

    if(progF && e.program!==progF) return;
    if(semF && e.semester!==semF) return;
    if(roomF && e.room!==roomF) return;

    const color=getRoomColor(e.room);

    tbody.innerHTML+=`
    <tr style="background:${color}">
        <td>${e.week||""}</td>
        <td>${e.day||""}</td>
        <td>${formatDate(e.date)}</td>
        <td>${e.time||""}</td>
        <td>${e.room||""}</td>
        <td>${e.program||""}</td>
        <td>${e.semester||""}</td>
        <td>${e.subject||""}</td>
        <td>${e.type||""}</td>
        <td>${e.professor||""}</td>
        <td>${e.groups||""}</td>
    </tr>`;
});

// EMPTY ROWS ONLY FOR DAY VIEW
if(view==="day"){
    buildEmptyRows(selectedDate);
}

}

loadData();

</script>

</body>
</html>
