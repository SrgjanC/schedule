<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>Распоред</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC0PZyTfo2t3ON7emYUS8NRMPgfMYvTJ2w",
  authDomain: "schedule-app-63c5e.firebaseapp.com",
  projectId: "schedule-app-63c5e",
  storageBucket: "schedule-app-63c5e.firebasestorage.app",
  messagingSenderId: "32553140850",
  appId: "1:32553140850:web:a2449581c3d4ae194c78eb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// make db global for your functions
window.db = db;
window.getDocs = getDocs;
window.collection = collection;
</script>

    
<style>
body { font-family: Arial; padding: 20px; }
h2 { margin-bottom: 10px; }
.controls { margin-bottom: 15px; }
select { padding: 5px; margin-right: 10px; }

table { border-collapse: collapse; width: 100%; }
th, td {
    border: 1px solid #222;
    padding: 4px 6px;
    text-align: left;
    font-size: 13px;
}
th { background: #3f69b1; color: #fff; }
</style>
</head>

<body>

<h2>Академски Распоред</h2>

<div class="controls">

<label>Преглед:</label>
<select id="viewMode">
<option value="day">Day</option>
<option value="week">Week</option>
<option value="month">Month</option>
<option value="year">Year</option>
</select>

<label>Датум:</label>
<select id="dateFilter"></select>

<label>Програма:</label>
<select id="programFilter"></select>

<label>Семестар:</label>
<select id="semesterFilter"></select>

<label>Предмет:</label>
<select id="subjectFilter"></select>

<label>Просторија:</label>
<select id="roomFilter"></select>

<label>Час:</label>
<select id="hourFilter"></select>

</div>

<table id="schedule">
<thead>
<tr>
<th>Недела</th>
<th>Ден</th>
<th>Датум</th>
<th>Час</th>
<th>Просторија</th>
<th>Студиска програма</th>
<th>Семестар</th>
<th>Предмет</th>
<th>Тип на настава</th>
<th>Проф/асс</th>
<th>Групи</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

let events = [];
let hours = [];
let rooms = [];
let programs = [];
let subjects = [];

// ---------- NORMALIZE ----------
function normalize(e) {

let date = (e["Датум"] || "").trim();

if (date.includes("/")) {
let [d,m,y] = date.split("/");
date = `${y}-${m.padStart(2,"0")}-${d.padStart(2,"0")}`;
}

let time = (e["Час"] || "").toString().trim();
time = time.replace(".", ":");

let p = time.split(":");
if (p.length === 2) {
time = p[0].padStart(2,"0")+":"+p[1].padStart(2,"0");
}

return {
week: e["Недела"] || "",
day: (e["Ден"] || "").toLowerCase(),
date,
time,
room: (e["Просторија"] || "").trim(),
program: e["Студиска програма"] || "",
semester: e["Семестар"] || "",
subject: e["предмет"] || "",
type: e["тип на настава"] || "",
professor: e["проф/асс"] || "",
groups: e["Групи"] || ""
};
}

// ---------- LOAD ----------
async function loadData() {

    // EVENTS
    const eventsSnap = await getDocs(collection(db, "events"));
    events = eventsSnap.docs.map(doc => normalize(doc.data()));

    // ROOMS
    const roomsSnap = await getDocs(collection(db, "rooms"));
    rooms = roomsSnap.docs.map(doc => doc.data().name);

    // HOURS
    const hoursSnap = await getDocs(collection(db, "hours"));
    hours = hoursSnap.docs.map(doc => doc.data().time);

    // PROGRAMS
    const progSnap = await getDocs(collection(db, "programs"));
    programs = progSnap.docs.map(doc => doc.data().name);

    // SUBJECTS
    const subjSnap = await getDocs(collection(db, "subjects"));
    subjects = subjSnap.docs.map(doc => doc.data());

    console.log("Loaded from Firebase:", events.length);
console.log("RAW EVENTS:", events);
    initFilters();
    render();
}

// ---------- FILTER HELPERS ----------
function fillSelect(id, values){
const el=document.getElementById(id);
el.innerHTML="<option value=''>Сите</option>";
values.forEach(v=>{
if(v) el.innerHTML+=`<option value="${v}">${v}</option>`;
});
}

// ---------- DYNAMIC FILTERS ----------
function updateSemesterFilter(){
const program=document.getElementById("programFilter").value;

let sem;

if(program){
sem = subjects
.filter(s=>s["Програма"]===program)
.map(s=>s["Семестар"]);
}else{
sem = subjects.map(s=>s["Семестар"]);
}

fillSelect("semesterFilter",[...new Set(sem)]);
}

function updateSubjectFilter(){
const program=document.getElementById("programFilter").value;
const semester=document.getElementById("semesterFilter").value;

let subs = subjects;

if(program){
subs = subs.filter(s=>s["Програма"]===program);
}

if(semester){
subs = subs.filter(s=>s["Семестар"]===semester);
}

subs = subs.map(s=>s["Предмет"]);

fillSelect("subjectFilter",[...new Set(subs)]);
}

// ---------- INIT ----------
function initFilters(){

const dates=[...new Set(events.map(e=>e.date))].sort();

fillSelect("dateFilter",dates);
fillSelect("programFilter",programs);
fillSelect("roomFilter",rooms);
fillSelect("hourFilter",hours);

updateSemesterFilter();
updateSubjectFilter();

document.getElementById("programFilter").addEventListener("change",()=>{
updateSemesterFilter();
updateSubjectFilter();
render();
});

document.getElementById("semesterFilter").addEventListener("change",()=>{
updateSubjectFilter();
render();
});

document.querySelectorAll("select").forEach(s=>{
s.addEventListener("change",render);
});
}

// ---------- RENDER ----------
function render(){

const dateF=document.getElementById("dateFilter").value;
const progF=document.getElementById("programFilter").value;
const semF=document.getElementById("semesterFilter").value;
const subjF=document.getElementById("subjectFilter").value;
const roomF=document.getElementById("roomFilter").value;
const hourF=document.getElementById("hourFilter").value;

const tbody=document.querySelector("#schedule tbody");
tbody.innerHTML="";

const dates=[...new Set(events.map(e=>e.date))];

dates.forEach(date=>{

if(dateF && date!==date) return;

rooms.forEach(room=>{

if(roomF && room!==room) return;

hours.forEach(time=>{

if(hourF && time!==time) return;

const matches = events.filter(e=>
e.date===date &&
e.time===time &&
e.room===room &&
(!progF || e.program===progF) &&
(!semF || e.semester===semF) &&
(!subjF || e.subject===subjF)
);

if(matches.length===0){
tbody.innerHTML+=`
<tr>
<td></td><td></td>
<td>${date}</td>
<td>${time}</td>
<td>${room}</td>
<td colspan="6"></td>
</tr>`;
}else{
matches.forEach(e=>{
tbody.innerHTML+=`
<tr>
<td>${e.week}</td>
<td>${e.day}</td>
<td>${date}</td>
<td>${time}</td>
<td>${room}</td>
<td>${e.program}</td>
<td>${e.semester}</td>
<td>${e.subject}</td>
<td>${e.type}</td>
<td>${e.professor}</td>
<td>${e.groups}</td>
</tr>`;
});
}

});
});
});

}

// ---------- START ----------
loadData();


</script>

</body>
</html>
