<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>Распоред</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body { font-family: Arial; padding: 20px; }
h2 { margin-bottom: 10px; }
.controls { margin-bottom: 15px; }
select { padding: 5px; margin-right: 10px; }

table { border-collapse: collapse; width: 100%; }
th, td {
    border: 1px solid #222;
    padding: 4px 6px;
    text-align: left;
    font-size: 13px;
}
th { background: #3f69b1; color: #fff; }
</style>
</head>

<body>

<h2>Академски Распоред</h2>

<div class="controls">

<label>Преглед:</label>
<select id="viewMode">
<option value="day">Day</option>
<option value="week">Week</option>
<option value="month">Month</option>
<option value="year">Year</option>
</select>

<label>Датум:</label>
<select id="dateFilter"></select>

<label>Програма:</label>
<select id="programFilter"></select>

<label>Семестар:</label>
<select id="semesterFilter"></select>

<label>Предмет:</label>
<select id="subjectFilter"></select>

<label>Просторија:</label>
<select id="roomFilter"></select>

<label>Час:</label>
<select id="hourFilter"></select>

</div>

<table id="schedule">
<thead>
<tr>
<th>Недела</th>
<th>Ден</th>
<th>Датум</th>
<th>Час</th>
<th>Просторија</th>
<th>Студиска програма</th>
<th>Семестар</th>
<th>Предмет</th>
<th>Тип на настава</th>
<th>Проф/асс</th>
<th>Групи</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC0PZyTfo2t3ON7emYUS8NRMPgfMYvTJ2w",
  authDomain: "schedule-app-63c5e.firebaseapp.com",
  projectId: "schedule-app-63c5e",
  storageBucket: "schedule-app-63c5e.firebasestorage.app",
  messagingSenderId: "32553140850",
  appId: "1:32553140850:web:a2449581c3d4ae194c78eb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ---------------- DATA ----------------
let events = [];
let hours = [];
let rooms = [];
let programs = [];
let subjects = [];



// ---------- LOAD ----------
async function loadData() {

const eventsSnap = await getDocs(collection(db, "events"));
events = eventsSnap.docs.map(doc => doc.data());

const roomsSnap = await getDocs(collection(db, "rooms"));
rooms = roomsSnap.docs.map(doc => doc.data().name);

const hoursSnap = await getDocs(collection(db, "hours"));
hours = hoursSnap.docs.map(doc => doc.data().time);

const progSnap = await getDocs(collection(db, "programs"));
programs = progSnap.docs.map(doc => doc.data().name);

const subjSnap = await getDocs(collection(db, "subjects"));
subjects = subjSnap.docs.map(doc => doc.data());

console.log("Loaded:", events.length);
console.log(events);

initFilters();
render();
}

// ---------- FILTER HELPERS ----------
function fillSelect(id, values){
const el=document.getElementById(id);
el.innerHTML="<option value=''>Сите</option>";
values.forEach(v=>{
if(v) el.innerHTML+=`<option value="${v}">${v}</option>`;
});
}

// ---------- INIT ----------
function initFilters(){

const dates=[...new Set(events.map(e=>e.date))].sort();

fillSelect("dateFilter",dates);
fillSelect("programFilter",programs);
fillSelect("roomFilter",rooms);
fillSelect("hourFilter",hours);

updateSemesterFilter();
updateSubjectFilter();

document.querySelectorAll("select").forEach(s=>{
s.addEventListener("change",render);
});
}

function updateSemesterFilter(){
const program=document.getElementById("programFilter").value;

let sem = subjects.map(s=>s["Семестар"]);

fillSelect("semesterFilter",[...new Set(sem)]);
}

function updateSubjectFilter(){
let subs = subjects.map(s=>s["Предмет"]);
fillSelect("subjectFilter",[...new Set(subs)]);
}

// ---------- RENDER ----------
function render(){

const dateF=document.getElementById("dateFilter").value;
const progF=document.getElementById("programFilter").value;
const semF=document.getElementById("semesterFilter").value;
const subjF=document.getElementById("subjectFilter").value;
const roomF=document.getElementById("roomFilter").value;
const hourF=document.getElementById("hourFilter").value;

const tbody=document.querySelector("#schedule tbody");
tbody.innerHTML="";

events.forEach(e=>{

if(dateF && e.date !== dateF) return;
if(progF && e.program !== progF) return;
if(semF && e.semester !== semF) return;
if(subjF && e.subject !== subjF) return;
if(roomF && e.room !== roomF) return;
if(hourF && e.time !== hourF) return;

tbody.innerHTML += `
<tr>
<td>${e.week}</td>
<td>${e.day}</td>
<td>${e.date}</td>
<td>${e.time}</td>
<td>${e.room}</td>
<td>${e.program}</td>
<td>${e.semester}</td>
<td>${e.subject}</td>
<td>${e.type}</td>
<td>${e.professor}</td>
<td>${e.groups}</td>
</tr>
`;
});
}

// ---------- START ----------
loadData();

</script>

</body>
</html>
