<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>Распоред</title>

<style>
body { font-family: Arial; padding: 20px; }
h2 { margin-bottom: 10px; }

.controls { margin-bottom: 15px; }
select { padding: 5px; margin-right: 10px; }

table {
    border-collapse: collapse;
    width: 100%;
}

th, td {
    border: 1px solid #222;
    padding: 4px 6px;
    font-size: 13px;
    text-align: left;
}

th {
    background: #3f69b1;
    color: white;
}

.spinner-wrap {
    display: flex;
    justify-content: center;
    padding: 25px;
}

.spinner {
    width: 34px;
    height: 34px;
    border: 4px solid #ddd;
    border-top: 4px solid #3f69b1;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

.empty {
    background: #f7f7f7;
}
</style>
</head>

<body>

<h2>Академски Распоред</h2>

<div class="controls">
<select id="viewMode">
    <option value="day">Day</option>
    <option value="week">Week</option>
    <option value="month">Month</option>
</select>

<select id="dateFilter"></select>
<select id="programFilter"></select>
<select id="semesterFilter"></select>
<select id="roomFilter"></select>
</div>

<div id="viewInfo"></div>

<table>
<thead>
<tr>
<th>Недела</th>
<th>Ден</th>
<th>Датум</th>
<th>Час</th>
<th>Просторија</th>
<th>Програма</th>
<th>Семестар</th>
<th>Предмет</th>
<th>Тип</th>
<th>Проф</th>
<th>Групи</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyC0PZyTfo2t3ON7emYUS8NRMPgfMYvTJ2w",
  authDomain: "schedule-app-63c5e.firebaseapp.com",
  projectId: "schedule-app-63c5e"
});

const db = getFirestore(app);

let events = [];
let rooms = [];

const TIMES = [];
for (let h = 8; h <= 20; h++) {
    TIMES.push(String(h).padStart(2,"0") + ":00");
}

const roomColor = {};

function color(room){
    if(roomColor[room]) return roomColor[room];
    const palette=["#f1dfd3","#dde3ef","#cfe7b4","#f7e6b8","#e3d9f6"];
    let hash=0;
    for(let c of room) hash=room.charCodeAt(0)+((hash<<5)-hash);
    return roomColor[room]=palette[Math.abs(hash)%palette.length];
}

function today(){
    const d=new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function fill(id,vals){
    const el=document.getElementById(id);
    el.innerHTML="<option value=''>Сите</option>";
    vals.forEach(v=>el.innerHTML+=`<option value="${v}">${v}</option>`);
}

async function load(){
    const snap = await getDocs(collection(db,"events"));
    events = snap.docs.map(d=>d.data());

    const roomSnap = await getDocs(collection(db,"rooms"));
    rooms = roomSnap.docs.map(d=>d.data().name).sort();

    init();
    render();
}

function init(){

    fill("dateFilter",[...new Set(events.map(e=>e.date))].sort());
    fill("programFilter",[...new Set(events.map(e=>e.program))]);
    fill("semesterFilter",[...new Set(events.map(e=>e.semester))].sort((a,b)=>a-b));
    fill("roomFilter",rooms);

    document.querySelectorAll("select").forEach(s=>s.onchange=render);

    const df=document.getElementById("dateFilter");
    df.value=today();
}

function render(){

const tbody=document.getElementById("tbody");
tbody.innerHTML="";

const view=document.getElementById("viewMode").value;
const date=document.getElementById("dateFilter").value;
const prog=document.getElementById("programFilter").value;
const sem=document.getElementById("semesterFilter").value;
const roomF=document.getElementById("roomFilter").value;

const selectedDate = date || today();

document.getElementById("viewInfo").innerText =
view==="day" ? `Ден: ${selectedDate}` : view;

const filtered = events.filter(e=>
(!date || e.date===date) &&
(!prog || e.program===prog) &&
(!sem || e.semester===sem) &&
(!roomF || e.room===roomF)
);

// INDEX for fast lookup
const map = {};
for(const e of filtered){
    map[e.room+"_"+e.date+"_"+e.time]=e;
}

// DAY VIEW = FULL GRID (ROOM × TIME)
if(view==="day"){

for(const room of rooms){
for(const time of TIMES){

const key = room+"_"+selectedDate+"_"+time;
const e = map[key];

tbody.innerHTML += `
<tr class="${e?"":"empty"}" style="background:${e?color(room):"#fafafa"}">
<td>${e?.week||""}</td>
<td>${e?.day||""}</td>
<td>${selectedDate}</td>
<td>${time}</td>
<td>${room}</td>
<td>${e?.program||""}</td>
<td>${e?.semester||""}</td>
<td>${e?.subject||""}</td>
<td>${e?.type||""}</td>
<td>${e?.professor||""}</td>
<td>${e?.groups||""}</td>
</tr>`;
}
}

return;
}

// WEEK/MONTH fallback (simple)
filtered.forEach(e=>{
tbody.innerHTML += `
<tr style="background:${color(e.room)}">
<td>${e.week||""}</td>
<td>${e.day||""}</td>
<td>${e.date}</td>
<td>${e.time}</td>
<td>${e.room}</td>
<td>${e.program}</td>
<td>${e.semester}</td>
<td>${e.subject}</td>
<td>${e.type}</td>
<td>${e.professor}</td>
<td>${e.groups}</td>
</tr>`;
});

}

load();

</script>

</body>
</html>
