<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>Распоред</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body { font-family: Arial; padding: 20px; }
h2 { margin-bottom: 10px; }
.controls { margin-bottom: 15px; }
select { padding: 5px; margin-right: 10px; }

table { border-collapse: collapse; width: 100%; }
th, td {
    border: 1px solid #222;
    padding: 4px 6px;
    text-align: left;
    font-size: 13px;
}
th { background: #3f69b1; color: #fff; }
</style>
</head>

<body>

<h2>Академски Распоред</h2>

<div class="controls">
    <label>Преглед:</label>
    <select id="viewMode">
        <option value="day">Day</option>
        <option value="week">Week</option>
        <option value="month">Month</option>
        <option value="year">Year</option>
    </select>

    <label>Датум:</label>
    <select id="dateFilter"></select>

    <label>Програма:</label>
    <select id="programFilter"></select>

    <label>Семестар:</label>
    <select id="semesterFilter"></select>

    <label>Просторија:</label>
    <select id="roomFilter"></select>

    <label>Час:</label>
    <select id="hourFilter"></select>
</div>

<div id="viewInfo" style="margin: 8px 0 14px; font-size: 14px;"></div>

<table id="schedule">
<thead>
<tr>
<th>Недела</th>
<th>Ден</th>
<th>Датум</th>
<th>Час</th>
<th>Просторија</th>
<th>Студиска програма</th>
<th>Семестар</th>
<th>Предмет</th>
<th>Тип на настава</th>
<th>Проф/асс</th>
<th>Групи</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

// ---------- GLOBAL ----------
let events = [];
let hours = [];
let rooms = [];
let programs = [];
let subjects = [];

// ---------- NORMALIZE ----------
function normalize(e) {

    let date = (e["Датум"] || "").trim();

    if (date.includes("/")) {
        let [d,m,y] = date.split("/");
        date = `${y}-${m.padStart(2,"0")}-${d.padStart(2,"0")}`;
    }

    let time = (e["Час"] || "").toString().trim();
    time = time.replace(".", ":");

    let parts = time.split(":");
    if (parts.length === 2) {
        time = parts[0].padStart(2,"0") + ":" + parts[1].padStart(2,"0");
    }

    return {
        week: e["Недела"] || "",
        day: (e["Ден"] || "").toLowerCase(),
        date,
        time,
        room: (e["Просторија"] || "").trim(),
        program: e["Студиска програма"] || "",
        semester: e["Семестар"] || "",
        subject: e["предмет"] || "",
        type: e["тип на настава"] || "",
        professor: e["проф/асс"] || "",
        groups: e["Групи"] || ""
    };
}

// ---------- LOAD ----------
function loadData() {
    Promise.all([
        fetch("events.csv").then(r => r.text()),
        fetch("hours.csv").then(r => r.text()),
        fetch("rooms.csv").then(r => r.text()),
        fetch("programs.csv").then(r => r.text()),
        fetch("subjects.csv").then(r => r.text())
    ]).then(([eventsText, hoursText, roomsText, programsText, subjectsText]) => {

        events = Papa.parse(eventsText, {header:true, delimiter:";"}).data.map(normalize);

        hours = Papa.parse(hoursText, {header:true}).data
            .map(h => h["Час"])
            .filter(Boolean)
            .map(t => {
                let p = t.split(":");
                return p[0].padStart(2,"0")+":"+p[1].padStart(2,"0");
            });

        rooms = Papa.parse(roomsText, {header:true}).data
            .map(r => r[Object.keys(r)[0]])
            .filter(Boolean)
            .map(r => r.trim());

        programs = Papa.parse(programsText, {header:true}).data
            .map(p => p["Програма"])
            .filter(Boolean);

        subjects = Papa.parse(subjectsText, {header:true, delimiter:";"}).data;

        console.log("Loaded:", events.length, "events");

        initFilters();
        render();
    });
}

// ---------- FILTERS ----------
function fillSelect(id, values) {
    const select = document.getElementById(id);
    select.innerHTML = "<option value=''>Сите</option>";
    values.forEach(v => {
        if (v) select.innerHTML += `<option value="${v}">${v}</option>`;
    });
}

function initFilters() {

    const dates = [...new Set(events.map(e => e.date))].sort();

    fillSelect("dateFilter", dates);
    fillSelect("programFilter", programs);
    fillSelect("roomFilter", rooms);
    fillSelect("hourFilter", hours);

    updateSemesterFilter();

    document.getElementById("programFilter").addEventListener("change", () => {
        updateSemesterFilter();
        render();
    });

    document.querySelectorAll("select").forEach(s =>
        s.addEventListener("change", render)
    );
}

// ---------- SEMESTER LOGIC ----------
function updateSemesterFilter() {
    const program = document.getElementById("programFilter").value;

    let semesters;

    if (program) {
        semesters = subjects
            .filter(s => s["Програма"] === program)
            .map(s => s["Семестар"]);
    } else {
        semesters = subjects.map(s => s["Семестар"]);
    }

    semesters = [...new Set(semesters)];
    fillSelect("semesterFilter", semesters);
}

// ---------- RENDER ----------
function render() {

    const dateFilter = document.getElementById("dateFilter").value;
    const programFilter = document.getElementById("programFilter").value;
    const semesterFilter = document.getElementById("semesterFilter").value;
    const roomFilter = document.getElementById("roomFilter").value;
    const hourFilter = document.getElementById("hourFilter").value;

    const tbody = document.querySelector("#schedule tbody");
    tbody.innerHTML = "";

    const dates = [...new Set(events.map(e => e.date))];

    let count = 0;

    dates.forEach(date => {

        if (dateFilter && date !== dateFilter) return;

        rooms.forEach(room => {

            if (roomFilter && room !== roomFilter) return;

            hours.forEach(time => {

                if (hourFilter && time !== hourFilter) return;

                const matches = events.filter(e =>
                    e.date === date &&
                    e.time === time &&
                    e.room === room &&
                    (!programFilter || e.program === programFilter) &&
                    (!semesterFilter || e.semester === semesterFilter)
                );

                if (matches.length === 0) {
                    tbody.innerHTML += `
                    <tr>
                        <td></td><td></td>
                        <td>${date}</td>
                        <td>${time}</td>
                        <td>${room}</td>
                        <td colspan="6"></td>
                    </tr>`;
                    count++;
                } else {
                    matches.forEach(e => {
                        tbody.innerHTML += `
                        <tr>
                            <td>${e.week}</td>
                            <td>${e.day}</td>
                            <td>${date}</td>
                            <td>${time}</td>
                            <td>${room}</td>
                            <td>${e.program}</td>
                            <td>${e.semester}</td>
                            <td>${e.subject}</td>
                            <td>${e.type}</td>
                            <td>${e.professor}</td>
                            <td>${e.groups}</td>
                        </tr>`;
                        count++;
                    });
                }

            });
        });
    });

    console.log("Rendered:", count, "rows");
}

// ---------- START ----------
loadData();

</script>

</body>
</html>
