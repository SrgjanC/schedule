<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>НОВ Распоред</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { font-family: Arial; padding: 20px; }
h2 { margin-bottom: 10px; }

.controls {
    margin-bottom: 15px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

select {
    padding: 5px;
}

table {
    border-collapse: collapse;
    width: 100%;
}

th, td {
    border: 1px solid #222;
    padding: 4px 6px;
    text-align: left;
    font-size: 13px;
}

th {
    background: #3f69b1;
    color: #fff;
}

.spinner-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 25px;
}

.spinner {
    width: 34px;
    height: 34px;
    border: 4px solid #ddd;
    border-top: 4px solid #3f69b1;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<h2>Академски Распоред (Денес)</h2>

<div class="controls">

<label>Датум:</label>
<select id="dateFilter"></select>

</div>

<div id="viewInfo" style="margin: 8px 0 14px; font-size: 14px; color: #444;"></div>

<table>
<thead>
<tr>
<th>Ден</th>
<th>Датум</th>
<th>Час</th>
<th>Просторија</th>
<th>Програма</th>
<th>Семестар</th>
<th>Предмет</th>
<th>Тип</th>
<th>Професор</th>
<th>Групи</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<script>

const SUPABASE_URL = "https://xrftnuvogyskgoocmiwx.supabase.co";
const SUPABASE_KEY = "sb_publishable_JhfT4_SBa_Wh1_f_2YwCQQ__xu1KwoU";

const supabase = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

let events = [];
let isLoading = true;

function todayISO(){
    const t = new Date();
    return t.toISOString().split("T")[0];
}

async function loadData(){

    const { data, error } = await supabase
        .from("schedule")
        .select(`
            *,
            classes (
                name,
                semester,
                program_id,
                programs ( name )
            ),
            room:room_id ( name ),
            profesor:profesor_id ( name ),
            tip:tip_id ( name ),
            time:start_time ( name )
        `);

    console.log(data, error);

    if(error){
        console.error(error);
        return;
    }

    events = data || [];

    initFilters();
    render();

}

function initFilters(){

    const dates = [...new Set(events.map(e => e.date))].sort();

    const select = document.getElementById("dateFilter");
    select.innerHTML = "";

    dates.forEach(d => {
        select.innerHTML += `<option value="${d}">${d}</option>`;
    });

    const today = todayISO();

    if(dates.includes(today)){
        select.value = today;
    }

    select.addEventListener("change", render);
}

function render(){

    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    const date = document.getElementById("dateFilter").value || todayISO();

    document.getElementById("viewInfo").innerText =
        "Приказ за: " + date;

    const filtered = events.filter(e => e.date === date);

    if(filtered.length === 0){
        tbody.innerHTML = `
        <tr>
            <td colspan="10">Нема распоред за денес</td>
        </tr>`;
        return;
    }

    filtered.forEach(e => {

        tbody.innerHTML += `
        <tr>
            <td>${e.day || ""}</td>
            <td>${e.date || ""}</td>
            <td>${e.time?.name || ""}</td>
            <td>${e.room?.name || ""}</td>
            <td>${e.classes?.programs?.name || ""}</td>
            <td>${e.classes?.semester || ""}</td>
            <td>${e.classes?.name || ""}</td>
            <td>${e.tip?.name || ""}</td>
            <td>${e.profesor?.name || ""}</td>
            <td>${e.grupi || ""}</td>
        </tr>`;
    });

}

loadData();

</script>

</body>
</html>
