<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Неделен Распоред</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<style>

body{
    font-family: Arial, sans-serif;
    margin:20px;
    background:#f6f7fb;
    color:#222;
}

h1{
    margin-bottom:10px;
}

/* CLEAN UNIVERSITY STYLE TABLE */
table{
    width:100%;
    border-collapse:collapse;
    background:white;
    font-size:13px;
}

th, td{
    border:1px solid #222;
    padding:6px;
    text-align:left;
    vertical-align:top;
}

th{
    background:#2f5390;
    color:white;
    position:sticky;
    top:0;
    z-index:2;
}

/* ROW HOVER LIKE ACADEMIC SYSTEM */
tr:hover{
    background:#f0f4ff;
}

/* SMALL TEXT STYLE */
.small{
    font-size:12px;
    color:#555;
}

.empty{
    text-align:center;
    padding:20px;
    color:#888;
}

</style>
</head>

<body>

<h1>Неделен Распоред</h1>

<table>

<thead>
<tr>
    <th>Ден</th>
    <th>Датум</th>
    <th>Час</th>
    <th>Просторија</th>
    <th>Студиска програма</th>
    <th>Семестар</th>
    <th>Предмет</th>
    <th>Тип</th>
    <th>Проф/асс</th>
    <th>Групи</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

<script>

const SUPABASE_URL = "https://xrftnuvogyskgoocmiwx.supabase.co";
const SUPABASE_KEY = "sb_publishable_JhfT4_SBa_Wh1_f_2YwCQQ__xu1KwoU";

const supabaseClient = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

async function loadSchedule(){

    const { data, error } = await supabaseClient
        .from("schedule")
        .select(`
    *,
    classes (
        name,
        semester,
        programs (
            name
        )
    ),
    room:room_id (name),
    profesor:profesor_id (name),
    tip:tip_id (name),
    time:start_time (name)
`)

    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    if(error || !data){
        tbody.innerHTML =
            `<tr><td colspan="10" class="empty">Грешка или нема податоци</td></tr>`;
        return;
    }

    // SORT: date → room → time
    const sorted = [...data].sort((a,b)=>{

        const d = (a.date||"").localeCompare(b.date||"");
        if(d !== 0) return d;

        const r = (a.room?.name||"").localeCompare(b.room?.name||"");
        if(r !== 0) return r;

        return (a.time?.name||"").localeCompare(b.time?.name||"");
    });

    sorted.forEach(e => {

        tbody.innerHTML += `
        <tr>
            <td>${e.day || ""}</td>
            <td>${e.date || ""}</td>
            <td>${e.time?.name || ""}</td>
            <td>${e.room?.name || ""}</td>
            <td>${e.classes?.programs?.name || ""}</td>
            <td>${e.classes?.semester || ""}</td>
            <td>${e.classes?.name || ""}</td>
            <td>${e.tip?.name || ""}</td>
            <td>${e.profesor?.name || ""}</td>
            <td class="small">${e.grupi || ""}</td>
        </tr>`;
    });

}

loadSchedule();

</script>

</body>
</html>
