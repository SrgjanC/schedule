<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Денешен Распоред 2</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
    font-family: Arial, sans-serif;
    margin:20px;
    background:#f5f5f5;
}

h1{
    margin-bottom:10px;
}

.date-label{
    margin-bottom:20px;
    font-size:18px;
    color:#444;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th, td{
    border:1px solid #ccc;
    padding:8px;
    text-align:center;
    vertical-align:top;
}

th{
    background:#333;
    color:white;
}

.time-col{
    width:90px;
    background:#eee;
    font-weight:bold;
}

.event{
    background:#dff0ff;
    border-radius:6px;
    padding:6px;
    margin-bottom:5px;
    text-align:left;
    font-size:13px;
}

.class-name{
    font-weight:bold;
    margin-bottom:4px;
}

.room{
    color:#555;
    font-size:12px;
}

.tip{
    color:#0077cc;
    font-size:12px;
}

.prof{
    color:#666;
    font-size:12px;
}

.grupi{
    color:#aa0000;
    font-size:12px;
}

.empty{
    color:#999;
    font-size:12px;
}

@media(max-width:768px){

    body{
        margin:5px;
    }

    table{
        font-size:11px;
    }

    .event{
        font-size:11px;
        padding:4px;
    }

}

</style>
</head>

<body>

<h1>Денешен Распоред</h1>

<div class="date-label" id="todayLabel"></div>

<table id="scheduleTable">

<thead>
<tr>
    <th class="time-col">Време</th>
    <th>Понеделник</th>
    <th>Вторник</th>
    <th>Среда</th>
    <th>Четврток</th>
    <th>Петок</th>
</tr>
</thead>

<tbody>
</tbody>

</table>

<script>

const SUPABASE_URL = 'https://xrftnuvogyskgoocmiwx.supabase.co';

const SUPABASE_KEY = 'sb_publishable_JhfT4_SBa_Wh1_f_2YwCQQ__xu1KwoU';
async function loadSchedule(){

    const { data, error } = await supabaseClient
        .from('schedule')
        .select('*')
        .limit(10);

    console.log("DATA:");
    console.log(data);

    console.log("ERROR:");
    console.log(error);

}

loadSchedule();

const supabaseClient = supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

const fixedTimes = [
    '08:00',
    '09:00',
    '10:00',
    '11:00',
    '12:00',
    '13:00',
    '14:00',
    '15:00',
    '16:00',
    '17:00',
    '18:00',
    '19:00'
];

const days = [
    'Monday',
    'Tuesday',
    'Wednesday',
    'Thursday',
    'Friday'
];

const today = new Date();

const todayDate = today.toISOString().split('T')[0];

document.getElementById('todayLabel').innerText =
    today.toLocaleDateString('mk-MK');

function buildTable(){

    const tbody = document.querySelector('#scheduleTable tbody');

    tbody.innerHTML = '';

    fixedTimes.forEach(time => {

        const row = document.createElement('tr');

        row.innerHTML = `
            <td class="time-col">${time}</td>
            <td data-day="Monday" data-time="${time}"></td>
            <td data-day="Tuesday" data-time="${time}"></td>
            <td data-day="Wednesday" data-time="${time}"></td>
            <td data-day="Thursday" data-time="${time}"></td>
            <td data-day="Friday" data-time="${time}"></td>
        `;

        tbody.appendChild(row);

    });

}

async function loadSchedule(){

    buildTable();

    const { data, error } = await supabaseClient
        .from('schedule')
        .select(`
            *,
            classes (
                id,
                name,
                semester,
                program_id
            ),
            room:room_id (
                name
            ),
            profesor:profesor_id (
                name
            ),
            tip:tip_id (
                name
            ),
            time:start_time (
                name
            )
        `)
        .eq('date', todayDate);

    console.log(data);
    console.log(error);

    if(error){
        console.error(error);
        return;
    }

    if(!data || data.length === 0){

        const tbody = document.querySelector('#scheduleTable tbody');

        const row = document.createElement('tr');

        row.innerHTML = `
            <td colspan="6" class="empty">
                Нема распоред за денес
            </td>
        `;

        tbody.appendChild(row);

        return;
    }

    data.forEach(item => {

        const timeName = item.time?.name;

        const cell = document.querySelector(
            `[data-day="${item.day}"][data-time="${timeName}"]`
        );

        if(!cell) return;

        const div = document.createElement('div');

        div.className = 'event';

        div.innerHTML = `
            <div class="class-name">
                ${item.classes?.name || ''}
            </div>

            <div class="room">
                Просторија:
                ${item.room?.name || '-'}
            </div>

            <div class="tip">
                ${item.tip?.name || ''}
            </div>

            <div class="prof">
                ${item.profesor?.name || ''}
            </div>

            <div class="grupi">
                ${item.grupi || ''}
            </div>
        `;

        cell.appendChild(div);

    });

}

loadSchedule();

</script>

</body>
</html>
