<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>Академски Распоред</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { font-family: Arial; padding: 20px; }
h2 { margin-bottom: 10px; }

table {
    border-collapse: collapse;
    width: 100%;
}

th, td {
    border: 1px solid #222;
    padding: 6px;
    font-size: 13px;
    text-align: left;
    vertical-align: top;
}

th {
    background: #3f69b1;
    color: white;
}

.empty {
    padding: 20px;
    text-align: center;
    color: #777;
}
</style>
</head>

<body>

<h2>Денешен Распоред</h2>

<div id="info"></div>

<table>
<thead>
<tr>
    <th>Ден</th>
    <th>Датум</th>
    <th>Час</th>
    <th>Просторија</th>
    <th>Предмет</th>
    <th>Тип</th>
    <th>Професор</th>
    <th>Групи</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<script>

const SUPABASE_URL = "https://xrftnuvogyskgoocmiwx.supabase.co";
const SUPABASE_KEY = "sb_publishable_JhfT4_SBa_Wh1_f_2YwCQQ__xu1KwoU";

const supabase = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

function todayISO(){
    return new Date().toISOString().split("T")[0];
}

async function load(){

    const today = todayISO();

    document.getElementById("info").innerText =
        "Приказ за денес: " + today;

    // ✅ SIMPLE + SAFE QUERY (NO COMPLEX JOINS FIRST)
    const { data, error } = await supabase
        .from("schedule")
        .select(`
            id,
            day,
            date,
            grupi,
            class_id,
            room_id,
            profesor_id,
            tip_id,
            start_time,
            classes (
                name
            ),
            room:room_id (name),
            profesor:profesor_id (name),
            tip:tip_id (name),
            time:start_time (name)
        `)
        .eq("date", today);

    console.log("DATA:", data);
    console.log("ERROR:", error);

    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    if(error){
        tbody.innerHTML =
            `<tr><td colspan="8" class="empty">Грешка при вчитување</td></tr>`;
        return;
    }

    if(!data || data.length === 0){
        tbody.innerHTML =
            `<tr><td colspan="8" class="empty">Нема распоред за денес</td></tr>`;
        return;
    }

    data.forEach(e => {

        tbody.innerHTML += `
        <tr>
            <td>${e.day || ""}</td>
            <td>${e.date || ""}</td>
            <td>${e.time?.name || ""}</td>
            <td>${e.room?.name || ""}</td>
            <td>${e.classes?.name || ""}</td>
            <td>${e.tip?.name || ""}</td>
            <td>${e.profesor?.name || ""}</td>
            <td>${e.grupi || ""}</td>
        </tr>`;
    });

}

load();

</script>

</body>
</html>
