<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>CSV Upload</title>

<style>

body{
    font-family: Arial;
    padding:20px;
}

h2{
    margin-bottom:15px;
}

input,button{
    padding:8px;
    margin-right:10px;
}

button{
    cursor:pointer;
}

#log{
    margin-top:20px;
    white-space:pre-wrap;
    font-family:monospace;
    background:#f5f5f5;
    padding:15px;
    border:1px solid #ccc;
    max-height:500px;
    overflow:auto;
}

.ok{
    color:green;
}

.err{
    color:red;
}

.warn{
    color:#d68910;
}

</style>
</head>

<body>

<h2>CSV Import → events</h2>

<input type="file" id="csvFile" accept=".csv">

<button id="uploadBtn">
Upload
</button>

<div id="log"></div>

<script type="module">

import { createClient }
from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase =
createClient(
    "https://elmxwpwhyewgjlvoadtb.supabase.co",
    "YOUR_PUBLIC_KEY"
);

const log =
    document.getElementById("log");

function addLog(text, cls=""){

    log.innerHTML += `
        <div class="${cls}">
            ${text}
        </div>
    `;

    log.scrollTop = log.scrollHeight;
}

function normalizeDate(d){

    // 4/1/2026 -> 2026-04-01

    if(!d) return null;

    const parts = d.split("/");

    if(parts.length !== 3){
        return null;
    }

    const month =
        parts[0].padStart(2,"0");

    const day =
        parts[1].padStart(2,"0");

    const year =
        parts[2];

    return `${year}-${month}-${day}`;
}

function normalizeTime(t){

    // 9:00:00 -> 09:00

    if(!t) return null;

    const parts = t.split(":");

    return `${parts[0].padStart(2,"0")}:${parts[1]}`;
}

async function getExistingEvents(){

    const { data, error } =
        await supabase
        .from("events")
        .select(`
            id,
            event_date,
            event_time,
            room_id,
            subject_id
        `);

    if(error){

        addLog(
            "ERROR loading existing events",
            "err"
        );

        console.error(error);

        return [];
    }

    return data || [];
}

async function uploadBatch(batch){

    const { error } =
        await supabase
        .from("events")
        .insert(batch);

    if(error){

        console.error(error);

        addLog(
            `BATCH ERROR: ${error.message}`,
            "err"
        );

        return false;
    }

    return true;
}

document
.getElementById("uploadBtn")
.onclick = async ()=>{

    log.innerHTML = "";

    const file =
        document
        .getElementById("csvFile")
        .files[0];

    if(!file){

        alert("Select CSV");

        return;
    }

    addLog("Reading CSV...");

    const text =
        await file.text();

    const lines =
        text.split(/\r?\n/);

    if(lines.length <= 1){

        addLog("CSV empty","err");

        return;
    }

    const existingEvents =
        await getExistingEvents();

    addLog(
        `Loaded existing events: ${existingEvents.length}`
    );

    const inserts = [];

    let skipped = 0;
    let invalid = 0;

    for(let i=1; i<lines.length; i++){

        const line =
            lines[i].trim();

        if(!line){
            continue;
        }

        const cols =
            line.split(";");

        if(cols.length < 6){

            invalid++;

            addLog(
                `Line ${i+1}: invalid column count`,
                "err"
            );

            continue;
        }

        const row = {

            event_date:
                normalizeDate(cols[0]),

            event_time:
                normalizeTime(cols[1]),

            type:
                cols[2]?.trim(),

            subject_id:
                Number(cols[3]),

            professor_id:
                cols[4]
                    ? Number(cols[4])
                    : null,

            room_id:
                Number(cols[5])
        };

        // validation

        if(
            !row.event_date ||
            !row.event_time ||
            !row.type ||
            !row.subject_id ||
            !row.room_id
        ){

            invalid++;

            addLog(
                `Line ${i+1}: missing required fields`,
                "err"
            );

            continue;
        }

        // DUPLICATE CHECK
        // SAME:
        // date + time + room + subject

        const duplicate =
            existingEvents.find(e => {

                return (
                    e.event_date === row.event_date &&
                    e.event_time.substring(0,5) === row.event_time &&
                    Number(e.room_id) === Number(row.room_id) &&
                    Number(e.subject_id) === Number(row.subject_id)
                );
            });

        if(duplicate){

            skipped++;

            addLog(
                `Duplicate skipped → ${row.event_date} ${row.event_time} room:${row.room_id} subject:${row.subject_id}`,
                "warn"
            );

            continue;
        }

        inserts.push(row);
    }

    addLog("");
    addLog(`VALID: ${inserts.length}`,"ok");
    addLog(`SKIPPED: ${skipped}`,"warn");
    addLog(`INVALID: ${invalid}`,"err");

    if(!inserts.length){

        addLog("Nothing to insert.","warn");

        return;
    }

    // BATCH INSERT

    const BATCH_SIZE = 500;

    for(let i=0; i<inserts.length; i += BATCH_SIZE){

        const batch =
            inserts.slice(
                i,
                i + BATCH_SIZE
            );

        addLog(
            `Uploading batch ${Math.floor(i/BATCH_SIZE)+1} (${batch.length} rows)...`
        );

        const ok =
            await uploadBatch(batch);

        if(ok){

            addLog(
                `Batch uploaded.`,
                "ok"
            );
        }
    }

    addLog("");
    addLog("IMPORT FINISHED","ok");
};

</script>

</body>
</html>
