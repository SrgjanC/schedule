<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>CSV Import - Распоред</title>

<style>
body{
    font-family:Arial;
    margin:20px;
}

h2{ margin-bottom:15px; }

.controls{ margin-bottom:20px; }

button,input{
    padding:8px 12px;
    margin-right:10px;
}

.summary{
    display:flex;
    gap:15px;
    margin-bottom:20px;
}

.box{
    padding:10px 15px;
    border-radius:6px;
    color:white;
    font-weight:bold;
}

.valid{ background:#2e7d32; }
.warning{ background:#f9a825; }
.error{ background:#c62828; }

.progress{
    margin:15px 0;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
}

th,td{
    border:1px solid #333;
    padding:6px;
}

th{ background:#3f69b1; color:white; }

.valid-row{ background:#e8f5e9; }
.warning-row{ background:#fff8e1; }
.error-row{ background:#ffebee; }

.small{ font-size:11px; }
</style>
</head>

<body>

<h2>CSV Import</h2>

<div class="controls">
<input type="file" id="csvFile" accept=".csv">
<button id="validateBtn">Validate</button>
<button id="importBtn" disabled>Import</button>
</div>

<div class="summary">
<div class="box valid">VALID: <span id="validCount">0</span></div>
<div class="box warning">WARN: <span id="warningCount">0</span></div>
<div class="box error">ERROR: <span id="errorCount">0</span></div>
</div>

<div class="progress" id="progress"></div>

<table>
<thead>
<tr>
<th>Status</th>
<th>Row</th>
<th>Date</th>
<th>Time</th>
<th>Type</th>
<th>Subject</th>
<th>Professor</th>
<th>Room</th>
<th>Errors</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
    "https://elmxwpwhyewgjlvoadtb.supabase.co",
    "sb_publishable_yUCov2V1dKGEc-rBwt6v2A_dBkHEiYd"
);

let subjects = [];
let professors = [];
let rooms = [];
let events = [];
let validatedRows = [];

const parallelAllowed = ["Вежби","Испит","Практичен испит"];

// ---------------- SAFE NUMBER ----------------
const toNumber = (v) => {
    const n = Number(String(v).trim());
    return Number.isFinite(n) ? n : null;
};

// ---------------- LOAD DATA ----------------
async function loadReferenceData(){

    const { data: s } = await supabase.from('subjects').select('*');
    const { data: p } = await supabase.from('professors').select('*');
    const { data: r } = await supabase.from('rooms').select('*');

    subjects = s || [];
    professors = p || [];
    rooms = r || [];

    const { data: e } = await supabase
        .from('events')
        .select('*');

    events = e || [];
}

// ---------------- DATE ----------------
function normalizeDate(v){
    if(!v) return null;
    const parts = v.split("/");
    if(parts.length !== 3) return null;

    return `${parts[2]}-${parts[0].padStart(2,"0")}-${parts[1].padStart(2,"0")}`;
}

// ---------------- TIME ----------------
function normalizeTime(v){
    if(!v) return null;
    const parts = v.split(":");
    if(parts.length < 2) return null;
    return `${parts[0].padStart(2,"0")}:${parts[1]}`;
}

// ---------------- CSV PARSE ----------------
function parseCSV(text){

    const lines = text.replace(/\r/g,'').split('\n').filter(l => l.trim());
    const header = lines[0].split(";");

    const rows = [];

    for(let i=1;i<lines.length;i++){
        const cols = lines[i].split(";");
        const obj = {};

        header.forEach((h,idx)=>{
            obj[h.trim()] = cols[idx]?.trim() || "";
        });

        rows.push(obj);
    }

    return rows;
}

// ---------------- VALIDATE ----------------
function validateRows(rows){

    validatedRows = [];
    const csvDup = new Set();

    rows.forEach((raw,index)=>{

        const normalized = {
            event_date: normalizeDate(raw.event_date),
            event_time: normalizeTime(raw.event_time),
            type: raw.type?.trim(),
            subject_id: toNumber(raw.subject_id),
            professor_id: raw.professor_id ? toNumber(raw.professor_id) : null,
            room_id: toNumber(raw.room_id)
        };

        const errors = [];

        if(!normalized.event_date) errors.push("Bad date");
        if(!normalized.event_time) errors.push("Bad time");
        if(!normalized.type) errors.push("Missing type");
        if(normalized.subject_id === null) errors.push("Bad subject");
        if(normalized.room_id === null) errors.push("Bad room");

        const subject = subjects.find(s => Number(s.id) === normalized.subject_id);

        if(!subject) errors.push("Subject not found");

        const room = rooms.find(r => Number(r.id) === normalized.room_id);

        if(!room) errors.push("Room not found");

        if(normalized.professor_id !== null){
            const prof = professors.find(p => Number(p.id) === normalized.professor_id);
            if(!prof){
                errors.push("Professor not found");
                normalized.professor_id = null;
            }
        }

        // CSV duplicate RULE (ALLOW same time+room+subject different types)
        const key = `${normalized.event_date}|${normalized.event_time}|${normalized.room_id}|${normalized.subject_id}`;

        if(csvDup.has(key)){
            errors.push("Duplicate row in CSV");
        }
        csvDup.add(key);

        // DB duplicate (ONLY exact same event)
        const dbDup = events.find(e =>
            e.event_date === normalized.event_date &&
            e.event_time === normalized.event_time &&
            Number(e.room_id) === normalized.room_id &&
            Number(e.subject_id) === normalized.subject_id &&
            e.type === normalized.type
        );

        if(dbDup){
            errors.push("Already exists in DB");
        }

        let status = errors.length ? "ERROR" : "VALID";

        validatedRows.push({
            status,
            raw,
            data: normalized,
            errors
        });
    });

    render();
}

// ---------------- RENDER ----------------
function render(){

    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    let v=0,e=0;

    validatedRows.forEach((r,i)=>{

        if(r.status==="VALID") v++;
        else e++;

        tbody.innerHTML += `
        <tr class="${r.status==='VALID'?'valid-row':'error-row'}">
            <td>${r.status}</td>
            <td>${i+1}</td>
            <td>${r.data.event_date}</td>
            <td>${r.data.event_time}</td>
            <td>${r.data.type}</td>
            <td>${r.data.subject_id}</td>
            <td>${r.data.professor_id}</td>
            <td>${r.data.room_id}</td>
            <td class="small">${r.errors.join("<br>")}</td>
        </tr>`;
    });

    document.getElementById("validCount").innerText = v;
    document.getElementById("errorCount").innerText = e;
    document.getElementById("importBtn").disabled = v===0;
}

// ---------------- IMPORT ----------------
document.getElementById("importBtn").onclick = async ()=>{

    const valid = validatedRows
        .filter(r => r.status==="VALID")
        .map(r => r.data);

    const chunks = [];

    for(let i=0;i<valid.length;i+=200){
        chunks.push(valid.slice(i,i+200));
    }

    for(let i=0;i<chunks.length;i++){

        const { error } = await supabase
            .from('events')
            .insert(chunks[i]);

        if(error){
            alert("Import failed: " + error.message);
            console.error(error);
            return;
        }
    }

    alert("Import OK");
    location.reload();
};

// ---------------- EVENTS ----------------
document.getElementById("validateBtn").onclick = async ()=>{

    const file = document.getElementById("csvFile").files[0];

    if(!file){
        alert("Select file");
        return;
    }

    document.getElementById("progress").innerText = "Loading...";

    await loadReferenceData();

    const text = await file.text();
    const rows = parseCSV(text);

    document.getElementById("progress").innerText = "Validating...";

    validateRows(rows);

    document.getElementById("progress").innerText = "Done";
};

</script>

</body>
</html>
