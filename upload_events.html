<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>CSV Import - Распоред</title>

<style>

body{
    font-family:Arial;
    margin:20px;
}

h2{
    margin-bottom:15px;
}

.controls{
    margin-bottom:20px;
}

button,input{
    padding:8px 12px;
    margin-right:10px;
}

.summary{
    display:flex;
    gap:15px;
    margin-bottom:20px;
    font-weight:bold;
}

.box{
    padding:10px 15px;
    border-radius:6px;
    color:white;
}

.valid{ background:#2e7d32; }
.warning{ background:#f9a825; }
.error{ background:#c62828; }

table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
}

th,td{
    border:1px solid #333;
    padding:6px;
    vertical-align:top;
}

th{
    background:#3f69b1;
    color:white;
}

tr.valid-row{
    background:#e8f5e9;
}

tr.warning-row{
    background:#fff8e1;
}

tr.error-row{
    background:#ffebee;
}

.small{
    font-size:11px;
    color:#555;
}

</style>
</head>

<body>

<h2>CSV Import - Распоред</h2>

<div class="controls">

<input type="file" id="csvFile" accept=".csv">

<button id="validateBtn">
    Validate CSV
</button>

<button id="importBtn" disabled>
    Import Valid Rows
</button>

</div>

<div class="summary">

<div class="box valid">
    VALID: <span id="validCount">0</span>
</div>

<div class="box warning">
    WARNINGS: <span id="warningCount">0</span>
</div>

<div class="box error">
    ERRORS: <span id="errorCount">0</span>
</div>

</div>

<table>

<thead>
<tr>
    <th>Status</th>
    <th>Row</th>
    <th>Date</th>
    <th>Time</th>
    <th>Type</th>
    <th>Subject</th>
    <th>Professor</th>
    <th>Room</th>
    <th>Errors / Warnings</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

<script type="module">

import { createClient }
from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm?v=3.5';

const supabase =
createClient(
    'https://elmxwpwhyewgjlvoadtb.supabase.co',
    'sb_publishable_yUCov2V1dKGEc-rBwt6v2A_dBkHEiYd'
);

let subjects = [];
let professors = [];
let rooms = [];
let events = [];

let validatedRows = [];

const parallelAllowed = [
    "Вежби",
    "Испит",
    "Практичен испит"
];

async function loadReferenceData(){

    const { data: s } =
        await supabase
        .from('subjects')
        .select('*');

    subjects = s || [];

    const { data: p } =
        await supabase
        .from('professors')
        .select('*');

    professors = p || [];

    const { data: r } =
        await supabase
        .from('rooms')
        .select('*');

    rooms = r || [];

    const { data: e } =
        await supabase
        .from('events')
        .select(`
            *,
            subjects (
                semester,
                program_id
            )
        `);

    events = (e || []).map(ev => ({

        event_date: ev.event_date,

        event_time:
            ev.event_time?.substring(0,5),

        room_id: ev.room_id,

        type: ev.type,

        subject_id: ev.subject_id,

        semester:
            ev.subjects?.semester,

        program_id:
            ev.subjects?.program_id
    }));
}

function normalizeDate(v){

    if(!v) return null;

    const parts = v.split("/");

    if(parts.length !== 3) return null;

    const month =
        parts[0].padStart(2,"0");

    const day =
        parts[1].padStart(2,"0");

    const year = parts[2];

    return `${year}-${month}-${day}`;
}

function normalizeTime(v){

    if(!v) return null;

    const parts = v.split(":");

    return `${parts[0].padStart(2,"0")}:${parts[1]}`;
}

function validateConflict(row){

    const subject =
        subjects.find(s =>
            Number(s.id) === Number(row.subject_id)
        );

    if(!subject){
        return null;
    }

    const programId =
        subject.program_id;

    const semester =
        subject.semester;

    const existingConflict =
        events.find(e => {

            if(
                e.event_date !== row.event_date ||
                e.event_time !== row.event_time
            ){
                return false;
            }

            const sameProgram =
                String(e.program_id) ===
                String(programId);

            const sameSemester =
                String(e.semester) ===
                String(semester);

            if(!sameProgram || !sameSemester){
                return false;
            }

            if(
                parallelAllowed.includes(row.type) &&
                parallelAllowed.includes(e.type)
            ){
                return row.type !== e.type;
            }

            return true;
        });

    return existingConflict;
}

function renderTable(){

    const tbody =
        document.getElementById("tbody");

    tbody.innerHTML = "";

    let valid = 0;
    let warning = 0;
    let error = 0;

    validatedRows.forEach((r,index)=>{

        if(r.status === "VALID") valid++;
        if(r.status === "WARNING") warning++;
        if(r.status === "ERROR") error++;

        const cls =
            r.status === "VALID"
            ? "valid-row"
            : r.status === "WARNING"
            ? "warning-row"
            : "error-row";

        tbody.innerHTML += `
        <tr class="${cls}">

            <td>${r.status}</td>

            <td>${index+1}</td>

            <td>${r.data.event_date || ""}</td>

            <td>${r.data.event_time || ""}</td>

            <td>${r.data.type || ""}</td>

            <td>${r.data.subject_id || ""}</td>

            <td>${r.data.professor_id || ""}</td>

            <td>${r.data.room_id || ""}</td>

            <td class="small">
                ${[
                    ...r.errors,
                    ...r.warnings
                ].join("<br>")}
            </td>

        </tr>`;
    });

    document.getElementById("validCount").innerText =
        valid;

    document.getElementById("warningCount").innerText =
        warning;

    document.getElementById("errorCount").innerText =
        error;

    document.getElementById("importBtn").disabled =
        valid === 0;
}

function parseCSV(text){

    const lines =
        text
        .replace(/\r/g,'')
        .split('\n')
        .filter(l => l.trim());

    const header =
        lines[0].split(";");

    const rows = [];

    for(let i=1; i<lines.length; i++){

        const cols =
            lines[i].split(";");

        const obj = {};

        header.forEach((h,index)=>{

            obj[h.trim()] =
                cols[index]?.trim() || "";
        });

        rows.push(obj);
    }

    return rows;
}

function validateRows(rows){

    validatedRows = [];

    const csvDuplicates = new Set();

    rows.forEach((raw,index)=>{

        const errors = [];
        const warnings = [];

        const normalized = {

            event_date:
                normalizeDate(raw.event_date),

            event_time:
                normalizeTime(raw.event_time),

            type:
                raw.type,

            subject_id:
                Number(raw.subject_id),

            professor_id:
                raw.professor_id
                ? Number(raw.professor_id)
                : null,

            room_id:
                Number(raw.room_id)
        };

        if(!normalized.event_date){
            errors.push("Invalid date");
        }

        if(!normalized.event_time){
            errors.push("Invalid time");
        }

        if(!normalized.type){
            errors.push("Missing type");
        }

        const subject =
            subjects.find(s =>
                Number(s.id) ===
                normalized.subject_id
            );

        if(!subject){
            errors.push("Invalid subject_id");
        }

        const room =
            rooms.find(r =>
                Number(r.id) ===
                normalized.room_id
            );

        if(!room){
            errors.push("Invalid room_id");
        }

        if(normalized.professor_id){

            const prof =
                professors.find(p =>
                    Number(p.id) ===
                    normalized.professor_id
                );

            if(!prof){
                errors.push("Invalid professor_id");
            }
        }

        const dupKey = `
            ${normalized.event_date}
            ${normalized.event_time}
            ${normalized.room_id}
        `;

        if(csvDuplicates.has(dupKey)){

            errors.push("Duplicate inside CSV");
        }

        csvDuplicates.add(dupKey);

        const dbDuplicate =
            events.find(e =>

                e.event_date === normalized.event_date &&
                e.event_time === normalized.event_time &&
                Number(e.room_id) === Number(normalized.room_id)
            );

        if(dbDuplicate){

            errors.push("Room already occupied");
        }

        const businessConflict =
            validateConflict(normalized);

        if(businessConflict){

            errors.push(
                "Program/Semester conflict"
            );
        }

        let status = "VALID";

        if(errors.length){
            status = "ERROR";
        }
        else if(warnings.length){
            status = "WARNING";
        }

        validatedRows.push({

            status,

            raw,

            data: normalized,

            errors,

            warnings
        });
    });

    renderTable();
}

document.getElementById("validateBtn")
.onclick = async ()=>{

    const file =
        document.getElementById("csvFile")
        .files[0];

    if(!file){

        alert("Select CSV file");
        return;
    }

    await loadReferenceData();

    const text =
        await file.text();

    const rows =
        parseCSV(text);

    validateRows(rows);
};

document.getElementById("importBtn")
.onclick = async ()=>{

    const validRows =
        validatedRows
        .filter(r =>
            r.status === "VALID"
        )
        .map(r => ({

            event_date:
                r.data.event_date,

            event_time:
                r.data.event_time,

            type:
                r.data.type,

            subject_id:
                r.data.subject_id,

            professor_id:
                r.data.professor_id,

            room_id:
                r.data.room_id
        }));

    if(!validRows.length){

        alert("No valid rows");
        return;
    }

    const { error } =
        await supabase
        .from('events')
        .insert(validRows);

    if(error){

        console.error(error);
        alert(error.message);
        return;
    }

    alert(
        `Imported ${validRows.length} events`
    );

    location.reload();
};

</script>

</body>
</html>
