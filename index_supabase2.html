<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>Денешен Распоред - Matrix View</title>

<style>
body {
    font-family: Arial;
    padding: 20px;
}

h2 {
    margin-bottom: 10px;
}

table {
    border-collapse: collapse;
    width: 100%;
    font-size: 13px;
}

th, td {
    border: 1px solid #222;
    padding: 6px;
    text-align: center;
    vertical-align: top;
}

th {
    background: #3f69b1;
    color: white;
}

.room-cell {
    background: #f5f5f5;
    font-weight: bold;
    text-align: left;
}

.event {
    background: #dbeafe;
    border-radius: 4px;
    padding: 2px;
    font-size: 12px;
}
    .now-hour {
    background: rgba(255, 204, 0, 0.15) !important;
}

.now-hour-header {
    background: rgba(255, 204, 0, 0.15) !important;
    color: #000 !important;
}
    .event {
    border-left: 4px solid rgba(0,0,0,0.15);
    margin: 1px 0;
}
</style>
</head>

<body>

<h2>Денешен Распоред (Matrix View)</h2>

<h3>Предавални</h3>
<table id="table-lecture"></table>

<h3>Лаборатории / НФИЦ</h3>
<table id="table-labs"></table>

<h3>Институти / Факултети</h3>
<table id="table-inst"></table>

<script type="module">

import { createClient }
from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
    'https://elmxwpwhyewgjlvoadtb.supabase.co',
    'sb_publishable_yUCov2V1dKGEc-rBwt6v2A_dBkHEiYd'
);

// ================= CONFIG =================
const ROOMS_LECTURE = [
"01 пред.","02 пред.","03 пред.","04 пред."
];

const ROOMS_LABS = [
"08 лаб.","09 лаб.","10 лаб.","11 лаб.","12 лаб.","14 лаб.","НФИЦ"
];
const ROOMS_INST = [
"Инст. за Физиологија",
"Инст. за Микробиологија",
"Инст. за Анатомија",
"ПМФ",
"Фак. за физичко образование",
"Кат. за Медицинска физика"
];

const HOURS = Array.from({length: 12}, (_,i) => i + 8); // 8–19

    const programColorMap = {};
function getProgramColor(program) {

    if (!program) return "#ffffff";

    if (programColorMap[program]) {
        return programColorMap[program];
    }

    const palette = [
        "#dbeafe", // blue
        "#dcfce7", // green
        "#fef9c3", // yellow
        "#ffe4e6", // pink
        "#ede9fe", // purple
        "#e0f2fe", // cyan
        "#f3e8ff", // violet
        "#fef3c7"
    ];

    let hash = 0;

    for (let i = 0; i < program.length; i++) {
        hash = program.charCodeAt(i) + ((hash << 5) - hash);
    }

    const color = palette[Math.abs(hash) % palette.length];

    programColorMap[program] = color;

    return color;
}
// ================= TODAY =================
function getCurrentHour() {
    return new Date().getHours();
}
    
function todayISO() {
    const d = new Date();
    return d.toISOString().slice(0,10);
}

const today = todayISO();
function getDayName(dateStr){

    const days = [
        "недела",
        "понеделник",
        "вторник",
        "среда",
        "четврток",
        "петок",
        "сабота"
    ];

    return days[new Date(dateStr).getDay()];
}

    let events = [];
// ================= LOAD =================

async function load() {

    const { data, error } = await supabase
        .from("events")
        .select(`
            *,
            subjects (
                id,
                name,
                semester,
                programs (
                    id,
                    name
                )
            ),
            professors:professor_id (
                id,
                name
            ),
            rooms (
                id,
                name
            )
        `)
        .eq("event_date", today);

    if (error) {
        alert(error.message);
        return;
    }

    events = (data || []).map(e => ({
        id: e.id,
        date: e.event_date,
        time: e.event_time?.substring(0,5),

        room: e.rooms?.name || "",

        subject: e.subjects?.name || "",
        semester: e.subjects?.semester || "",
        program: e.subjects?.programs?.name || "",

        // ⚠️ ONLY WORKS IF FK EXISTS
        professorName: e.professor?.name || "",

        type: e.type || "",
        groups: e.groups_text,
        day: getDayName(e.event_date)
    }));
console.log("SAMPLE EVENT:", data[0]);
    render(events);
}

// ================= RENDER MATRIX =================

function render(events) {
    const currentHour = getCurrentHour(); // ✅ only once
    const tableLecture = document.getElementById("table-lecture");
    const tableLabs = document.getElementById("table-labs");
    const tableInst = document.getElementById("table-inst");

    const map = {};

    events.forEach(e => {

        const room = e.room || "";
        const hour = (e.time || "").substring(0,2);

        const key = `${room}_${hour}`;

        if (!map[key]) map[key] = [];

        map[key].push(e);
    });

    function buildTable(rooms, tableEl) {

        let html = "<tr><th>Просторија</th>";

       

HOURS.forEach(h => {

    const isNow = h === currentHour;

    html += `
        <th class="${isNow ? 'now-hour-header' : ''}">
            ${h}:00
        </th>
    `;
});

        html += "</tr>";

        rooms.forEach(room => {

            html += `<tr>`;
            html += `<td class="room-cell">${room}</td>`;



HOURS.forEach(hour => {

    const isNow = hour === currentHour;

    const key = `${room}_${String(hour).padStart(2,"0")}`;
    const items = map[key] || [];

    html += `<td class="${isNow ? 'now-hour' : ''}">`;

                items.forEach(e => {

                    const bg = getProgramColor(e.program);

html += `
    <div class="event" style="background:${bg}">
        <b>${e.subject}</b><br>
        <small>
            ${e.program}<br>
            Сем: ${e.semester}<br>
            Тип: ${e.type || ""}<br>
            Проф: ${e.professorName || ""}
        </small>
    </div>
`;
                });

                html += `</td>`;
            });

            html += `</tr>`;
        });

        tableEl.innerHTML = html;
    }

    buildTable(ROOMS_LECTURE, tableLecture);
    buildTable(ROOMS_LABS, tableLabs);
    buildTable(ROOMS_INST, tableInst);
}

load();

</script>

</body>
</html>
