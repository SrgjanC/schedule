<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>Admin Распоред</title>

<style>
body {
    font-family: Arial;
    padding: 20px;
}

h2 {
    margin-bottom: 10px;
}

.controls {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
    flex-wrap: wrap;
}

select, input, button {
    padding: 6px;
    font-size: 14px;
}

table {
    border-collapse: collapse;
    width: 100%;
    margin-top: 10px;
}

th, td {
    border: 1px solid #222;
    padding: 5px;
    font-size: 13px;
    text-align: left;
}

th {
    background: #3f69b1;
    color: white;
}

tr:hover {
    background: #f0f0f0;
    cursor: pointer;
}

#form {
    margin-top: 20px;
    padding: 15px;
    border: 1px solid #ccc;
    background: #fafafa;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
}

#form label {
    font-size: 12px;
    font-weight: bold;
}

#status {
    margin-top: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<h2>Admin Распоред</h2>

<div class="controls">
    <select id="programFilter"></select>
    <select id="semesterFilter"></select>
    <select id="subjectFilter"></select>
</div>

<table>
<thead>
<tr>
    <th>Датум</th>
    <th>Час</th>
    <th>Просторија</th>
    <th>Програма</th>
    <th>Семестар</th>
    <th>Предмет</th>
    <th>Тип</th>
    <th>Професор</th>
    <th>Групи</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<div id="form">

<div>
<label>Датум</label>
<input type="date" id="date">
</div>

<div>
<label>Час</label>
<input type="time" id="time">
</div>

<div>
<label>Просторија</label>
<input type="text" id="room">
</div>

<div>
<label>Програма</label>
<select id="program"></select>
</div>

<div>
<label>Семестар</label>
<select id="semester"></select>
</div>

<div>
<label>Предмет</label>
<select id="subject"></select>
</div>

<div>
<label>Тип</label>
<select id="type">
<option>Предавање</option>
<option>Вежби</option>
<option>Колоквиум</option>
</select>
</div>

<div>
<label>Професор</label>
<input type="text" id="professor">
</div>

<div>
<label>Групи</label>
<input type="text" id="groups">
</div>

</div>

<br>

<button id="save">Save</button>
<button id="delete">Delete</button>

<div id="status"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
addDoc,
deleteDoc,
doc,
query,
where
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyC0PZyTfo2t3ON7emYUS8NRMPgfMYvTJ2w",
authDomain: "schedule-app-63c5e.firebaseapp.com",
projectId: "schedule-app-63c5e",
storageBucket: "schedule-app-63c5e.firebasestorage.app",
messagingSenderId: "32553140850",
appId: "1:32553140850:web:a2449581c3d4ae194c78eb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let events = [];
let programs = [];
let subjects = [];

let selectedId = null;

function fill(id, arr, label=true){
const el = document.getElementById(id);
el.innerHTML = label ? "<option value=''>All</option>" : "";
arr.forEach(v=>{
if(v) el.innerHTML += `<option value="${v}">${v}</option>`;
});
}

async function load(){

const eSnap = await getDocs(collection(db,"events_new"));
events = eSnap.docs.map(d=>({id:d.id,...d.data()}));

const pSnap = await getDocs(collection(db,"programs_new"));
programs = pSnap.docs.map(d=>d.data().name);

const sSnap = await getDocs(collection(db,"subjects_new"));
subjects = sSnap.docs.map(d=>d.data());

fill("program", programs);
fill("programFilter", programs);

render();
}

function updateSemesters(){

const p = document.getElementById("program").value;

const sem = [...new Set(
subjects
.filter(s=>s.Nasoka===p)
.map(s=>s.Semestar)
)];

fill("semester", sem);
fill("semesterFilter", sem);
}

function updateSubjects(){

const p = document.getElementById("program").value;
const s = document.getElementById("semester").value;

const sub = subjects
.filter(x=>x.Nasoka===p && String(x.Semestar)===String(s))
.map(x=>x.Predmet);

fill("subject", sub);
fill("subjectFilter", sub);
}

function render(){

const tbody = document.getElementById("tbody");
tbody.innerHTML = "";

events.forEach(e=>{

tbody.innerHTML += `
<tr onclick="window.selectRow('${e.id}')">
<td>${e.date}</td>
<td>${e.time}</td>
<td>${e.room}</td>
<td>${e.program}</td>
<td>${e.semester}</td>
<td>${e.subject}</td>
<td>${e.type}</td>
<td>${e.professor||""}</td>
<td>${e.groups||""}</td>
</tr>`;
});
}

window.selectRow = (id)=>{

const e = events.find(x=>x.id===id);
selectedId = id;

document.getElementById("date").value = e.date;
document.getElementById("time").value = e.time;
document.getElementById("room").value = e.room;

document.getElementById("program").value = e.program;

updateSemesters();
document.getElementById("semester").value = e.semester;

updateSubjects();
document.getElementById("subject").value = e.subject;

document.getElementById("type").value = e.type;
document.getElementById("professor").value = e.professor || "";
document.getElementById("groups").value = e.groups || "";
};

document.getElementById("program").onchange = ()=>{
updateSemesters();
updateSubjects();
};

document.getElementById("semester").onchange = updateSubjects;

document.getElementById("save").onclick = async ()=>{

const data = {
date: date.value,
time: time.value,
room: room.value,
program: program.value,
semester: semester.value,
subject: subject.value,
type: type.value,
professor: professor.value,
groups: groups.value
};

const conflict = events.find(e =>
e.date===data.date &&
e.time===data.time &&
e.room===data.room &&
e.id !== selectedId
);

if(conflict){
alert("Room already taken");
return;
}

if(selectedId){
await deleteDoc(doc(db,"events_new",selectedId));
}

await addDoc(collection(db,"events_new"),data);

selectedId = null;
status.textContent = "Saved";
load();
};

document.getElementById("delete").onclick = async ()=>{

if(!selectedId) return;

await deleteDoc(doc(db,"events_new",selectedId));
selectedId = null;
status.textContent = "Deleted";
load();
};

load();

</script>

</body>
</html>
