<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>Admin Распоред</title>

<style>
body{
    font-family:Arial;
    padding:20px;
    margin:0;
}

h2{margin-bottom:15px;}

.controls{margin-bottom:15px;}

select,button,input{
    padding:6px 8px;
    margin-right:8px;
    font-size:14px;
}

table{
    border-collapse:collapse;
    width:100%;
    table-layout:fixed;
}

th,td{
    border:1px solid #333;
    padding:4px;
    vertical-align:top;
    font-size:12px;
}

th{
    background:#3f69b1;
    color:white;
    text-align:center;
}

.time-col{
    width:70px;
    background:#f5f5f5;
    font-weight:bold;
    text-align:center;
}

.slot{
    min-height:70px;
    cursor:pointer;
}

.event{
    background:#d9e8ff;
    border:1px solid #6f9be8;
    border-radius:4px;
    padding:4px;
    font-size:11px;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    padding:20px;
    width:420px;
}

.modal-content label{display:block;margin-top:10px;}

.modal-content select,
.modal-content input{
    width:100%;
}

.modal-buttons{
    margin-top:15px;
    text-align:right;
}

</style>
</head>

<body>

<h2>Admin Распоред</h2>

<div class="controls">
<label>Датум:</label>
<input type="date" id="datePicker">
<button id="todayBtn">Денес</button>
</div>

<table>
<thead>
<tr>
<th class="time-col">Час</th>
<th>01 пред.</th>
<th>02 пред.</th>
<th>03 пред.</th>
<th>04 пред.</th>
<th>08 лаб.</th>
<th>09 лаб.</th>
<th>10 лаб.</th>
<th>11 лаб.</th>
<th>12 лаб.</th>
<th>14 лаб.</th>
<th>НФИЦ</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<h3>Распоред</h3>

<label>Програма</label>
<select id="programSelect"></select>

<label>Семестар</label>
<select id="semesterSelect"></select>

<label>Предмет</label>
<select id="subjectSelect"></select>

<label>Тип</label>
<select id="typeSelect">
<option>Предавање</option>
<option>Вежби</option>
<option>Колоквиум</option>
<option>Испит</option>
</select>

<label>Професор</label>
<input id="professorInput">

<label>Групи</label>
<input id="groupsInput">

<label>Коментар</label>
<input id="commentInput">

<div class="modal-buttons">
<button id="deleteBtn">Delete</button>
<button id="closeBtn">Cancel</button>
<button id="saveBtn">Save</button>
</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
addDoc,
updateDoc,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyC0PZyTfo2t3ON7emYUS8NRMPgfMYvTJ2w",
authDomain: "schedule-app-63c5e.firebaseapp.com",
projectId: "schedule-app-63c5e",
storageBucket: "schedule-app-63c5e.firebasestorage.app",
messagingSenderId: "32553140850",
appId: "1:32553140850:web:a2449581c3d4ae194c78eb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ROOMS=[
"01 пред.","02 пред.","03 пред.","04 пред.",
"08 лаб.","09 лаб.","10 лаб.","11 лаб.","12 лаб.","14 лаб.","НФИЦ"
];

const TIMES=[];
for(let h=8;h<=20;h++)
TIMES.push(String(h).padStart(2,"0")+":00");

let events=[], programs=[], subjects=[];
let currentDate="",currentRoom="",currentTime="",editingId=null;

function today(){
const d=new Date();
return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

// ================= LOAD =================
async function load(){

const p=await getDocs(collection(db,"programs_new"));
programs=p.docs.map(d=>({id:d.id,...d.data()}));

const s=await getDocs(collection(db,"subjects_new"));
subjects=s.docs.map(d=>({id:d.id,...d.data()}));

const e=await getDocs(collection(db,"events_new"));
events=e.docs.map(d=>({id:d.id,...d.data()}));

fillPrograms();
render();
}

// ================= PROGRAMS =================
function fillPrograms(){

const sel=document.getElementById("programSelect");
sel.innerHTML="";

programs.forEach(p=>{
sel.innerHTML+=`<option value="${p.id}">${p.name}</option>`;
});

updateSubjects();
sel.onchange=updateSubjects;
}

// ================= SUBJECTS =================
function updateSubjects(){

const pid=document.getElementById("programSelect").value;

const sem=document.getElementById("semesterSelect");
const sub=document.getElementById("subjectSelect");

const filtered=subjects.filter(s=>s.programId===pid);

const semesters=[...new Set(filtered.map(s=>s.semester))].sort();

sem.innerHTML="";
semesters.forEach(x=>{
sem.innerHTML+=`<option>${x}</option>`;
});

function refresh(){
const f=filtered.filter(s=>String(s.semester)===String(sem.value));

sub.innerHTML="";
f.forEach(s=>{
sub.innerHTML+=`<option value="${s.id}">${s.name}</option>`;
});
}

refresh();
sem.onchange=refresh;
}

// ================= RENDER =================
function render(){

const tbody=document.getElementById("tbody");
tbody.innerHTML="";

const d=document.getElementById("datePicker").value||today();

TIMES.forEach(time=>{

let row=`<tr><td class="time-col">${time}</td>`;

ROOMS.forEach(room=>{

const e=events.find(x=>
x.date===d &&
x.time===time &&
x.room===room
);

row+=`
<td class="slot"
onclick="openSlot('${d}','${time}','${room}')">
${e?`
<div class="event">
<b>${e.subjectName||""}</b><br>
${e.programName||""}<br>
Sem ${e.semester||""}
</div>`:""}
</td>`;

});

row+="</tr>";
tbody.innerHTML+=row;

});
}

// ================= OPEN =================
window.openSlot=(d,t,r)=>{

currentDate=d;
currentTime=t;
currentRoom=r;

const ex=events.find(e=>
e.date===d && e.time===t && e.room===r
);

editingId=ex?.id||null;

document.getElementById("modal").style.display="flex";

if(ex){
document.getElementById("programSelect").value=ex.programId;
updateSubjects();
document.getElementById("semesterSelect").value=ex.semester;
updateSubjects();
document.getElementById("subjectSelect").value=ex.subjectId;
document.getElementById("typeSelect").value=ex.type;
document.getElementById("professorInput").value=ex.professor||"";
document.getElementById("groupsInput").value=ex.groups||"";
document.getElementById("commentInput").value=ex.comment||"";
}
else{
document.getElementById("commentInput").value="";
}
};

// ================= SAVE =================
document.getElementById("saveBtn").onclick=async()=>{

const pid=document.getElementById("programSelect").value;
const sid=document.getElementById("subjectSelect").value;
const sem=document.getElementById("semesterSelect").value;
const type=document.getElementById("typeSelect").value;
const prof=document.getElementById("professorInput").value;
const groups=document.getElementById("groupsInput").value;
const comment=document.getElementById("commentInput").value;

const program=programs.find(p=>p.id===pid);
const subject=subjects.find(s=>s.id===sid);

// CONFLICT ONLY SAME SLOT
const conflict=events.find(e=>
e.date===currentDate &&
e.time===currentTime &&
e.room===currentRoom &&
e.id!==editingId
);

if(conflict){
alert("Веќе постои час!");
return;
}

const data={
date:currentDate,
time:currentTime,
room:currentRoom,

programId:pid,
programName:program?.name||"",

subjectId:sid,
subjectName:subject?.name||"",

semester:sem,
type,
professor:prof,
groups,
comment
};

if(editingId){
await updateDoc(doc(db,"events_new",editingId),data);
}else{
await addDoc(collection(db,"events_new"),data);
}

// LOG (FIXED)
await addDoc(collection(db,"event_logs"),{
action:editingId?"update":"add",
createdAt:new Date(),

comment:comment||"",

event:{
...data
}
});

await load();
document.getElementById("modal").style.display="none";
};

// ================= DELETE =================
document.getElementById("deleteBtn").onclick=async()=>{

if(!editingId)return;

const e=events.find(x=>x.id===editingId);

await deleteDoc(doc(db,"events_new",editingId));

await addDoc(collection(db,"event_logs"),{
action:"delete",
createdAt:new Date(),
comment:"",
event:e
});

await load();
document.getElementById("modal").style.display="none";
};

document.getElementById("closeBtn").onclick=()=>{
document.getElementById("modal").style.display="none";
};

document.getElementById("datePicker").value=today();

load();

</script>

</body>
</html>
