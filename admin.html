<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>Admin Распоред</title>

<style>
body {
    font-family: Arial;
    padding: 20px;
}

h2 {
    margin-bottom: 10px;
}

.controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 20px;
}

select, button {
    padding: 6px 10px;
    font-size: 14px;
}

table {
    border-collapse: collapse;
    width: 100%;
}

th, td {
    border: 1px solid #222;
    padding: 4px 6px;
    text-align: left;
    font-size: 13px;
}

th {
    background: #3f69b1;
    color: white;
}

.slot {
    cursor: pointer;
}

.slot:hover {
    outline: 2px solid #000;
}

.empty {
    opacity: 0.45;
}

#formWrap {
    margin-top: 25px;
    border: 1px solid #ccc;
    padding: 15px;
    background: #fafafa;
}

.form-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(250px,1fr));
    gap: 10px;
}

input, select {
    width: 100%;
    box-sizing: border-box;
}

label {
    font-size: 13px;
    font-weight: bold;
}

#status {
    margin-top: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<h2>Admin Распоред</h2>

<div class="controls">

<select id="dateFilter"></select>

<select id="roomFilter">
<option value="">Сите простории</option>
</select>

</div>

<table>
<thead>
<tr>
<th>Час</th>
<th>Просторија</th>
<th>Програма</th>
<th>Семестар</th>
<th>Предмет</th>
<th>Тип</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<div id="formWrap">

<h3>Додади / Измени термин</h3>

<div class="form-grid">

<div>
<label>Датум</label>
<input type="date" id="fDate">
</div>

<div>
<label>Час</label>
<input type="time" id="fTime">
</div>

<div>
<label>Просторија</label>
<select id="fRoom"></select>
</div>

<div>
<label>Програма</label>
<select id="fProgram"></select>
</div>

<div>
<label>Семестар</label>
<select id="fSemester"></select>
</div>

<div>
<label>Предмет</label>
<select id="fSubject"></select>
</div>

<div>
<label>Тип</label>
<select id="fType">
<option value="Предавање">Предавање</option>
<option value="Вежби">Вежби</option>
<option value="Колоквиум">Колоквиум</option>
<option value="Испит">Испит</option>
</select>
</div>

<div>
<label>Професор</label>
<input type="text" id="fProfessor">
</div>

<div>
<label>Групи</label>
<input type="text" id="fGroups">
</div>

</div>

<br>

<button id="saveBtn">Зачувај</button>
<button id="deleteBtn">Избриши</button>

<div id="status"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
    getFirestore,
    collection,
    getDocs,
    addDoc,
    deleteDoc,
    doc,
    query,
    where
}
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC0PZyTfo2t3ON7emYUS8NRMPgfMYvTJ2w",
  authDomain: "schedule-app-63c5e.firebaseapp.com",
  projectId: "schedule-app-63c5e",
  storageBucket: "schedule-app-63c5e.firebasestorage.app",
  messagingSenderId: "32553140850",
  appId: "1:32553140850:web:a2449581c3d4ae194c78eb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let programs = [];
let subjects = [];
let events = [];

const ROOMS = [
"01 пред.","02 пред.","03 пред.","04 пред.",
"07 лаб.","08 лаб.","09 лаб.","10 лаб.",
"11 лаб.","12 лаб.","14 лаб.","НФИЦ"
];

const TIMES = [];
for(let h=8; h<=20; h++){
    TIMES.push(String(h).padStart(2,"0")+":00");
}

const LAB_ROOMS = [
"07 лаб.","08 лаб.","09 лаб.","10 лаб.",
"11 лаб.","12 лаб.","14 лаб.","НФИЦ"
];

const tbody = document.getElementById("tbody");

function todayISO(){
    const d = new Date();
    return d.toISOString().split("T")[0];
}

function fillSelect(id, values, first=""){
    const el = document.getElementById(id);

    el.innerHTML = first
        ? `<option value="">${first}</option>`
        : "";

    values.forEach(v=>{
        el.innerHTML += `<option value="${v}">${v}</option>`;
    });
}

function roomColor(room){

    const colors = [
        "#f1dfd3",
        "#dde3ef",
        "#cfe7b4",
        "#f7e6b8",
        "#e3d9f6",
        "#d7eee8"
    ];

    let hash = 0;

    for(let i=0;i<room.length;i++){
        hash = room.charCodeAt(i) + ((hash << 5) - hash);
    }

    return colors[Math.abs(hash)%colors.length];
}

async function loadData(){

    const pSnap = await getDocs(collection(db,"programs_new"));
    programs = pSnap.docs.map(d=>({
        id:d.id,
        ...d.data()
    }));

    const sSnap = await getDocs(collection(db,"subjects_new"));
    subjects = sSnap.docs.map(d=>({
        id:d.id,
        ...d.data()
    }));

    const eSnap = await getDocs(collection(db,"events_new"));
    events = eSnap.docs.map(d=>({
        id:d.id,
        ...d.data()
    }));

    initFilters();
    render();
}

function initFilters(){

    const dates = [...new Set(events.map(e=>e.date))].sort();

    fillSelect("dateFilter", dates);

    if(dates.includes(todayISO())){
        document.getElementById("dateFilter").value = todayISO();
    }

    fillSelect("roomFilter", ROOMS, "Сите простории");

    fillSelect("fRoom", ROOMS);

    fillSelect(
        "fProgram",
        programs.map(p=>p.name)
    );

    updateSemesters();

    document.getElementById("fProgram")
        .addEventListener("change", ()=>{
            updateSemesters();
            updateSubjects();
        });

    document.getElementById("fSemester")
        .addEventListener("change", updateSubjects);

    document.getElementById("dateFilter")
        .addEventListener("change", render);

    document.getElementById("roomFilter")
        .addEventListener("change", render);

    document.getElementById("saveBtn")
        .addEventListener("click", saveEvent);

    document.getElementById("deleteBtn")
        .addEventListener("click", deleteEvent);
}

function updateSemesters(){

    const prog = document.getElementById("fProgram").value;

    const sems = [...new Set(
        subjects
            .filter(s=>s.program_name===prog)
            .map(s=>s.semester)
    )].sort((a,b)=>Number(a)-Number(b));

    fillSelect("fSemester", sems);

    updateSubjects();
}

function updateSubjects(){

    const prog = document.getElementById("fProgram").value;
    const sem = document.getElementById("fSemester").value;

    const subs = subjects
        .filter(s=>
            s.program_name===prog &&
            String(s.semester)===String(sem)
        )
        .map(s=>s.subject);

    fillSelect("fSubject", subs);
}

function render(){

    tbody.innerHTML = "";

    const dateF = document.getElementById("dateFilter").value;
    const roomF = document.getElementById("roomFilter").value;

    for(const room of ROOMS){

        if(roomF && room !== roomF) continue;

        for(const time of TIMES){

            const event = events.find(e=>
                e.date===dateF &&
                e.time===time &&
                e.room===room
            );

            tbody.innerHTML += `
            <tr
                class="slot ${event ? '' : 'empty'}"
                style="background:${roomColor(room)}"
                data-date="${dateF}"
                data-time="${time}"
                data-room="${room}"
            >
                <td>${time}</td>
                <td>${room}</td>
                <td>${event?.program_name || ""}</td>
                <td>${event?.semester || ""}</td>
                <td>${event?.subject || ""}</td>
                <td>${event?.type || ""}</td>
            </tr>`;
        }
    }

    document.querySelectorAll(".slot").forEach(r=>{
        r.addEventListener("click", ()=>openSlot(r));
    });
}

function openSlot(row){

    const date = row.dataset.date;
    const time = row.dataset.time;
    const room = row.dataset.room;

    const event = events.find(e=>
        e.date===date &&
        e.time===time &&
        e.room===room
    );

    document.getElementById("fDate").value = date;
    document.getElementById("fTime").value = time;
    document.getElementById("fRoom").value = room;

    if(event){

        document.getElementById("fProgram").value =
            event.program_name || "";

        updateSemesters();

        document.getElementById("fSemester").value =
            event.semester || "";

        updateSubjects();

        document.getElementById("fSubject").value =
            event.subject || "";

        document.getElementById("fType").value =
            event.type || "Предавање";

        document.getElementById("fProfessor").value =
            event.professor || "";

        document.getElementById("fGroups").value =
            event.groups || "";

    } else {

        document.getElementById("fProgram").value = "";
        updateSemesters();

        document.getElementById("fSemester").value = "";
        document.getElementById("fSubject").value = "";

        document.getElementById("fType").value = "Предавање";
        document.getElementById("fProfessor").value = "";
        document.getElementById("fGroups").value = "";
    }
}

async function saveEvent(){

    const date = document.getElementById("fDate").value;
    const time = document.getElementById("fTime").value;
    const room = document.getElementById("fRoom").value;

    const program_name =
        document.getElementById("fProgram").value;

    const semester =
        document.getElementById("fSemester").value;

    const subject =
        document.getElementById("fSubject").value;

    const type =
        document.getElementById("fType").value;

    const professor =
        document.getElementById("fProfessor").value;

    const groups =
        document.getElementById("fGroups").value;

    // =========================
    // CHECK PROGRAM CONFLICT
    // =========================

    const sameProgram = events.find(e =>
        e.date === date &&
        e.time === time &&
        e.program_name === program_name &&
        String(e.semester) === String(semester)
    );

    if(sameProgram){
        alert("Оваа програма и семестар веќе имаат термин во истиот час.");
        return;
    }

    // =========================
    // CHECK ROOM CONFLICT
    // =========================

    const roomBusy = events.find(e =>
        e.date === date &&
        e.time === time &&
        e.room === room
    );

    if(roomBusy){
        alert("Просторијата е зафатена.");
        return;
    }

    // =========================
    // CHECK LECTURE CONFLICT
    // =========================

    if(type === "Предавање"){

        const sameLecture = events.find(e =>
            e.date === date &&
            e.time === time &&
            e.subject === subject &&
            e.type === "Предавање"
        );

        if(sameLecture){
            alert("Предавањето веќе постои во друг термин.");
            return;
        }
    }

    // =========================
    // CHECK LAB RULES
    // =========================

    if(type === "Вежби"){

        if(!LAB_ROOMS.includes(room)){
            alert("Вежби се дозволени само во лаборатории.");
            return;
        }

        const sameLabs = events.filter(e =>
            e.date === date &&
            e.time === time &&
            e.subject === subject &&
            e.type === "Вежби"
        );

        if(sameLabs.length >= 2){
            alert("Дозволени се максимум 2 лаборатории.");
            return;
        }
    }

    await addDoc(collection(db,"events_new"),{
        date,
        time,
        room,
        semester,
        subject,
        type,
        professor,
        groups,
        program_name
    });

    document.getElementById("status").textContent =
        "Успешно зачувано.";

    await loadData();
}

async function deleteEvent(){

    const date = document.getElementById("fDate").value;
    const time = document.getElementById("fTime").value;
    const room = document.getElementById("fRoom").value;

    const q = query(
        collection(db,"events_new"),
        where("date","==",date),
        where("time","==",time),
        where("room","==",room)
    );

    const snap = await getDocs(q);

    for(const d of snap.docs){
        await deleteDoc(doc(db,"events_new",d.id));
    }

    document.getElementById("status").textContent =
        "Избришано.";

    await loadData();
}

loadData();

</script>

</body>
</html>
