<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>Admin Распоред</title>

<style>

body{
    font-family:Arial;
    padding:20px;
    margin:0;
}

h2{
    margin-bottom:15px;
}

.controls{
    margin-bottom:15px;
}

select,
button,
input,
textarea{
    padding:6px 8px;
    margin-right:8px;
    font-size:14px;
}

table{
    border-collapse:collapse;
    width:100%;
    table-layout:fixed;
}

th,td{
    border:1px solid #333;
    padding:4px;
    vertical-align:top;
    font-size:12px;
}

th{
    background:#3f69b1;
    color:white;
    text-align:center;
}

.time-col{
    width:70px;
    background:#f5f5f5;
    font-weight:bold;
    text-align:center;
}

.slot{
    min-height:70px;
    cursor:pointer;
}

.slot:hover{
    background:#eef4ff;
}

.event{
    background:#d9e8ff;
    border:1px solid #6f9be8;
    border-radius:4px;
    padding:4px;
    font-size:11px;
    line-height:1.3;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal-content{
    background:white;
    padding:20px;
    width:420px;
    border-radius:8px;
    max-height:90vh;
    overflow:auto;
}

.modal-content label{
    display:block;
    margin-top:10px;
    margin-bottom:4px;
}

.modal-content select,
.modal-content input,
.modal-content textarea{
    width:100%;
    box-sizing:border-box;
}

textarea{
    min-height:70px;
    resize:vertical;
}

.modal-buttons{
    margin-top:15px;
    text-align:right;
}

.delete-btn{
    background:#c0392b;
    color:white;
    border:none;
}

.save-btn{
    background:#2e7d32;
    color:white;
    border:none;
}

.close-btn{
    background:#777;
    color:white;
    border:none;
}

</style>
</head>

<body>

<h2>Admin Распоред</h2>

<div class="controls">

<label>Датум:</label>
<input type="date" id="datePicker">

<button id="todayBtn">Денес</button>

</div>

<table>

<thead>
<tr>

<th class="time-col">Час</th>

<th>01 пред.</th>
<th>02 пред.</th>
<th>03 пред.</th>
<th>04 пред.</th>

<th>08 лаб.</th>
<th>09 лаб.</th>
<th>10 лаб.</th>
<th>11 лаб.</th>
<th>12 лаб.</th>
<th>14 лаб.</th>

<th>НФИЦ</th>

</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

<div class="modal" id="modal">

<div class="modal-content">

<h3>Распоред</h3>

<label>Програма</label>
<select id="programSelect"></select>

<label>Семестар</label>
<select id="semesterSelect"></select>

<label>Предмет</label>
<select id="subjectSelect"></select>

<label>Тип</label>
<select id="typeSelect">
<option value="Предавање">Предавање</option>
<option value="Вежби">Вежби</option>
<option value="Колоквиум">Колоквиум</option>
<option value="Испит">Испит</option>
</select>

<label>Професор</label>
<input type="text" id="professorInput">

<label>Групи</label>
<input type="text" id="groupsInput">

<label>Коментар / Барање</label>
<textarea id="commentInput"></textarea>

<div class="modal-buttons">

<button class="delete-btn" id="deleteBtn">Delete</button>

<button class="close-btn" id="closeBtn">Cancel</button>

<button class="save-btn" id="saveBtn">Save</button>

</div>

</div>
</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

import {
    getFirestore,
    collection,
    getDocs,
    addDoc,
    updateDoc,
    deleteDoc,
    doc,
    serverTimestamp
}
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC0PZyTfo2t3ON7emYUS8NRMPgfMYvTJ2w",
  authDomain: "schedule-app-63c5e.firebaseapp.com",
  projectId: "schedule-app-63c5e",
  storageBucket: "schedule-app-63c5e.firebasestorage.app",
  messagingSenderId: "32553140850",
  appId: "1:32553140850:web:a2449581c3d4ae194c78eb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ROOMS = [
"01 пред.","02 пред.","03 пред.","04 пред.",
"08 лаб.","09 лаб.","10 лаб.","11 лаб.",
"12 лаб.","14 лаб.","НФИЦ"
];

const TIMES = [];

for(let h=8; h<=20; h++){
    TIMES.push(String(h).padStart(2,"0")+":00");
}

let events = [];
let programs = [];
let subjects = [];

let currentDate = "";
let currentRoom = "";
let currentTime = "";
let editingId = null;

function todayISO(){

    const t = new Date();

    return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,"0")}-${String(t.getDate()).padStart(2,"0")}`;
}

async function loadAll(){

    const progSnap =
        await getDocs(collection(db,"programs_new"));

    programs =
        progSnap.docs.map(d=>({
            id:d.id,
            ...d.data()
        }));

    const subjSnap =
        await getDocs(collection(db,"subjects_new"));

    subjects =
        subjSnap.docs.map(d=>({
            id:d.id,
            ...d.data()
        }));

    await loadEvents();

    initFilters();

    render();
}

async function loadEvents(){

    const snap =
        await getDocs(collection(db,"events_new"));

    events =
        snap.docs.map(d=>({
            id:d.id,
            ...d.data()
        }));
}

function initFilters(){

    document.getElementById("datePicker").value =
        todayISO();

    document.getElementById("datePicker")
        .addEventListener("change",render);

    document.getElementById("todayBtn")
        .addEventListener("click",()=>{

            document.getElementById("datePicker").value =
                todayISO();

            render();
        });

    fillPrograms();
}

function fillPrograms(){

    const sel =
        document.getElementById("programSelect");

    sel.innerHTML = "";

    programs.forEach(p=>{

        sel.innerHTML += `
        <option value="${p.id}">
            ${p.name}
        </option>`;
    });

    updateSubjects();

    sel.addEventListener("change",updateSubjects);
}

function updateSubjects(){

    const programId =
        document.getElementById("programSelect").value;

    const semesterSel =
        document.getElementById("semesterSelect");

    const subjectSel =
        document.getElementById("subjectSelect");

    const filtered =
        subjects.filter(s=>s.programId===programId);

    const semesters =
        [...new Set(filtered.map(s=>String(s.semester)))]
        .sort((a,b)=>Number(a)-Number(b));

    semesterSel.innerHTML = "";

    semesters.forEach(s=>{

        semesterSel.innerHTML += `
        <option value="${s}">
            ${s}
        </option>`;
    });

    function refreshSubjects(){

        const sem =
            semesterSel.value;

        const list =
            filtered.filter(s=>
                String(s.semester)===String(sem)
            );

        subjectSel.innerHTML = "";

        list.forEach(s=>{

            subjectSel.innerHTML += `
            <option value="${s.id}">
                ${s.name}
            </option>`;
        });
    }

    refreshSubjects();

    semesterSel.onchange = refreshSubjects;
}

function render(){

    const tbody =
        document.getElementById("tbody");

    tbody.innerHTML = "";

    const selectedDate =
        document.getElementById("datePicker").value;

    TIMES.forEach(time=>{

        let row = `
        <tr>
            <td class="time-col">${time}</td>
        `;

        ROOMS.forEach(room=>{

            const event =
                events.find(e=>
                    e.date===selectedDate &&
                    e.time===time &&
                    e.room===room
                );

            let content = "";

            if(event){

                const program =
                    programs.find(p=>p.id===event.programId);

                const subject =
                    subjects.find(s=>s.id===event.subjectId);

                content = `
                <div class="event">
                    <b>${subject?.name || ""}</b><br>
                    ${program?.name || ""}<br>
                    Сем. ${event.semester || ""}<br>
                    ${event.type || ""}<br>
                    ${event.professor || ""}
                </div>`;
            }

            row += `
            <td class="slot"
                data-room="${room}"
                data-time="${time}"
                onclick="openSlot(this)">
                ${content}
            </td>`;
        });

        row += "</tr>";

        tbody.innerHTML += row;
    });
}

window.openSlot = function(cell){

    currentRoom = cell.dataset.room;
    currentTime = cell.dataset.time;

    currentDate =
        document.getElementById("datePicker").value;

    const existing =
        events.find(e=>
            e.date===currentDate &&
            e.time===currentTime &&
            e.room===currentRoom
        );

    editingId = existing?.id || null;

    if(existing){

        document.getElementById("programSelect").value =
            existing.programId;

        updateSubjects();

        document.getElementById("semesterSelect").value =
            existing.semester;

        updateSubjects();

        document.getElementById("subjectSelect").value =
            existing.subjectId;

        document.getElementById("typeSelect").value =
            existing.type || "";

        document.getElementById("professorInput").value =
            existing.professor || "";

        document.getElementById("groupsInput").value =
            existing.groups || "";
    }

    document.getElementById("commentInput").value = "";

    document.getElementById("modal").style.display =
        "flex";
};

document.getElementById("closeBtn")
.addEventListener("click",()=>{

    document.getElementById("modal").style.display =
        "none";
});

document.getElementById("saveBtn")
.addEventListener("click", async ()=>{

    const data = {

        date: currentDate,
        time: currentTime,
        room: currentRoom,

        subjectId:
            document.getElementById("subjectSelect").value,

        programId:
            document.getElementById("programSelect").value,

        semester:
            document.getElementById("semesterSelect").value,

        type:
            document.getElementById("typeSelect").value,

        professor:
            document.getElementById("professorInput").value,

        groups:
            document.getElementById("groupsInput").value
    };

    const comment =
        document.getElementById("commentInput").value.trim();

    if(editingId){

        await updateDoc(
            doc(db,"events_new",editingId),
            data
        );

        await addDoc(
            collection(db,"events_log"),
            {
                action:"UPDATE",
                comment,
                createdAt: serverTimestamp(),
                data
            }
        );
    }
    else{

        await addDoc(
            collection(db,"events_new"),
            data
        );

        await addDoc(
            collection(db,"events_log"),
            {
                action:"ADD",
                comment,
                createdAt: serverTimestamp(),
                data
            }
        );
    }

    await loadEvents();

    render();

    document.getElementById("modal").style.display =
        "none";
});

document.getElementById("deleteBtn")
.addEventListener("click", async ()=>{

    if(!editingId) return;

    const comment =
        document.getElementById("commentInput").value.trim();

    const deletedEvent =
        events.find(e=>e.id===editingId);

    await deleteDoc(
        doc(db,"events_new",editingId)
    );

    await addDoc(
        collection(db,"events_log"),
        {
            action:"DELETE",
            comment,
            createdAt: serverTimestamp(),
            data: deletedEvent || {}
        }
    );

    await loadEvents();

    render();

    document.getElementById("modal").style.display =
        "none";
});

loadAll();

</script>

</body>
</html>
