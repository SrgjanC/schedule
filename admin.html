<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>Admin Распоред</title>

<style>

body{
    font-family:Arial;
    padding:20px;
    margin:0;
}

h2{
    margin-bottom:15px;
}

select,
input,
button{
    padding:6px 8px;
    margin:4px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #333;
    padding:5px;
    font-size:12px;
}

th{
    background:#3f69b1;
    color:white;
}

.time{
    width:70px;
    background:#f4f4f4;
    text-align:center;
}

.slot{
    cursor:pointer;
    height:60px;
    vertical-align:top;
}

.event{
    background:#d9e8ff;
    padding:3px;
    font-size:11px;
    border-radius:4px;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.5);
    display:none;
    align-items:center;
    justify-content:center;
}

.modal-content{
    background:white;
    padding:15px;
    width:420px;
}

.modal-content label{
    display:block;
    margin-top:8px;
}

.modal-content input,
.modal-content select{
    width:100%;
}

.buttons{
    margin-top:10px;
    text-align:right;
}

</style>
</head>

<body>

<h2>Admin Распоред</h2>

<label>Датум:</label>
<input type="date" id="datePicker">

<button id="todayBtn">Денес</button>

<table>
<thead>
<tr>
<th>Час</th>
<th>01</th>
<th>02</th>
<th>03</th>
<th>04</th>
<th>08</th>
<th>09</th>
<th>10</th>
<th>11</th>
<th>12</th>
<th>14</th>
<th>НФИЦ</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<!-- MODAL -->
<div class="modal" id="modal">

<div class="modal-content">

<label>Програма</label>
<select id="programSelect"></select>

<label>Семестар</label>
<select id="semesterSelect"></select>

<label>Предмет</label>
<select id="subjectSelect"></select>

<label>Тип</label>
<select id="typeSelect">
<option>Предавање</option>
<option>Вежби</option>
<option>Колоквиум</option>
<option>Испит</option>
</select>

<label>Професор</label>
<input id="professorInput">

<label>Групи</label>
<input id="groupsInput">

<label>Коментар</label>
<input id="commentInput">

<div class="buttons">

<button id="deleteBtn">Delete</button>
<button id="closeBtn">Close</button>
<button id="saveBtn">Save</button>

</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
addDoc,
updateDoc,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC0PZyTfo2t3ON7emYUS8NRMPgfMYvTJ2w",
  authDomain: "schedule-app-63c5e.firebaseapp.com",
  projectId: "schedule-app-63c5e",
  storageBucket: "schedule-app-63c5e.firebasestorage.app",
  messagingSenderId: "32553140850",
  appId: "1:32553140850:web:a2449581c3d4ae194c78eb"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ROOMS = ["01","02","03","04","08","09","10","11","12","14","НФИЦ"];

const TIMES = [];
for(let h=8; h<=20; h++){
    TIMES.push(String(h).padStart(2,"0")+":00");
}

let events = [];
let programs = [];
let subjects = [];

let currentDate="";
let currentRoom="";
let currentTime="";
let editingId=null;

function today(){
const d=new Date();
return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

// LOAD
async function load(){

const p=await getDocs(collection(db,"programs_new"));
programs=p.docs.map(d=>({id:d.id,...d.data()}));

const s=await getDocs(collection(db,"subjects_new"));
subjects=s.docs.map(d=>({id:d.id,...d.data()}));

const e=await getDocs(collection(db,"events_new"));
events=e.docs.map(d=>({id:d.id,...d.data()}));

fillPrograms();
render();
}

function fillPrograms(){

const sel=document.getElementById("programSelect");
sel.innerHTML="";

programs.forEach(p=>{
sel.innerHTML+=`<option value="${p.id}">${p.name}</option>`;
});

updateSubjects();

sel.onchange=updateSubjects;
}

function updateSubjects(){

const pid=document.getElementById("programSelect").value;

const sem=document.getElementById("semesterSelect");
const sub=document.getElementById("subjectSelect");

const filtered=subjects.filter(s=>s.programId===pid);

const semesters=[...new Set(filtered.map(s=>s.semester))].sort();

sem.innerHTML="";
semesters.forEach(x=>{
sem.innerHTML+=`<option>${x}</option>`;
});

function refresh(){

const f=filtered.filter(s=>String(s.semester)===String(sem.value));

sub.innerHTML="";
f.forEach(s=>{
sub.innerHTML+=`<option value="${s.id}">${s.name}</option>`;
});
}

refresh();
sem.onchange=refresh;
}

// RENDER
function render(){

const tbody=document.getElementById("tbody");
tbody.innerHTML="";

const d=document.getElementById("datePicker").value||today();

TIMES.forEach(time=>{

let row=`<tr><td class="time">${time}</td>`;

ROOMS.forEach(room=>{

const e=events.find(x=>x.date===d && x.time===time && x.room===room);

row+=`
<td class="slot" onclick="openSlot('${d}','${time}','${room}')">
${e?`<div class="event">${e.subjectName||""}<br>${e.programName||""}</div>`:""}
</td>`;

});

row+="</tr>";
tbody.innerHTML+=row;

});

}

// OPEN SLOT
window.openSlot=(d,t,r)=>{

currentDate=d;
currentTime=t;
currentRoom=r;

const ex=events.find(e=>e.date===d&&e.time===t&&e.room===r);

editingId=ex?.id||null;

document.getElementById("modal").style.display="flex";

};

// SAVE
document.getElementById("saveBtn").onclick=async()=>{

const pid=document.getElementById("programSelect").value;
const sid=document.getElementById("subjectSelect").value;
const sem=document.getElementById("semesterSelect").value;
const type=document.getElementById("typeSelect").value;
const prof=document.getElementById("professorInput").value;
const groups=document.getElementById("groupsInput").value;
const comment=document.getElementById("commentInput").value;

const program=programs.find(p=>p.id===pid);
const subject=subjects.find(s=>s.id===sid);

// CONFLICT (same program + semester + time)
const conflict=events.find(e=>
e.date===currentDate &&
e.time===currentTime &&
e.programId===pid &&
e.semester===sem &&
e.id!==editingId
);

if(conflict){
alert("Конфликт: ист програм и семестар веќе има час!");
return;
}

const data={
date:currentDate,
time:currentTime,
room:currentRoom,
programId:pid,
programName:program?.name||"",
subjectId:sid,
subjectName:subject?.name||"",
semester:sem,
type,
professor:prof,
groups
};

if(editingId){
await updateDoc(doc(db,"events_new",editingId),data);
}else{
await addDoc(collection(db,"events_new"),data);
}

// LOG
await addDoc(collection(db,"event_logs"),{
action:editingId?"update":"add",
createdAt:new Date(),
comment,
event:data
});

await load();

document.getElementById("modal").style.display="none";

};

// DELETE
document.getElementById("deleteBtn").onclick=async()=>{

if(!editingId)return;

await deleteDoc(doc(db,"events_new",editingId));

await addDoc(collection(db,"event_logs"),{
action:"delete",
createdAt:new Date(),
comment:"",
event:events.find(e=>e.id===editingId)
});

await load();

document.getElementById("modal").style.display="none";
};

document.getElementById("closeBtn").onclick=()=>{
document.getElementById("modal").style.display="none";
};

document.getElementById("datePicker").value=today();

load();

</script>

</body>
</html>
