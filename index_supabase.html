<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>Распоред</title>

<style>
body { font-family: Arial; padding: 20px; }
h2 { margin-bottom: 10px; }
.controls { margin-bottom: 15px; }
select { padding: 5px; margin-right: 10px; }

table { border-collapse: collapse; width: 100%; }

th, td {
    border: 1px solid #222;
    padding: 4px 6px;
    text-align: left;
    font-size: 13px;
}

th {
    background: #3f69b1;
    color: #fff;
}

.spinner-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 25px;
}

.spinner {
    width: 34px;
    height: 34px;
    border: 4px solid #ddd;
    border-top: 4px solid #3f69b1;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<h2>Академски Распоред</h2>

<div class="controls">

<label>Преглед:</label>
<select id="viewMode">
    <option value="day">Day</option>
    <option value="week">Week</option>
    <option value="month">Month</option>
    <option value="year">Year</option>
</select>

<label>Датум:</label>
<select id="dateFilter"></select>

<label>Програма:</label>
<select id="programFilter"></select>

<label>Семестар:</label>
<select id="semesterFilter"></select>

<label>Просторија:</label>
<select id="roomFilter"></select>

</div>

<div id="viewInfo" style="margin: 8px 0 14px; font-size: 14px; color: #444;"></div>

<table id="schedule">

<thead>
<tr>

<th>Ден</th>
<th>Датум</th>
<th>Час</th>
<th>Просторија</th>
<th>Студиска програма</th>
<th>Семестар</th>
<th>Предмет</th>
<th>Тип на настава</th>
<th>Проф/асс</th>
<th>Групи</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>

<script type="module">



// ================= SUPABASE =================

import { createClient }
from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm?v=3.1'

const supabaseUrl =
'https://elmxwpwhyewgjlvoadtb.supabase.co';

const supabaseKey =
'sb_publishable_yUCov2V1dKGEc-rBwt6v2A_dBkHEiYd';

const supabase =
    createClient(
        supabaseUrl,
        supabaseKey
    );
// ================= DATA =================

let events = [];
let programs = [];
let subjects = [];
let rooms = [];
let professors = [];
let isLoading = true;
let allDates = [];
let fromDate = "";
let toDate = "";
// ================= ROOMS =================

const DAY_ROOMS = [
"01 пред.","02 пред.","03 пред.","04 пред.",
"08 лаб.","09 лаб.","10 лаб.","11 лаб.","12 лаб.","14 лаб.","НФИЦ","Инст. за Физиологија","Инст. за Микробиологија","Инст. за Анатомија","ПМФ","Фак. за физичко образование","Кат. за Медицинска физика"
];

// ================= COLORS =================

const roomColorCache = {};

function getRoomColor(room) {

    if (!room) return "#ffffff";

    if (roomColorCache[room])
        return roomColorCache[room];

    const palette = [
        "#f1dfd3",
        "#dde3ef",
        "#cfe7b4",
        "#f7e6b8",
        "#e3d9f6",
        "#d7eee8"
    ];

    let hash = 0;

    for (let i = 0; i < room.length; i++) {
        hash = room.charCodeAt(i) + ((hash << 5) - hash);
    }

    const color =
        palette[Math.abs(hash) % palette.length];

    roomColorCache[room] = color;

    return color;
}

// ================= DATE =================
function startOfWeek(date) {
    const d = new Date(date);
    const day = d.getDay(); // 0=Sunday
    const diff = d.getDate() - day + (day === 0 ? -6 : 1);
    return new Date(d.setDate(diff));
}

function endOfWeek(date) {
    const start = startOfWeek(date);
    const end = new Date(start);
    end.setDate(start.getDate() + 6);
    return end;
}

function startOfMonth(date) {
    return new Date(date.getFullYear(), date.getMonth(), 1);
}

function endOfMonth(date) {
    return new Date(date.getFullYear(), date.getMonth() + 1, 0);
}

function toISO(d) {
    return d.toISOString().split("T")[0];
}
function formatDate(dateStr) {

    if (!dateStr) return "";

    const d = new Date(dateStr);

    if (Number.isNaN(d.getTime()))
        return dateStr;

    const months = [
        "Јан","Фев","Мар","Апр","Мај","Јун",
        "Јул","Авг","Сеп","Окт","Ное","Дек"
    ];

    return `${d.getDate()}-${months[d.getMonth()]}`;
}

function todayISO() {

    const t = new Date();

    const y = t.getFullYear();
    const m = String(t.getMonth()+1).padStart(2,"0");
    const d = String(t.getDate()).padStart(2,"0");

    return `${y}-${m}-${d}`;
}

function buildTimeSlots() {

    const slots = [];

    for (let h = 8; h <= 20; h++) {

        slots.push(
            String(h).padStart(2,"0") + ":00"
        );
    }

    return slots;
}

const TIMES = buildTimeSlots();
    function getDayName(dateStr){

    if(!dateStr) return "";

    const days = [
        "недела",
        "понеделник",
        "вторник",
        "среда",
        "четврток",
        "петок",
        "сабота"
    ];

    const d = new Date(dateStr);

    return days[d.getDay()];
}

// ================= FILTERS =================

function fillSelect(id, values) {

    const el = document.getElementById(id);

    el.innerHTML =
        "<option value=''>Сите</option>";

    values.forEach(v => {

        if (v !== undefined &&
            v !== null &&
            v !== "") {

            el.innerHTML +=
                `<option value="${v}">${v}</option>`;
        }
    });
}

function sortSemesters(values) {

    return values
        .map(v => Number(v))
        .filter(v => !Number.isNaN(v))
        .sort((a,b) => a - b);
}
function computeRange(view, selectedDate) {

    if (!selectedDate) selectedDate = todayISO();

    const baseDate = new Date(selectedDate);

    if (view === "day") {
        fromDate = selectedDate;
        toDate = selectedDate;
    }

    else if (view === "week") {
        fromDate = toISO(startOfWeek(baseDate));
        toDate = toISO(endOfWeek(baseDate));
    }

    else if (view === "month") {
        fromDate = toISO(startOfMonth(baseDate));
        toDate = toISO(endOfMonth(baseDate));
    }

    else {
        fromDate = selectedDate;
        toDate = selectedDate;
    }
}

    async function loadAvailableDates() {

    const { data, error } = await supabase
        .from('events')
        .select('event_date', { count: 'exact', head: false })
        .order('event_date', { ascending: true });

    if (error) {

        console.log(error);
        return;
    }

    allDates = [
        ...new Set(
            data.map(e => e.event_date)
        )
    ];

    fillSelect("dateFilter", allDates);

    const current =
        document.getElementById("dateFilter").value;

    const today = todayISO();

    if (!current) {

        if (allDates.includes(today)) {

            document.getElementById("dateFilter").value =
                today;
        }
        else if (allDates.length > 0) {

            document.getElementById("dateFilter").value =
                allDates[0];
        }
    }
}
// ================= LOAD =================

async function loadData() {

    isLoading = true;
    render(); // show spinner immediately

    const view =
        document.getElementById("viewMode").value;

    const selectedDate =
        document.getElementById("dateFilter").value || todayISO();

    computeRange(view, selectedDate);
    // EVENTS WITH RELATIONS

    const { data, error } =
await supabase
    .from('events')
    .select(`
        *,
        subjects (
            id,
            name,
            semester,
            programs (
                id,
                name
            )
        ),
        professors (
            id,
            name
        ),
        rooms (
            id,
            name,
            type,
            capacity
        )
    `)
    .gte('event_date', fromDate)
    .lte('event_date', toDate)
    .order('event_date', { ascending: true })
    .order('event_time', { ascending: true });

console.log("EVENT COUNT:", data?.length);

console.log(
    "FIRST DATE:",
    data?.[0]?.event_date
);

console.log(
    "LAST DATE:",
    data?.[data.length - 1]?.event_date
);
    
    console.log(data);
    console.log(error);

    if(error){

        alert(error.message);
        return;
    }

    // CONVERT TO OLD FORMAT

    events = (data || []).map(e => ({
    id: e.id,

    date: e.event_date,
    time: e.event_time?.substring(0,5),
    room: e.rooms?.name || "",

    subjectId: e.subject_id,

    subject: e.subjects?.name,
    semester: e.subjects?.semester || "",
    program: e.subjects?.programs?.name  || "",

    type: e.type || "",

    professor_id: e.professor_id  || "",
    professorName: e.professors?.name || "",

    groups: e.groups_text,
    comment: e.comment,

    week: e.week,
    day: e.day
}));

    // ROOMS

    rooms =
        [...new Set(events.map(e=>e.room))]
        .filter(Boolean);

    isLoading = false;

initFilters();
render();
}

// ================= FILTER INIT =================

function initFilters() {

    

    const progs =
        [...new Set(events.map(e => e.program))]
        .filter(Boolean);

    const semRaw =
    [...new Set(events.map(e => e.semester))]
        .filter(v => v !== null && v !== undefined && v !== "");

    const semSorted =
        sortSemesters(semRaw);

    const roomSorted =
        [...new Set(rooms)].sort((a,b)=>
            a.localeCompare(b,"mk")
        );

    
    fillSelect("programFilter", progs);
    fillSelect("semesterFilter", semSorted);
    fillSelect("roomFilter", roomSorted);

   // use latest available date from events






function reload() {
    loadData();
}

document.getElementById("viewMode")
    .addEventListener("change", reload);

document.getElementById("dateFilter")
    .addEventListener("change", reload);

document.getElementById("programFilter")
    .addEventListener("change", render);

document.getElementById("semesterFilter")
    .addEventListener("change", render);

document.getElementById("roomFilter")
    .addEventListener("change", render);

}

// ================= RENDER =================

function render() {

const tbody = document.getElementById("tbody");

if (isLoading) {

    tbody.innerHTML = `
    <tr>
        <td colspan="11">
            <div class="spinner-wrap">
                <div class="spinner"></div>
            </div>
        </td>
    </tr>`;

    return;
}

tbody.innerHTML = "";

const dateF =
    document.getElementById("dateFilter").value;

const progF =
    document.getElementById("programFilter").value;

const semF =
    document.getElementById("semesterFilter").value;

const roomF =
    document.getElementById("roomFilter").value;
    
const view =
    document.getElementById("viewMode").value;

// ================= EVENT MAP =================

const map = {};

events.forEach(e => {

    map[`${e.date}_${e.time}_${e.room}`] = e;
});

const selectedDate =
    dateF || todayISO();

document.getElementById("viewInfo").textContent =
    dateF ? `Приказ: ${dateF}` : "Приказ за денес";

// ================= DAY VIEW =================

if (view === "day") {

    for (const room of DAY_ROOMS) {

        if (roomF && room !== roomF)
            continue;

        const bg =
            getRoomColor(room);

        for (const time of TIMES) {

            const key =
                `${selectedDate}_${time}_${room}`;

            const e = map[key];

            if (e) {

                if (progF && e.program !== progF)
                    continue;

                if (semF && String(e.semester) !== String(semF))
                    continue;
            }

            tbody.innerHTML += `
            <tr style="background:${bg}; opacity:${e ? 1 : 0.55}">
                
                <td>${getDayName(e?.date)}</td>
                <td>${formatDate(selectedDate)}</td>
                <td>${time}</td>
                <td>${room}</td>
                <td>${e?.program || ""}</td>
                <td>${e?.semester || ""}</td>
                <td>${e?.subject || ""}</td>
                <td>${e?.type || ""}</td>
                <td>${e?.professorName  || ""}</td>
                <td>${e?.groups || ""}</td>
            </tr>`;
        }
    }

    return;
}

// ================= NORMAL VIEW =================

const sorted = [...events].sort((a,b)=>

    (a.date||"").localeCompare(b.date||"") ||

    (a.room||"").localeCompare(b.room||"") ||

    (a.time||"").localeCompare(b.time||"")
);

sorted.forEach(e => {

    if (view === "day" && dateF && e.date !== dateF)
    return;

    if (progF && e.program !== progF)
        return;

    if (semF && String(e.semester) !== String(semF))
        return;

    if (roomF && e.rooms?.name !== roomF)
        return;

    tbody.innerHTML += `
    <tr style="background:${getRoomColor(e.room)}">
        
        <td>${e.day || ""}</td>
        <td>${formatDate(e.date)}</td>
        <td>${e.time || ""}</td>
        <td>${e.room || ""}</td>
        <td>${e.program || ""}</td>
        <td>${e.semester || ""}</td>
        <td>${e.subject || ""}</td>
        <td>${e.type || ""}</td>
        <td>${e.professorName  || ""}</td>
        <td>${e.groups || ""}</td>
    </tr>`;
});

}

await loadAvailableDates();
loadData();

</script>

</body>
</html>
