<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>Распоред</title>

<style>
body { font-family: Arial; padding: 20px; }
h2 { margin-bottom: 10px; }

.controls { margin-bottom: 15px; }
select { padding: 5px; margin-right: 10px; }

table { border-collapse: collapse; width: 100%; }

th, td {
    border: 1px solid #222;
    padding: 4px 6px;
    font-size: 13px;
}

th {
    background: #3f69b1;
    color: white;
}

.spinner-wrap {
    display:flex;
    justify-content:center;
    padding:25px;
}

.spinner {
    width:34px;height:34px;
    border:4px solid #ddd;
    border-top:4px solid #3f69b1;
    border-radius:50%;
    animation:spin 0.8s linear infinite;
}

@keyframes spin {
    0% { transform:rotate(0deg); }
    100% { transform:rotate(360deg); }
}
</style>
</head>

<body>

<h2>Академски Распоред</h2>

<div class="controls">
<label>Преглед:</label>
<select id="viewMode">
<option value="day">Day</option>
<option value="week">Week</option>
<option value="month">Month</option>
<option value="year">Year</option>
</select>

<label>Датум:</label>
<input type="date" id="dateFilter">

<label>Програма:</label>
<select id="programFilter"></select>

<label>Семестар:</label>
<select id="semesterFilter"></select>

<label>Просторија:</label>
<select id="roomFilter"></select>
</div>

<div id="viewInfo"></div>

<table>
<thead>
<tr>
<th>Ден</th>
<th>Датум</th>
<th>Час</th>
<th>Просторија</th>
<th>Програма</th>
<th>Семестар</th>
<th>Предмет</th>
<th>Тип</th>
<th>Проф</th>
<th>Групи</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://elmxwpwhyewgjlvoadtb.supabase.co",
  "sb_publishable_yUCov2V1dKGEc-rBwt6v2A_dBkHEiYd"
);

// ================= STATE =================
let events = [];
let holidays = [];
let isLoading = true;

// ================= HELPERS =================
const todayISO = () => new Date().toISOString().split("T")[0];

function normalizeDate(d) {
    return new Date(d).toISOString().split("T")[0];
}

// ✅ FIXED HOLIDAY MATCH
function getHoliday(date) {
    return holidays.find(h => normalizeDate(h.holiday_date) === date);
}

// ================= LOAD =================
async function loadData() {

    isLoading = true;
    render();

    const { data, error } = await supabase
        .from("events")
        .select(`
            *,
            subjects(name, semester, programs(name)),
            professors(name),
            rooms(name)
        `);

    if (error) {
        alert(error.message);
        return;
    }

    const { data: hData } = await supabase
        .from("holidays")
        .select("*");

    holidays = hData || [];

    events = (data || []).map(e => ({
        date: e.event_date,
        time: e.event_time?.substring(0,5),
        room: e.rooms?.name || "",
        subject: e.subjects?.name,
        semester: e.subjects?.semester,
        program: e.subjects?.programs?.name,
        type: e.type,
        professor: e.professors?.name,
        groups: e.groups_text
    }));

    isLoading = false;
    render();
}

// ================= RENDER =================
function render() {

    const tbody = document.getElementById("tbody");

    if (isLoading) {
        tbody.innerHTML = `<tr><td colspan="10">Loading...</td></tr>`;
        return;
    }

    const dateF =
        document.getElementById("dateFilter").value || todayISO();

    const holiday = getHoliday(dateF);

    tbody.innerHTML = "";

    // ===== HOLIDAY ROW =====
    if (holiday) {
        tbody.innerHTML += `
        <tr style="background:#ffebee;">
            <td colspan="10" style="color:red;font-weight:bold;text-align:center;">
                ⚠️ ПРАЗНИК: ${holiday.title} (${holiday.type})
            </td>
        </tr>`;
    }

    // ================= FIX: DO NOT OVER-FILTER =================
    const filtered = events.filter(e => {
        return normalizeDate(e.date) >= dateF;   // 👈 IMPORTANT CHANGE
    });

    if (filtered.length === 0) {
        tbody.innerHTML += `<tr><td colspan="10">Нема податоци</td></tr>`;
        return;
    }

    filtered.forEach(e => {
        tbody.innerHTML += `
        <tr>
            <td></td>
            <td>${e.date}</td>
            <td>${e.time}</td>
            <td>${e.room}</td>
            <td>${e.program}</td>
            <td>${e.semester}</td>
            <td>${e.subject}</td>
            <td>${e.type}</td>
            <td>${e.professor}</td>
            <td>${e.groups}</td>
        </tr>`;
    });
}

// ================= EVENTS =================
document.getElementById("dateFilter").value = todayISO();
document.getElementById("dateFilter").addEventListener("change", render);
console.log("EVENTS:", events);
loadData();

</script>

</body>
</html>
