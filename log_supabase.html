<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>Logs</title>

<style>
body{
    font-family: Arial;
    padding: 20px;
}

h2{
    margin-bottom: 10px;
}

.controls{
    margin-bottom: 15px;
}

input, select, button{
    padding: 6px;
    margin-right: 8px;
}

table{
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
}

th, td{
    border: 1px solid #333;
    padding: 6px;
    vertical-align: top;
}

th{
    background: #3f69b1;
    color: white;
}

tr:nth-child(even){
    background: #f5f5f5;
}

.badge{
    padding: 2px 6px;
    border-radius: 4px;
    color: white;
    font-size: 11px;
}

.ADD{ background: #2e7d32; }
.UPDATE{ background: #f9a825; }
.DELETE{ background: #c62828; }
</style>
</head>

<body>

<h2>Последни измени во распоредот</h2>

<div class="controls">

<select id="actionFilter">
    <option value="">Сите</option>
    <option value="ADD">Додадено</option>
    <option value="UPDATE">Изменето</option>
    <option value="DELETE">Избришано</option>
</select>

<button onclick="loadLogs()">Reload</button>
<label>Event датум:</label>
<input type="date" id="eventDateFilter">
<button id="clearEventFilter">Clear</button>
</div>

<table>
<thead>
<tr>
    <th>Action</th>
    <th>Time</th>
    <th>Date</th>
    <th>Room</th>
    <th>Subject</th>
    <th>Professor</th>
    <th>Type</th>
    <th>Groups</th>
    <th>Comment</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<script type="module">

import { createClient }
from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase =
createClient(
    "https://elmxwpwhyewgjlvoadtb.supabase.co",
    "sb_publishable_yUCov2V1dKGEc-rBwt6v2A_dBkHEiYd"
);

let logs = [];
let eventDateFilter = "";

    
async function loadLogs(){

    const { data, error } =
        await supabase
        .from("logs")
        .select("*")
        .order("id", { ascending: false });

    console.log(error);

    logs = data || [];

    render();
}


    
function formatDateTime(ts){

    if(!ts) return "";

    const d = new Date(ts);

    const pad = n => String(n).padStart(2,"0");

    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ` +
           `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}
function render(){

    const filter =
        document.getElementById("actionFilter").value;

    const tbody =
        document.getElementById("tbody");

    tbody.innerHTML = "";

    logs
.filter(l => {

    const actionMatch =
        !filter || l.action === filter;

    const eventDateMatch =
        !eventDateFilter ||
        l.event_date === eventDateFilter;

    return actionMatch && eventDateMatch;
})
    .forEach(l => {

        tbody.innerHTML += `
        <tr>
            <td>
                <span class="badge ${l.action}">
                    ${l.action}
                </span>
            </td>
            <td>${formatDateTime(l.created_at)}</td>
            <td>${l.event_date || ""}</td>
            <td>${l.room_name || ""}</td>
            <td>${l.subject_name || ""}</td>
            <td>${l.professor_name || ""}</td>
            <td>${l.type || ""}</td>
            <td>${l.groups_text || ""}</td>
            <td>${l.comment || ""}</td>
        </tr>`;
    });
}

document
.getElementById("actionFilter")
.addEventListener("change", render);

loadLogs();
 document.getElementById("eventDateFilter")
.addEventListener("change", (e) => {

    eventDateFilter = e.target.value;
    render();
});

document.getElementById("clearEventFilter")
.addEventListener("click", () => {

    eventDateFilter = "";
    document.getElementById("eventDateFilter").value = "";
    render();
});
</script>

</body>
</html>
