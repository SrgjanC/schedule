<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<title>Logs</title>

<style>
body{
    font-family: Arial;
    padding: 20px;
}

h2{
    margin-bottom: 10px;
}

.controls{
    margin-bottom: 15px;
}

input, select, button{
    padding: 6px;
    margin-right: 8px;
}

table{
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
}

th, td{
    border: 1px solid #333;
    padding: 6px;
    vertical-align: top;
}

th{
    background: #3f69b1;
    color: white;
}

tr:nth-child(even){
    background: #f5f5f5;
}

.badge{
    padding: 2px 6px;
    border-radius: 4px;
    color: white;
    font-size: 11px;
}

.ADD{ background: #2e7d32; }
.UPDATE{ background: #f9a825; }
.DELETE{ background: #c62828; }
</style>
</head>

<body>

<h2>Последни измени во распоредот</h2>

<div class="controls">

<select id="actionFilter">
    <option value="">Сите</option>
    <option value="ADD">Додадено</option>
    <option value="UPDATE">Изменето</option>
    <option value="DELETE">Избришано</option>
</select>

<button onclick="loadLogs()">Reload</button>
<label>Датум на термин:</label>
<input type="date" id="eventDateFilter">
<button id="clearEventFilter">Clear</button>
</div>

<table>
<thead>
<tr>
    <th>Измена</th>
    <th>Датум на измена</th>
    <th>Датум</th>
    <th>Час</th>
    <th>Локација</th>
    <th>Предмет</th>
    <th>Професор</th>
    <th>Тип на настава</th>
    <th>Групи</th>
    <th>Коментар</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
</table>

<script type="module">

import { createClient }
from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase =
createClient(
    "https://elmxwpwhyewgjlvoadtb.supabase.co",
    "sb_publishable_yUCov2V1dKGEc-rBwt6v2A_dBkHEiYd"
);

let logs = [];
let eventDateFilter = "";

    
async function loadLogs(){

    const { data, error } =
        await supabase
        .from("logs")
        .select("*")
        .order("id", { ascending: false });

    console.log(error);

    logs = data || [];

    render();
}

let reloadTimeout;

function subscribeLogs() {

    supabase
        .channel('logs-realtime')
        .on('postgres_changes',
            {
                event: '*',
                schema: 'public',
                table: 'logs'
            },
            () => {

                clearTimeout(reloadTimeout);

                reloadTimeout = setTimeout(() => {
                    loadLogs();
                }, 300);
            }
        )
        .subscribe();
}
    
function formatDateTime(ts){

    if(!ts) return "";

    const d = new Date(ts);

    const pad = n => String(n).padStart(2,"0");

    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ` +
           `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}

    async function refreshLogs() {

    const { data, error } = await supabase
        .from('logs')
        .select('*')
        .order('id', { ascending: false })
        .limit(200);

    if (error) {
        console.error(error);
        return;
    }

    renderLogs(data);
}


    
function render(){

    const filter =
        document.getElementById("actionFilter").value;

    const tbody =
        document.getElementById("tbody");

    tbody.innerHTML = "";

    logs
.filter(l => {

    const actionMatch =
        !filter || l.action === filter;

    const eventDateMatch =
        !eventDateFilter ||
        l.event_date === eventDateFilter;

    return actionMatch && eventDateMatch;
})
    .forEach(l => {

        tbody.innerHTML += `
        <tr>
            <td>
                <span class="badge ${l.action}">
                    ${l.action}
                </span>
            </td>
            <td>${formatDateTime(l.created_at)}</td>
            <td>${l.event_date || ""}</td>
            <td>${l.event_time || ""}</td>
            <td>${l.room_name || ""}</td>
            <td>${l.subject_name || ""}</td>
            <td>${l.professor_name || ""}</td>
            <td>${l.type || ""}</td>
            <td>${l.groups_text || ""}</td>
            <td>${l.comment || ""}</td>
        </tr>`;
    });
}

document
.getElementById("actionFilter")
.addEventListener("change", render);

loadLogs();
subscribeLogs();
 document.getElementById("eventDateFilter")
.addEventListener("change", (e) => {

    eventDateFilter = e.target.value;
    render();
});

document.getElementById("clearEventFilter")
.addEventListener("click", () => {

    eventDateFilter = "";
    document.getElementById("eventDateFilter").value = "";
    render();
});
    loadLogs();
subscribeLogs();
</script>

</body>
</html>
